<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  
  <meta property="og:title" content="✨ Naming Ceremony ✨" />
  <meta property="og:description" content="You are warmly invited to witness the grand reveal and naming of our little one. Join us for this magical celebration!" />
  <meta property="og:image" content="https://arungz.github.io/BabyShower/Images/1770581656335.png" />
  <meta property="og:image:secure_url" content="https://arungz.github.io/BabyShower/Images/1770581656335.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url" content="https://arungz.github.io/NamingCeremony/" />
  <meta property="og:type" content="website" />
  
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="✨ Naming Ceremony ✨">
  <meta name="twitter:description" content="You are warmly invited to witness the grand reveal and naming of our little one.">
  <meta name="twitter:image" content="https://arungz.github.io/NamingCeremony/Images/preview.png">
  
  <meta name="theme-color" content="#050505">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Naming Ceremony">
  
  <meta name="description" content="A grand naming ceremony invitation. Join our family to celebrate this magical milestone.">
  <meta name="keywords" content="naming ceremony, baby naming, invitation, grand reveal, celebration, family, premium event">
  <meta name="robots" content="index, follow">
  <meta name="format-detection" content="telephone=no, email=no">
  
  <title>Naming Ceremony ✨</title>
  <link rel="icon" type="image/png" href="Images/ak.png">

  <script defer src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Cinzel+Decorative:wght@700&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet" />

  <style>
    /* ===== VARIABLES & RESETS ===== */
    :root {
      --bg: #050505;
      --gold-1: #bf953f;
      --gold-2: #fdf5c9;
      --gold-3: #b38728;
      --muted: rgba(255, 255, 255, 0.5);
      --glass: rgba(20, 20, 20, 0.4);
      --glass-border: rgba(191, 149, 63, 0.3);
      --safe-area-top: env(safe-area-inset-top);
      --safe-area-bottom: env(safe-area-inset-bottom);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    
    body {
      font-family: 'Montserrat', sans-serif;
      background: radial-gradient(circle at 50% 50%, #1a1c20 0%, #050505 100%);
      color: #fff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding-top: var(--safe-area-top);
      padding-bottom: var(--safe-area-bottom);
      overflow: hidden;
      perspective: 1500px;
      user-select: none; 
      -webkit-tap-highlight-color: transparent; 
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
      z-index: 0;
      pointer-events: none;
    }

    /* ===== AMBIENT MAGIC GLOW ===== */
    .ambient-light {
        position: fixed;
        top: 50%; left: 50%;
        width: 90vw; height: 90vh;
        background: radial-gradient(circle, rgba(191, 149, 63, 0.08) 0%, transparent 70%);
        transform: translate(-50%, -50%);
        z-index: 2; 
        pointer-events: none;
        animation: breatheLight 8s infinite alternate ease-in-out;
    }
    @keyframes breatheLight {
        0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.4; }
        100% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
    }

    /* ===== CANVAS BACKGROUND ===== */
    #canvas-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      opacity: 0.5;
      pointer-events: none;
    }

    .gold-shimmer {
      background: linear-gradient(90deg, var(--gold-1), var(--gold-2), var(--gold-3), var(--gold-2), var(--gold-1));
      background-size: 200% auto;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      animation: shine 4s linear infinite;
    }
    @keyframes shine { to { background-position: 200% center; } }

    /* ===== PULL TO REFRESH UI ===== */
    #ptr-wrapper {
        position: fixed;
        top: -70px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 50px;
        height: 50px;
        background: rgba(20, 20, 20, 0.6);
        backdrop-filter: blur(15px);
        border: 1px solid var(--gold-1);
        border-radius: 50%;
        box-shadow: 0 5px 15px rgba(0,0,0,0.8), 0 0 0px rgba(212, 175, 55, 0);
        transition: box-shadow 0.3s ease, background 0.3s ease;
        pointer-events: none; 
    }
    #ptr-wrapper.ready {
        box-shadow: 0 5px 25px rgba(0,0,0,0.9), 0 0 25px rgba(212, 175, 55, 0.8);
        background: rgba(40, 30, 10, 0.9);
        border-color: var(--gold-2);
    }
    #ptr-icon {
        width: 24px;
        height: 24px;
        fill: var(--gold-2);
        transform-origin: center;
    }
    .ptr-spin { animation: fastSpin 0.5s linear infinite !important; }
    @keyframes fastSpin { 100% { transform: rotate(360deg); } }

    /* ===== MODERN INTRO CONTAINER ===== */
    #scene-container {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transform-style: preserve-3d;
      transition: transform 3.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .gate {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      background: linear-gradient(135deg, #111, #050505);
      box-shadow: 0 0 50px rgba(0,0,0,0.9);
      transition: transform 2.5s cubic-bezier(0.77, 0, 0.175, 1), opacity 2s ease;
      z-index: 101;
      overflow: hidden;
    }

    .gate::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.03) 50%, rgba(255,255,255,0) 100%);
        transform: skewX(-20deg) translateX(-150%);
        animation: modernSweep 5s infinite;
    }
    @keyframes modernSweep {
        0% { transform: skewX(-20deg) translateX(-150%); }
        100% { transform: skewX(-20deg) translateX(250%); }
    }

    .gate.left { left: 0; border-right: 2px solid var(--gold-1); }
    .gate.right { right: 0; border-left: 2px solid var(--gold-1); }
    .gate.open-left { transform: translateX(-100%) scale(1.1); opacity: 0; }
    .gate.open-right { transform: translateX(100%) scale(1.1); opacity: 0; }

    /* ===== MACHINED GOLD SEAL ===== */
    .seal-wrapper {
      position: relative;
      z-index: 102;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
      transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .seal-aura {
        position: absolute;
        top: 50%; left: 50%;
        width: 10px; height: 10px;
        background: var(--gold-2);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        filter: blur(20px);
        opacity: 0;
        z-index: 101;
        transition: all 1.5s ease;
    }
    .seal-aura.explode {
        transform: translate(-50%, -50%) scale(100);
        opacity: 0;
        filter: blur(50px);
    }

    #letter-N {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(50px, 8vw, 110px);
      width: clamp(140px, 26vw, 240px);
      height: clamp(140px, 26vw, 240px);
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      background: conic-gradient(from 0deg, var(--gold-2), var(--gold-3), #fff, var(--gold-3), var(--gold-2));
      color: #3d2b07;
      text-shadow: 1px 1px 2px rgba(255,255,255,0.8), -1px -1px 2px rgba(0,0,0,0.4);
      cursor: pointer;
      
      /* NEW: Magical Invite Pulse Animation */
      animation: invitePulse 2.5s infinite alternate ease-in-out;
      
      transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      font-weight: 700;
      position: relative;
      overflow: hidden;
      z-index: 103;
      outline: none;
    }
    
    @keyframes invitePulse {
        from { box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 20px 40px rgba(0,0,0,0.9), 0 0 0 8px #111, 0 0 0 10px var(--gold-1); }
        to { box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 20px 40px rgba(0,0,0,0.9), 0 0 0 8px #111, 0 0 20px 14px rgba(253, 245, 201, 0.4); }
    }
    
    #letter-N:hover, #letter-N:active { 
        animation: none; /* Stops pulse on touch */
        transform: scale(1.05); 
        box-shadow: 
            inset 0 0 15px rgba(0,0,0,0.7), 
            0 30px 50px rgba(0,0,0,0.9), 
            0 0 0 8px #111, 
            0 0 0 15px var(--gold-2);
    }

    #letter-N.shatter {
        animation: none;
        transform: scale(2) rotate(15deg);
        opacity: 0;
        filter: blur(10px);
    }

    #letter-N::after {
      content: '';
      position: absolute;
      top: -50%; left: -50%; width: 200%; height: 200%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.5) 50%, rgba(255,255,255,0) 100%);
      transform: rotate(45deg) translateX(-100%);
      animation: lightSweep 4s infinite cubic-bezier(0.4, 0, 0.2, 1);
    }

    .click-hint {
      font-size: 13px;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: var(--muted);
      animation: fadeInOut 2s infinite;
      transition: opacity 0.4s ease;
    }
    @keyframes fadeInOut { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

    /* ===== CASCADING TIMER SCREEN ===== */
    #timer-screen {
      position: absolute;
      z-index: 50;
      opacity: 0;
      transform: scale(0.9);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 1.5s ease, transform 1.5s ease;
      text-align: center;
      width: 100%;
      padding: clamp(10px, 2vw, 20px);
      box-sizing: border-box;
    }
    #timer-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(16px, 4vw, 36px);
      margin-bottom: clamp(20px, 4vw, 50px);
      letter-spacing: clamp(3px, 1vw, 6px);
      text-transform: uppercase;
      text-shadow: 0 5px 15px rgba(0,0,0,0.8);
      white-space: nowrap;
    }
    
    .timer-box { 
      display: flex; 
      gap: 8px; 
      justify-content: center; 
      flex-wrap: nowrap; 
      width: 100%;
      max-width: 650px;
      padding: 0 10px;
      box-sizing: border-box;
    }
    
    .time-unit {
      flex: 1 1 0px; 
      min-width: 0; 
      background: var(--glass);
      backdrop-filter: blur(20px) saturate(120%);
      -webkit-backdrop-filter: blur(20px) saturate(120%);
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      border-left: 1px solid rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid rgba(0, 0, 0, 0.6);
      border-right: 1px solid rgba(0, 0, 0, 0.6);
      padding: 15px 5px; 
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
      text-align: center;
      
      /* NEW: Cascading Slide-up Entrance */
      opacity: 0;
      transform: translateY(40px) scale(0.9);
      transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    .time-unit.show-unit {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
    
    .time-unit div { 
      font-weight: 300; 
      font-size: clamp(20px, 5.5vw, 65px); 
      line-height: 1; 
      text-shadow: 0 4px 10px rgba(0,0,0,0.6);
    }
    .time-unit span { 
      display: block; 
      font-size: clamp(8px, 2vw, 12px); 
      color: var(--gold-1); 
      margin-top: 10px; 
      letter-spacing: clamp(1px, 0.5vw, 3px); 
      text-transform: uppercase; 
      font-family: 'Cinzel', serif;
    }

    /* ===== HEARTBEAT COUNTDOWN SCREEN ===== */
    #countdown-screen {
      position: absolute;
      z-index: 60;
      display: none;
      font-family: 'Cinzel', serif;
      color: transparent;
      -webkit-text-stroke: 3px var(--gold-1);
      text-shadow: 0 0 80px rgba(191, 149, 63, 0.5);
      font-size: clamp(120px, 30vw, 320px);
      pointer-events: none;
      animation: heartbeatPulse 1s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
    }
    @keyframes heartbeatPulse {
      0% { transform: scale(0.8); opacity: 0; filter: blur(10px); }
      20% { transform: scale(1.1); opacity: 1; filter: blur(0px); }
      100% { transform: scale(1.4); opacity: 0; filter: blur(5px); }
    }

    /* ===== PERFECTLY POSITIONED REVEAL SCREEN ===== */
    #reveal-screen { 
      position: absolute; 
      inset: 0;
      z-index: 70; 
      display: none; 
      flex-direction: column;
      justify-content: flex-start; 
      padding-top: 15vh; 
      align-items: center;
      perspective: 1000px; 
      width: 100%; 
    }
    
    @media (min-width: 768px) {
      #reveal-screen {
        justify-content: center;
        padding-top: 0;
      }
    }
    
    #reveal-subtitle {
      font-family: 'Cinzel', serif;
      font-weight: 400;
      font-size: clamp(16px, 4vw, 32px);
      letter-spacing: clamp(4px, 2vw, 12px);
      color: var(--gold-2);
      margin-bottom: 40px;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(-20px) scale(0.9);
      text-shadow: 0 5px 20px rgba(0,0,0,0.9);
      text-align: center;
    }
    
    /* NEW: Cinematic floating transition with a continuous subtle glow */
    .subtitle-show { 
        animation: 
            cinematicFloatIn 2s cubic-bezier(0.25, 1, 0.5, 1) forwards,
            subtleGlow 3s infinite alternate 2s; 
    }
    @keyframes cinematicFloatIn { to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes subtleGlow {
        from { text-shadow: 0 5px 20px rgba(0,0,0,0.9); }
        to { text-shadow: 0 5px 20px rgba(0,0,0,0.9), 0 0 20px rgba(253, 245, 201, 0.4); }
    }

    /* ===== SMART ANIMATION NAME CONTAINER ===== */
    .name-container { 
      display: flex; 
      justify-content: center; 
      align-items: center;
      white-space: nowrap; 
      max-width: 95vw;
    }
    
    .rest-part-wrapper {
        display: grid;
        grid-template-columns: 0fr; 
        transition: grid-template-columns 1.5s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .rest-part-wrapper.expand { grid-template-columns: 1fr; }
    
    .rest-part-inner {
        overflow: hidden;
        display: flex;
        align-items: center;
    }

    .letter {
      font-family: 'Cinzel', serif;
      font-size: clamp(30px, 10vw, 140px); 
      font-weight: 800;
      color: var(--gold-2);
      -webkit-font-smoothing: antialiased;
      text-shadow: 
        0 1px 0 #b38728, 0 2px 0 #9f7622, 0 3px 0 #8c661c,
        0 4px 0 #795717, 0 5px 0 #674a12, 0 6px 0 #563e0e,
        0 20px 40px rgba(0,0,0,0.9);
    }

    .initial-part {
      opacity: 0;
      transform: translateZ(-200px) rotateX(-90deg);
      transition: all 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .initial-part.show { 
      opacity: 1; 
      transform: translateZ(0) rotateX(0deg); 
    }

    .is-name { opacity: 0; margin-left: clamp(2px, 1.5vw, 15px); }

    @keyframes popFlash {
        0% { opacity: 0; transform: translateZ(-100px) scale(0.5) rotateX(-45deg); filter: brightness(1); }
        50% { opacity: 1; transform: translateZ(40px) scale(1.1) rotateX(0deg); filter: brightness(2); text-shadow: 0 0 50px rgba(253, 245, 201, 1), 0 20px 40px rgba(0,0,0,0.9); color: #fff; }
        100% { opacity: 1; transform: translateZ(0) scale(1) rotateX(0deg); filter: brightness(1); color: var(--gold-2); }
    }

    /* ===== ADVANCED KAWAII BABY GIRL SVG & SPARKLES ===== */
    #baby-girl-container {
        position: relative;
        margin-top: 30px;
        transform: translateX(-150vw); 
        width: 160px;
        height: 160px;
        opacity: 0;
        transition: transform 1.8s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 1.5s ease;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    
    #baby-girl-container.slide-in {
        transform: translateX(0); 
        opacity: 1;
        animation: floatBaby 3s ease-in-out infinite forwards;
        animation-delay: 1.8s;
    }
    
    @keyframes floatBaby {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }
    
    .waving-arm {
        transform-origin: 135px 125px; 
        animation: wave-hand 0.8s infinite alternate ease-in-out;
    }
    @keyframes wave-hand {
        0% { transform: rotate(-5deg); }
        100% { transform: rotate(35deg); }
    }

    /* Magical Sparkling Stars around the baby */
    .sparkle {
        position: absolute;
        font-size: clamp(14px, 3vw, 20px);
        opacity: 0;
        animation: twinkle 2s infinite ease-in-out;
        pointer-events: none;
    }
    @keyframes twinkle {
        0%, 100% { opacity: 0; transform: scale(0.5) rotate(0deg); }
        50% { opacity: 1; transform: scale(1.2) rotate(20deg); text-shadow: 0 0 10px #fdf5c9; }
    }

    /* ===== HEART BALLOON ANIMATIONS ===== */
    .balloon-anim {
        position: absolute;
        bottom: -200px;
        animation: floatUp 8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes floatUp {
        0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 1; }
        100% { transform: translateY(-120vh) translateX(var(--drift)) rotate(15deg); opacity: 0; }
    }

    /* ===== REDUCED MOTION ===== */
    @media (prefers-reduced-motion: reduce) {
      .gold-shimmer, #letter-N::after, .click-hint, #countdown-screen, .letter, .gate, #scene-container, .balloon-anim, .subtitle-show, #baby-girl-container, .waving-arm, #baby-girl-container.slide-in, .ambient-light, #letter-N, .sparkle {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  
  <div class="ambient-light"></div>

  <div id="ptr-wrapper">
      <svg id="ptr-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2.75a9.25 9.25 0 1 0 4.737 17.197l-1.373-1.637A7.25 7.25 0 1 1 19.25 12h-2.5l3.625 4.5L24 12h-2.75a9.25 9.25 0 0 0-9.25-9.25z"/>
      </svg>
  </div>

  <canvas id="canvas-bg" aria-hidden="true"></canvas>

  <div id="scene-container" aria-hidden="false">
    <div class="gate left" id="gate-left" aria-hidden="true"></div>
    <div class="gate right" id="gate-right" aria-hidden="true"></div>

    <div class="seal-wrapper" id="seal-wrapper">
      <div class="seal-aura" id="seal-aura"></div>
      <div id="letter-N" role="button" tabindex="0">N</div>
      <div class="click-hint gold-shimmer" id="click-hint">Click to Enter</div>
    </div>
  </div>

  <div id="timer-screen" aria-live="polite" aria-atomic="true">
    <h2 id="timer-title" class="gold-shimmer">The Journey Unfolds In</h2>
    <div class="timer-box" role="group">
      <div class="time-unit"><div id="days">00</div><span id="label-days">Days</span></div>
      <div class="time-unit"><div id="hours">00</div><span id="label-hours">Hours</span></div>
      <div class="time-unit"><div id="mins">00</div><span id="label-mins">Minutes</span></div>
      <div class="time-unit"><div id="secs">00</div><span id="label-secs">Seconds</span></div>
    </div>
  </div>

  <div id="countdown-screen" aria-live="assertive" aria-atomic="true">5</div>

  <div id="reveal-screen" aria-hidden="true">
    <h3 id="reveal-subtitle" class="gold-shimmer">Welcome To The World</h3>
    <div class="name-container" id="baby-name" aria-hidden="true"></div>
    
    <div id="baby-girl-container">
        <div class="sparkle" style="top: 10px; left: 10px; animation-delay: 0s;">✨</div>
        <div class="sparkle" style="top: 40px; right: 0px; animation-delay: 0.5s;">✨</div>
        <div class="sparkle" style="top: 110px; left: 5px; animation-delay: 1.2s;">✨</div>
        <div class="sparkle" style="top: -5px; right: 30px; animation-delay: 0.8s;">✨</div>

        <svg width="100%" height="100%" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <path d="M 65,190 C 65,135 135,135 135,190 Z" fill="#fff" stroke="#ff80ab" stroke-width="3"/>
            <path d="M 65,185 Q 82.5,200 100,185 Q 117.5,200 135,185" fill="none" stroke="#ff80ab" stroke-width="4"/>
            
            <path d="M 75,135 Q 60,150 65,170" fill="none" stroke="#ffe0bd" stroke-width="12" stroke-linecap="round"/>
            
            <g class="waving-arm">
                <path d="M 125,135 Q 155,120 160,95" fill="none" stroke="#ffe0bd" stroke-width="12" stroke-linecap="round"/>
                <circle cx="160" cy="95" r="6" fill="#ffe0bd"/>
            </g>
            
            <circle cx="100" cy="95" r="45" fill="#ffe0bd"/>
            
            <ellipse cx="72" cy="108" rx="8" ry="5" fill="#ff80ab" opacity="0.7"/>
            <ellipse cx="128" cy="108" rx="8" ry="5" fill="#ff80ab" opacity="0.7"/>
            
            <circle cx="78" cy="98" r="6.5" fill="#3e2723"/>
            <circle cx="76" cy="96" r="2.5" fill="#ffffff"/> 
            <circle cx="122" cy="98" r="6.5" fill="#3e2723"/>
            <circle cx="120" cy="96" r="2.5" fill="#ffffff"/> 
            
            <path d="M 94,112 Q 100,120 106,112" fill="none" stroke="#d81b60" stroke-width="2.5" stroke-linecap="round"/>
            
            <path d="M 55,95 C 55,30 145,30 145,95 C 145,65 120,45 100,45 C 80,45 55,65 55,95 Z" fill="#4e342e"/>
            <path d="M 75,50 Q 100,75 112,50" fill="none" stroke="#4e342e" stroke-width="6" stroke-linecap="round"/>
            
            <path d="M 100,45 L 85,35 L 85,55 Z" fill="#ff4081"/>
            <path d="M 100,45 L 115,35 L 115,55 Z" fill="#ff4081"/>
            <circle cx="100" cy="45" r="5" fill="#c2185b"/>
        </svg>
    </div>
  </div>

  <noscript>
    <div style="position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; background: #050505; z-index: 9999; padding: 20px; text-align: center;">
      <div style="color: #d4af37;">
        <h2 style="font-family: Cinzel, serif; margin-bottom: 12px;">Welcome</h2>
        <p>Please enable JavaScript to view the ceremony animation.</p>
      </div>
    </div>
  </noscript>

  <script>
    'use strict';

    /* ===== CONFIGURATION ===== */
    const CONFIG = {
      ceremonyName: window.__ceremonyName || 'A.NURA',
      ceremonyEventDate: window.__ceremonyEventDate || null,
      timerDemoSeconds: 8
    };

    /* ===== ELEMENT CACHE ===== */
    const qs = (sel, root = document) => root ? root.querySelector(sel) : null;
    const qsa = (sel, root = document) => root ? Array.from(root.querySelectorAll(sel)) : [];
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const elements = {
      letterN: qs('#letter-N'),
      sealWrapper: qs('#seal-wrapper'),
      sealAura: qs('#seal-aura'),
      clickHint: qs('#click-hint'),
      gateLeft: qs('#gate-left'),
      gateRight: qs('#gate-right'),
      sceneContainer: qs('#scene-container'),
      timerScreen: qs('#timer-screen'),
      countdownScreen: qs('#countdown-screen'),
      revealScreen: qs('#reveal-screen'),
      revealSubtitle: qs('#reveal-subtitle'),
      babyNameContainer: qs('#baby-name'),
      canvas: qs('#canvas-bg')
    };

    /* ===== PULL TO REFRESH LOGIC ===== */
    let startY = 0;
    let currentPull = 0;
    const ptrWrapper = qs('#ptr-wrapper');
    const ptrIcon = qs('#ptr-icon');
    const ptrThreshold = 100; 

    function handleDragStart(y) {
        startY = y;
        ptrWrapper.style.transition = 'none';
        ptrIcon.style.transition = 'none';
    }

    function handleDragMove(y) {
        if (startY === 0) return;
        const diff = y - startY;
        
        if (diff > 0) {
            currentPull = diff * 0.4; 
            
            ptrWrapper.style.transform = `translate(-50%, calc(-50px + ${currentPull}px))`;
            ptrIcon.style.transform = `rotate(${currentPull * 2.5}deg)`;

            if (currentPull > ptrThreshold) {
                ptrWrapper.classList.add('ready');
            } else {
                ptrWrapper.classList.remove('ready');
            }
        }
    }

    function handleDragEnd() {
        if (startY === 0) return;
        startY = 0;

        ptrWrapper.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease, background 0.3s ease';
        ptrIcon.style.transition = 'transform 0.4s ease';

        if (currentPull > ptrThreshold) {
            ptrWrapper.style.transform = `translate(-50%, 30px)`;
            ptrIcon.classList.add('ptr-spin');
            setTimeout(() => {
                window.location.reload();
            }, 500); 
        } else {
            ptrWrapper.style.transform = `translate(-50%, 0)`;
        }
        currentPull = 0;
    }

    document.addEventListener('touchstart', e => {
        if (e.touches.length > 1) return;
        handleDragStart(e.touches[0].clientY);
    }, { passive: true });
    
    document.addEventListener('touchmove', e => {
        handleDragMove(e.touches[0].clientY);
    }, { passive: true });
    
    document.addEventListener('touchend', handleDragEnd);

    let isMouseDown = false;
    document.addEventListener('mousedown', e => {
        isMouseDown = true;
        handleDragStart(e.clientY);
    });
    document.addEventListener('mousemove', e => {
        if (!isMouseDown) return;
        handleDragMove(e.clientY);
    });
    document.addEventListener('mouseup', () => {
        if (!isMouseDown) return;
        isMouseDown = false;
        handleDragEnd();
    });

    /* ===== CANVAS BACKGROUND PARTICLES ===== */
    let animationId = null;
    let particlesArray = [];

    function initCanvas() {
      if (!elements.canvas) return;
      const ctx = elements.canvas.getContext('2d', { alpha: true });
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      elements.canvas.width = Math.round(window.innerWidth * dpr);
      elements.canvas.height = Math.round(window.innerHeight * dpr);
      elements.canvas.style.width = window.innerWidth + 'px';
      elements.canvas.style.height = window.innerHeight + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      class Particle {
        constructor() {
          this.x = Math.random() * window.innerWidth;
          this.y = Math.random() * window.innerHeight;
          this.size = Math.random() * 2;
          this.speedY = Math.random() * 0.3 - 0.15;
          this.speedX = Math.random() * 0.3 - 0.15;
        }
        update() {
          this.x += this.speedX;
          this.y += this.speedY;
          if (this.y > window.innerHeight) this.y = 0;
          if (this.y < 0) this.y = window.innerHeight;
          if (this.x > window.innerWidth) this.x = 0;
          if (this.x < 0) this.x = window.innerWidth;
        }
        draw() {
          ctx.fillStyle = 'rgba(212, 175, 55, 0.6)';
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      for (let i = 0; i < 150; i++) particlesArray.push(new Particle());

      function animate() {
        ctx.clearRect(0, 0, elements.canvas.width, elements.canvas.height);
        for (const p of particlesArray) {
          p.update();
          p.draw();
        }
        animationId = requestAnimationFrame(animate);
      }
      if (!reducedMotion) animate();
    }

    /* ===== SMART NAME RENDERER ===== */
    function renderName(nameStr) {
      const container = elements.babyNameContainer;
      if (!container) return;
      container.innerHTML = '';
      const final = (nameStr && nameStr.trim().length > 0) ? nameStr.trim().toUpperCase() : 'A.NURA';

      let initialEndIdx = final.indexOf('.');
      if (initialEndIdx === -1) initialEndIdx = final.indexOf(' ');
      if (initialEndIdx === -1) initialEndIdx = 0; 

      const initialStr = final.substring(0, initialEndIdx + 1);
      const restStr = final.substring(initialEndIdx + 1).trim();

      const initialDiv = document.createElement('div');
      initialDiv.className = 'initial-part letter';
      initialDiv.textContent = initialStr;
      container.appendChild(initialDiv);

      const restWrapper = document.createElement('div');
      restWrapper.className = 'rest-part-wrapper';
      
      const restInner = document.createElement('div');
      restInner.className = 'rest-part-inner';

      Array.from(restStr).forEach(ch => {
        const el = document.createElement('div');
        el.className = 'letter is-name';
        el.innerHTML = ch === ' ' ? '&nbsp;' : ch;
        restInner.appendChild(el);
      });

      restWrapper.appendChild(restInner);
      container.appendChild(restWrapper);
    }

    /* ===== TIMER LOGIC ===== */
    let countdownInterval = null;
    let finalTimer = null;
    let eventDate = CONFIG.ceremonyEventDate || (function() {
      const d = new Date();
      d.setSeconds(d.getSeconds() + CONFIG.timerDemoSeconds);
      return d;
    })();

    function safeSetText(id, text) {
      const el = document.getElementById(id);
      if (el) el.textContent = text;
    }

    function startTimer() {
      if (countdownInterval) clearInterval(countdownInterval);
      function updateOnce() {
        const now = Date.now();
        const dist = eventDate.getTime() - now;
        
        if (dist <= 0) {
          clearInterval(countdownInterval);
          if (elements.timerScreen) {
              elements.timerScreen.style.transform = 'scale(1.1)';
              elements.timerScreen.style.opacity = '0';
          }
          setTimeout(() => {
              if (elements.timerScreen) elements.timerScreen.style.display = 'none';
              startFinalCountdown();
          }, 1500); 
          return;
        }
        
        const days = Math.floor(dist / (1000 * 60 * 60 * 24));
        const hours = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((dist % (1000 * 60)) / 1000);
        safeSetText('days', days < 10 ? '0' + days : String(days));
        safeSetText('hours', hours < 10 ? '0' + hours : String(hours));
        safeSetText('mins', minutes < 10 ? '0' + minutes : String(minutes));
        safeSetText('secs', seconds < 10 ? '0' + seconds : String(seconds));
      }
      updateOnce();
      countdownInterval = setInterval(updateOnce, 1000);
    }

    function startFinalCountdown() {
      if (elements.countdownScreen) elements.countdownScreen.style.display = 'block';
      let count = 5;
      
      if (elements.countdownScreen) elements.countdownScreen.textContent = String(count);

      finalTimer = setInterval(() => {
        count--;
        if (count > 0) {
          if (elements.countdownScreen) {
             elements.countdownScreen.style.animation = 'none';
             void elements.countdownScreen.offsetWidth; 
             elements.countdownScreen.style.animation = 'heartbeatPulse 1s infinite cubic-bezier(0.215, 0.61, 0.355, 1)';
             elements.countdownScreen.textContent = String(count);
          }
        } else {
          clearInterval(finalTimer);
          if (elements.countdownScreen) elements.countdownScreen.style.display = 'none';
          triggerGrandReveal();
        }
      }, 1000);
    }

    /* ===== ENTRANCE & REVEAL LOGIC ===== */
    function triggerEntrance() {
      if (!elements.letterN || elements.letterN.getAttribute('data-activated') === 'true') return;
      elements.letterN.setAttribute('data-activated', 'true');
      
      if (elements.clickHint) {
          elements.clickHint.style.animation = 'none';
          elements.clickHint.style.opacity = '0';
      }

      if (!reducedMotion) {
        elements.letterN.classList.add('shatter');
        elements.sealAura.classList.add('explode');
      }

      setTimeout(() => {
        elements.gateLeft?.classList.add('open-left');
        elements.gateRight?.classList.add('open-right');
      }, 400); 

      setTimeout(() => {
        elements.sceneContainer && (elements.sceneContainer.style.display = 'none');
        const now = Date.now();
        const dist = eventDate.getTime() - now;

        if (dist <= 0) {
            startFinalCountdown();
        } else {
            elements.timerScreen && (elements.timerScreen.style.display = 'flex');
            void elements.timerScreen.offsetWidth; 
            elements.timerScreen && (elements.timerScreen.style.opacity = '1');
            elements.timerScreen && (elements.timerScreen.style.transform = 'scale(1)');
            
            // Cascading timer unit entrance
            const units = qsa('.time-unit');
            units.forEach((u, i) => {
                setTimeout(() => u.classList.add('show-unit'), 100 + (i * 150));
            });
            
            startTimer();
        }
      }, 2500); 
    }

    function triggerGrandReveal() {
      elements.revealScreen && (elements.revealScreen.style.display = 'flex');
      
      if (elements.revealSubtitle) {
          elements.revealSubtitle.classList.add('subtitle-show');
      }

      setTimeout(() => {
          const initialPart = qs('.initial-part');
          if (initialPart) initialPart.classList.add('show');

          setTimeout(() => {
              const wrapper = qs('.rest-part-wrapper');
              if(wrapper) wrapper.classList.add('expand');

              const restLetters = qsa('.is-name', elements.babyNameContainer);
              restLetters.forEach((letter, idx) => {
                  setTimeout(() => {
                      letter.classList.add('show');
                      if (!reducedMotion) {
                          letter.style.animation = 'popFlash 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';
                      }
                  }, idx * 100);
              });

              const totalDelay = (restLetters.length * 100) + 400;
              setTimeout(() => { 
                  fireFourCornerBlast(); 
                  
                  fireHeartBalloons();
                  
                  // Wave Hello! 7.5s after balloons launch, slide the cute baby in
                  setTimeout(() => {
                      const babyGirl = qs('#baby-girl-container');
                      if(babyGirl) babyGirl.classList.add('slide-in');
                  }, 7500);

              }, totalDelay);

          }, 1500); 
          
      }, 1500);
    }

    /* ===== 4-CORNER ADVANCED CANNON BLAST ===== */
    function fireFourCornerBlast() {
      if (reducedMotion || typeof confetti !== 'function') return;
      
      const duration = 4 * 1000;
      const animationEnd = Date.now() + duration;

      const interval = setInterval(() => {
        const timeLeft = animationEnd - Date.now();
        if (timeLeft <= 0) return clearInterval(interval);

        const pCount = 8;
        const cColors = ['#d4af37', '#e6ca7b', '#ffffff'];
        const settings = { particleCount: pCount, spread: 45, colors: cColors, zIndex: 80, gravity: 1.1, shapes: ['square', 'circle'] };

        confetti({ ...settings, origin: { x: 0, y: 0 }, angle: 315, startVelocity: 35 });
        confetti({ ...settings, origin: { x: 1, y: 0 }, angle: 225, startVelocity: 35 });
        confetti({ ...settings, origin: { x: 0, y: 1 }, angle: 45, startVelocity: 60 });
        confetti({ ...settings, origin: { x: 1, y: 1 }, angle: 135, startVelocity: 60 });
        
      }, 300); 
    }

    /* ===== BIG RED HEART BALLOONS ===== */
    function fireHeartBalloons() {
        const container = document.createElement('div');
        container.style.position = 'fixed';
        container.style.inset = '0';
        container.style.pointerEvents = 'none';
        container.style.zIndex = '90';
        container.style.overflow = 'hidden';
        document.body.appendChild(container);

        for (let i = 0; i < 30; i++) {
            setTimeout(() => {
                const balloonWrapper = document.createElement('div');
                balloonWrapper.className = 'balloon-anim';
                balloonWrapper.style.left = (Math.random() * 100) + 'vw';
                
                const scale = 0.6 + Math.random() * 0.8;
                const drift = (Math.random() - 0.5) * 300;
                balloonWrapper.style.setProperty('--drift', drift + 'px');
                
                balloonWrapper.innerHTML = `
                    <div style="transform: scale(${scale}); transform-origin: bottom center;">
                        <svg width="80" height="80" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="filter: drop-shadow(0px 10px 10px rgba(0,0,0,0.6));">
                            <defs>
                                <radialGradient id="balloonGrad${i}" cx="30%" cy="30%" r="70%">
                                    <stop offset="0%" stop-color="#ff8080" />
                                    <stop offset="50%" stop-color="#e60000" />
                                    <stop offset="100%" stop-color="#990000" />
                                </radialGradient>
                            </defs>
                            <path fill="url(#balloonGrad${i})" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                        </svg>
                        <div style="width: 2px; height: 60px; background: rgba(255,255,255,0.3); margin: 0 auto; margin-top: -8px;"></div>
                    </div>
                `;
                container.appendChild(balloonWrapper);
                
                setTimeout(() => balloonWrapper.remove(), 8500); 
            }, Math.random() * 2500); 
        }
    }

    /* ===== INITIALIZATION ===== */
    (function init() {
      initCanvas();
      renderName(CONFIG.ceremonyName);

      elements.letterN?.addEventListener('click', triggerEntrance, { passive: true });
    })();
  </script>
</body>
