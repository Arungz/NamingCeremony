<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Grand Beginning | Naming Ceremony</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Montserrat:wght@200;300;400&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            background-color: #050505; /* Deep rich black base */
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Ambient Starlight Background */
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.6;
        }

        /* --- GOLD FOIL SHIMMER EFFECT --- */
        .gold-shimmer {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 4s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* --- STAGE 1: CINEMATIC GATES --- */
        #intro-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
        }

        .gate {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            box-shadow: inset 0 0 100px rgba(0,0,0,1);
            transition: transform 3s cubic-bezier(0.645, 0.045, 0.355, 1);
            z-index: 101;
        }

        .gate.left { 
            left: 0; 
            border-right: 2px solid rgba(191, 149, 63, 0.3); 
            transform-origin: left;
        }
        .gate.right { 
            right: 0; 
            border-left: 2px solid rgba(191, 149, 63, 0.3); 
            transform-origin: right;
        }

        .gate.open-left { transform: rotateY(-100deg); }
        .gate.open-right { transform: rotateY(100deg); }

        /* The Majestic 'N' */
        .seal-wrapper {
            position: relative;
            z-index: 102;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #letter-N {
            font-family: 'Cinzel Decorative', serif;
            font-size: 90px;
            font-weight: 700;
            color: #111;
            background: linear-gradient(135deg, #fcf6ba 0%, #bf953f 100%);
            width: 200px;
            height: 200px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 0 40px rgba(191, 149, 63, 0.4), inset 0 0 20px rgba(255,255,255,0.6);
            border: 2px solid #fff;
            transition: all 0.5s ease;
            position: relative;
        }

        #letter-N::after {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border-radius: 50%;
            border: 2px solid rgba(191, 149, 63, 0.5);
            animation: pulseRing 2s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
        }

        @keyframes pulseRing {
            0% { transform: scale(0.9); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        .click-hint {
            margin-top: 30px;
            font-size: 12px;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            animation: fadeInOut 2s infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* --- STAGE 2: PREMIUM GLASS TIMER --- */
        #timer-screen {
            position: absolute;
            text-align: center;
            z-index: 50;
            opacity: 0;
            transition: opacity 2s ease;
            display: none;
        }

        #timer-screen h2 {
            font-family: 'Cinzel Decorative', serif;
            font-size: 32px;
            margin-bottom: 50px;
            letter-spacing: 4px;
        }

        .timer-box {
            display: flex;
            gap: 40px;
            justify-content: center;
        }

        .time-unit {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(191, 149, 63, 0.2);
            padding: 35px 25px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255,255,255,0.1);
            min-width: 140px;
        }

        .time-unit div {
            font-family: 'Montserrat', sans-serif;
            font-weight: 200;
            font-size: 65px;
            line-height: 1;
        }

        .time-unit span {
            display: block;
            font-size: 12px;
            color: #888;
            margin-top: 15px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* --- STAGE 3: THE COUNTDOWN --- */
        #countdown-screen {
            position: absolute;
            font-family: 'Cinzel Decorative', serif;
            font-size: 280px;
            z-index: 60;
            display: none;
            text-shadow: 0 0 80px rgba(191, 149, 63, 0.6);
            animation: cinematicPulse 1s infinite;
        }

        @keyframes cinematicPulse {
            0% { transform: scale(0.9); opacity: 0; filter: blur(10px); }
            50% { transform: scale(1.1); opacity: 1; filter: blur(0px); }
            100% { transform: scale(1.3); opacity: 0; filter: blur(5px); }
        }

        /* --- STAGE 4: GRAND REVEAL --- */
        #reveal-screen {
            position: absolute;
            text-align: center;
            z-index: 70;
            display: none;
        }

        #reveal-screen h3 {
            font-weight: 300;
            font-size: 20px;
            letter-spacing: 8px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 40px;
            opacity: 0;
            transform: translateY(-20px);
            animation: dropIn 2s forwards 0.5s;
            text-transform: uppercase;
        }

        .name-container {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .letter {
            font-family: 'Cinzel Decorative', serif;
            font-size: 140px;
            font-weight: 700;
            opacity: 0;
            transform: scale(0.8) translateY(60px) rotateX(-45deg);
            transition: all 1s cubic-bezier(0.25, 1, 0.5, 1);
            text-shadow: 0 20px 40px rgba(0,0,0,0.9);
        }

        .letter.show {
            opacity: 1;
            transform: scale(1) translateY(0) rotateX(0deg);
        }

        @keyframes dropIn {
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <div id="intro-container">
        <div class="gate left" id="gate-left"></div>
        <div class="gate right" id="gate-right"></div>
        
        <div class="seal-wrapper" id="seal-wrapper">
            <div id="letter-N" onclick="triggerEntrance()">N</div>
            <div class="click-hint">Click to Enter</div>
        </div>
    </div>

    <div id="timer-screen">
        <h2 class="gold-shimmer">The Journey Unfolds In</h2>
        <div class="timer-box">
            <div class="time-unit"><div id="days" class="gold-shimmer">00</div><span>Days</span></div>
            <div class="time-unit"><div id="hours" class="gold-shimmer">00</div><span>Hours</span></div>
            <div class="time-unit"><div id="mins" class="gold-shimmer">00</div><span>Minutes</span></div>
            <div class="time-unit"><div id="secs" class="gold-shimmer">00</div><span>Seconds</span></div>
        </div>
    </div>

    <div id="countdown-screen" class="gold-shimmer">5</div>

    <div id="reveal-screen">
        <h3>Welcome To The World</h3>
        <div class="name-container" id="baby-name">
            <div class="letter gold-shimmer">A</div>
            <div class="letter gold-shimmer">R</div>
            <div class="letter gold-shimmer">Y</div>
            <div class="letter gold-shimmer">A</div>
            <div class="letter gold-shimmer">N</div>
        </div>
    </div>

    <script>
        // --- 1. BACKGROUND STARLIGHT ENGINE ---
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.speedX = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if(this.y > canvas.height) this.y = 0;
                if(this.y < 0) this.y = canvas.height;
                if(this.x > canvas.width) this.x = 0;
                if(this.x < 0) this.x = canvas.width;
            }
            draw() {
                ctx.fillStyle = 'rgba(191, 149, 63, 0.8)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        function initParticles() {
            for (let i = 0; i < 150; i++) particlesArray.push(new Particle());
        }
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }
        initParticles();
        animateParticles();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // --- 2. CORE LOGIC & TIMERS ---
        // EVENT DATE: Set to 10 seconds for immediate viewing!
        let eventDate = new Date();
        eventDate.setSeconds(eventDate.getSeconds() + 10); 
        let countdownInterval;

        function triggerEntrance() {
            let seal = document.getElementById('seal-wrapper');
            // Shockwave explosion effect
            seal.style.transform = 'scale(4)';
            seal.style.opacity = '0';
            seal.style.filter = 'blur(10px)';
            
            setTimeout(() => {
                document.getElementById('gate-left').classList.add('open-left');
                document.getElementById('gate-right').classList.add('open-right');
            }, 400);

            setTimeout(() => {
                document.getElementById('intro-container').style.display = 'none';
                let timerScreen = document.getElementById('timer-screen');
                timerScreen.style.display = 'block';
                setTimeout(() => timerScreen.style.opacity = '1', 50);
                startTimer();
            }, 3000);
        }

        function startTimer() {
            countdownInterval = setInterval(() => {
                let now = new Date().getTime();
                let distance = eventDate - now;

                if (distance <= 0) {
                    clearInterval(countdownInterval);
                    let timerScreen = document.getElementById('timer-screen');
                    timerScreen.style.opacity = '0'; 
                    
                    setTimeout(() => {
                        timerScreen.style.display = 'none';
                        startFinalCountdown(); 
                    }, 2000); // 2 seconds fade out for elegance
                    return;
                }

                let days = Math.floor(distance / (1000 * 60 * 60 * 24));
                let hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                let seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById('days').innerText = days < 10 ? '0' + days : days;
                document.getElementById('hours').innerText = hours < 10 ? '0' + hours : hours;
                document.getElementById('mins').innerText = minutes < 10 ? '0' + minutes : minutes;
                document.getElementById('secs').innerText = seconds < 10 ? '0' + seconds : seconds;

            }, 1000);
        }

        function startFinalCountdown() {
            let countScreen = document.getElementById('countdown-screen');
            countScreen.style.display = 'block';
            let count = 5;
            countScreen.innerText = count;

            let finalTimer = setInterval(() => {
                count--;
                if (count > 0) {
                    countScreen.innerText = count;
                } else if (count === 0) {
                    countScreen.innerText = "0";
                } else {
                    clearInterval(finalTimer);
                    countScreen.style.display = 'none';
                    triggerGrandReveal();
                }
            }, 1000);
        }

        function triggerGrandReveal() {
            document.getElementById('reveal-screen').style.display = 'block';
            let letters = document.querySelectorAll('.letter');
            
            // Dramatic letter-by-letter reveal
            letters.forEach((letter, index) => {
                setTimeout(() => {
                    letter.classList.add('show');
                }, index * 400); 
            });

            // Trigger the massive majestic showers perfectly timed with the final letter
            setTimeout(() => {
                fireMajesticShowers();
            }, (letters.length * 400) + 100);
        }

        function fireMajesticShowers() {
            var duration = 12 * 1000; // 12 seconds of celebration
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 55, spread: 360, ticks: 120, zIndex: 100 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 80 * (timeLeft / duration);
                
                // Left Cannons
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInRange(0.0, 0.2), y: Math.random() - 0.2 },
                    colors: ['#bf953f', '#fcf6ba', '#ffffff'],
                    disableForReducedMotion: true
                }));
                // Right Cannons
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInRange(0.8, 1.0), y: Math.random() - 0.2 },
                    colors: ['#bf953f', '#fcf6ba', '#ffffff'],
                    disableForReducedMotion: true
                }));
            }, 200);
        }
    </script>
</body>
</html>
