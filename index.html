<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>A Grand Beginning | Naming Ceremony</title>

  <script defer src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Cinzel+Decorative:wght@700&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet" />

  <style>
    /* ===== VARIABLES & RESETS ===== */
    :root {
      --bg: #050505;
      --gold-1: #bf953f;
      --gold-2: #fdf5c9;
      --gold-3: #b38728;
      --muted: rgba(255, 255, 255, 0.5);
      --glass: rgba(20, 20, 20, 0.4);
      --glass-border: rgba(191, 149, 63, 0.3);
      --safe-area-top: env(safe-area-inset-top);
      --safe-area-bottom: env(safe-area-inset-bottom);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    
    body {
      font-family: 'Montserrat', sans-serif;
      /* Deep radial background for a premium studio feel */
      background: radial-gradient(circle at 50% 50%, #1a1c20 0%, #050505 100%);
      color: #fff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding-top: var(--safe-area-top);
      padding-bottom: var(--safe-area-bottom);
      overflow: hidden;
      perspective: 1500px;
    }

    /* Subtle atmospheric noise */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
      z-index: 0;
      pointer-events: none;
    }

    /* ===== CANVAS BACKGROUND ===== */
    #canvas-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      opacity: 0.5;
      pointer-events: none;
    }

    /* ===== GOLD SHIMMER ===== */
    .gold-shimmer {
      background: linear-gradient(90deg, var(--gold-1), var(--gold-2), var(--gold-3), var(--gold-2), var(--gold-1));
      background-size: 200% auto;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      animation: shine 4s linear infinite;
    }
    @keyframes shine { to { background-position: 200% center; } }

    /* ===== INTRO CONTAINER ===== */
    #scene-container {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transform-style: preserve-3d;
      transition: transform 3.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* ===== HEAVY 3D GATES ===== */
    .gate {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, #0a0a0a, #1a1a1a, #0a0a0a);
      box-shadow: inset 0 0 80px rgba(0,0,0,1), 0 0 50px rgba(0,0,0,0.8);
      transition: transform 3.5s cubic-bezier(0.5, 0, 0.1, 1);
      z-index: 101;
      border-top: 5px solid #222;
      border-bottom: 5px solid #222;
    }
    .gate.left { 
      left: 0; 
      transform-origin: left;
      border-right: 8px solid var(--gold-1); 
    }
    .gate.right { 
      right: 0; 
      transform-origin: right;
      border-left: 8px solid var(--gold-1); 
    }
    .gate.open-left { transform: rotateY(-105deg); }
    .gate.open-right { transform: rotateY(105deg); }

    /* ===== MACHINED GOLD SEAL ===== */
    .seal-wrapper {
      position: relative;
      z-index: 102;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
      transition: all 1.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    #letter-N {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(50px, 8vw, 110px);
      width: clamp(140px, 26vw, 240px);
      height: clamp(140px, 26vw, 240px);
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      /* Conic gradient for realistic metallic reflection */
      background: conic-gradient(from 0deg, var(--gold-2), var(--gold-3), #fff, var(--gold-3), var(--gold-2));
      color: #3d2b07;
      text-shadow: 1px 1px 2px rgba(255,255,255,0.8), -1px -1px 2px rgba(0,0,0,0.4);
      cursor: pointer;
      box-shadow: 
        inset 0 0 20px rgba(0,0,0,0.5), 
        0 20px 40px rgba(0,0,0,0.9), 
        0 0 0 8px #111, 
        0 0 0 12px var(--gold-1);
      transition: transform 300ms ease, box-shadow 300ms ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      font-weight: 700;
      position: relative;
      overflow: hidden;
    }
    
    #letter-N:hover { transform: scale(1.05); }
    #letter-N:active { transform: scale(0.95); }

    /* Sweeping light reflection on the gold coin */
    #letter-N::after {
      content: '';
      position: absolute;
      top: -50%; left: -50%; width: 200%; height: 200%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.5) 50%, rgba(255,255,255,0) 100%);
      transform: rotate(45deg) translateX(-100%);
      animation: lightSweep 4s infinite cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes lightSweep {
      0% { transform: rotate(45deg) translateX(-100%); }
      100% { transform: rotate(45deg) translateX(100%); }
    }

    .click-hint {
      font-size: 13px;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: var(--muted);
      animation: fadeInOut 2s infinite;
    }
    @keyframes fadeInOut { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

    /* ===== FROSTED GLASS TIMER SCREEN ===== */
    #timer-screen {
      position: absolute;
      z-index: 50;
      opacity: 0;
      transform: scale(0.9);
      display: none;
      transition: opacity 1.5s ease, transform 1.5s ease;
      text-align: center;
      width: 100%;
      padding: clamp(12px, 2.5vw, 32px);
    }
    #timer-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(22px, 4vw, 36px);
      margin-bottom: clamp(30px, 4vw, 50px);
      letter-spacing: 6px;
      text-transform: uppercase;
      text-shadow: 0 5px 15px rgba(0,0,0,0.8);
    }
    .timer-box { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; }
    .time-unit {
      background: var(--glass);
      backdrop-filter: blur(20px) saturate(120%);
      -webkit-backdrop-filter: blur(20px) saturate(120%);
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      border-left: 1px solid rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid rgba(0, 0, 0, 0.6);
      border-right: 1px solid rgba(0, 0, 0, 0.6);
      padding: 30px 20px;
      border-radius: 16px;
      min-width: 110px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
    }
    .time-unit div { 
      font-weight: 300; 
      font-size: clamp(40px, 8vw, 75px); 
      line-height: 1; 
      text-shadow: 0 4px 10px rgba(0,0,0,0.6);
    }
    .time-unit span { 
      display: block; 
      font-size: 12px; 
      color: var(--gold-1); 
      margin-top: 15px; 
      letter-spacing: 3px; 
      text-transform: uppercase; 
      font-family: 'Cinzel', serif;
    }

    /* ===== HEARTBEAT COUNTDOWN SCREEN ===== */
    #countdown-screen {
      position: absolute;
      z-index: 60;
      display: none;
      font-family: 'Cinzel', serif;
      color: transparent;
      -webkit-text-stroke: 3px var(--gold-1);
      text-shadow: 0 0 80px rgba(191, 149, 63, 0.5);
      font-size: clamp(120px, 30vw, 320px);
      pointer-events: none;
      animation: heartbeatPulse 1s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
    }
    @keyframes heartbeatPulse {
      0% { transform: scale(0.8); opacity: 0; filter: blur(10px); }
      20% { transform: scale(1.1); opacity: 1; filter: blur(0px); }
      100% { transform: scale(1.4); opacity: 0; filter: blur(5px); }
    }

    /* ===== 3D EXTRUDED REVEAL SCREEN ===== */
    #reveal-screen { position: absolute; z-index: 70; display: none; text-align: center; padding: 20px; perspective: 1000px; }
    #reveal-subtitle {
      font-family: 'Cinzel', serif;
      font-weight: 400;
      font-size: clamp(16px, 3.2vw, 24px);
      letter-spacing: 12px;
      color: var(--gold-2);
      margin-bottom: 40px;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(-20px);
      animation: floatIn 2s forwards 0.5s;
    }
    @keyframes floatIn { to { opacity: 1; transform: translateY(0); } }

    .name-container { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
    
    .letter {
      font-family: 'Cinzel', serif;
      font-size: clamp(60px, 15vw, 180px);
      font-weight: 800;
      color: var(--gold-2);
      opacity: 0;
      transform: translateZ(-200px) rotateX(-90deg);
      transition: all 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      /* Advanced 3D Extrusion */
      text-shadow: 
        0 1px 0 #b38728, 0 2px 0 #9f7622, 0 3px 0 #8c661c,
        0 4px 0 #795717, 0 5px 0 #674a12, 0 6px 0 #563e0e,
        0 20px 40px rgba(0,0,0,0.9);
      -webkit-font-smoothing: antialiased;
    }
    .letter.show { opacity: 1; transform: translateZ(0) rotateX(0deg); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 520px) {
      .timer-box { gap: 15px; }
      .time-unit { padding: 20px 15px; min-width: 85px; }
      .click-hint { letter-spacing: 5px; }
    }

    /* ===== REDUCED MOTION ===== */
    @media (prefers-reduced-motion: reduce) {
      .gold-shimmer, #letter-N::after, .click-hint, #countdown-screen, .letter, .gate, #scene-container {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 1ms !important;
      }
      #canvas-bg { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <canvas id="canvas-bg" aria-hidden="true"></canvas>

  <div id="scene-container" aria-hidden="false">
    <div class="gate left" id="gate-left" aria-hidden="true"></div>
    <div class="gate right" id="gate-right" aria-hidden="true"></div>

    <div class="seal-wrapper" id="seal-wrapper">
      <div id="letter-N" role="button" tabindex="0" aria-pressed="false" aria-label="Open the ceremony welcome" title="Open the ceremony">N</div>
      <div class="click-hint gold-shimmer" id="click-hint">Click to Enter</div>
    </div>
  </div>

  <div id="timer-screen" aria-live="polite" aria-atomic="true">
    <h2 id="timer-title" class="gold-shimmer">The Journey Unfolds In</h2>
    <div class="timer-box" role="group" aria-label="Countdown timer">
      <div class="time-unit"><div id="days">00</div><span id="label-days">Days</span></div>
      <div class="time-unit"><div id="hours">00</div><span id="label-hours">Hours</span></div>
      <div class="time-unit"><div id="mins">00</div><span id="label-mins">Minutes</span></div>
      <div class="time-unit"><div id="secs">00</div><span id="label-secs">Seconds</span></div>
    </div>
  </div>

  <div id="countdown-screen" aria-live="assertive" aria-atomic="true">5</div>

  <div id="reveal-screen" aria-hidden="true">
    <h3 id="reveal-subtitle">Welcome To The World</h3>
    <div class="name-container" id="baby-name" aria-hidden="true"></div>
  </div>

  <noscript>
    <div style="position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; background: #050505; z-index: 9999; padding: 20px; text-align: center;">
      <div style="color: #d4af37;">
        <h2 style="font-family: Cinzel, serif; margin-bottom: 12px;">Welcome</h2>
        <p>Please enable JavaScript to view the ceremony animation.</p>
      </div>
    </div>
  </noscript>

  <script>
    'use strict';

    /* ===== CONFIGURATION ===== */
    const CONFIG = {
      ceremonyName: window.__ceremonyName || 'ARYAN',
      ceremonyEventDate: window.__ceremonyEventDate || null,
      timerDemoSeconds: 12 // Increased slightly to allow the majestic gate opening to finish
    };

    /* ===== UTILITIES ===== */
    const qs = (sel, root = document) => root ? root.querySelector(sel) : null;
    const qsa = (sel, root = document) => root ? Array.from(root.querySelectorAll(sel)) : [];
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    /* ===== LOCALIZATION ===== */
    const i18n = {
      en: { timerTitle: 'The Journey Unfolds In', days: 'Days', hours: 'Hours', minutes: 'Minutes', seconds: 'Seconds', clickHint: 'Click to Enter', revealSubtitle: 'Welcome To The World' },
      es: { timerTitle: 'El viaje comienza en', days: 'Días', hours: 'Horas', minutes: 'Minutos', seconds: 'Segundos', clickHint: 'Toca para entrar', revealSubtitle: 'Bienvenido al mundo' },
      fr: { timerTitle: 'Le voyage commence dans', days: 'Jours', hours: 'Heures', minutes: 'Minutes', seconds: 'Secondes', clickHint: 'Cliquez pour entrer', revealSubtitle: 'Bienvenue au monde' }
    };

    function detectLang() {
      const nav = (navigator.languages && navigator.languages[0]) || navigator.language || 'en';
      const code = String(nav).split('-')[0].toLowerCase();
      return i18n[code] ? code : 'en';
    }

    /* ===== ELEMENT CACHE ===== */
    const elements = {
      letterN: qs('#letter-N'),
      sealWrapper: qs('#seal-wrapper'),
      gateLeft: qs('#gate-left'),
      gateRight: qs('#gate-right'),
      sceneContainer: qs('#scene-container'),
      timerScreen: qs('#timer-screen'),
      countdownScreen: qs('#countdown-screen'),
      revealScreen: qs('#reveal-screen'),
      babyNameContainer: qs('#baby-name'),
      clickHint: qs('#click-hint'),
      timerTitle: qs('#timer-title'),
      labelDays: qs('#label-days'),
      labelHours: qs('#label-hours'),
      labelMins: qs('#label-mins'),
      labelSecs: qs('#label-secs'),
      canvas: qs('#canvas-bg')
    };

    /* ===== CANVAS BACKGROUND PARTICLES ===== */
    let animationId = null;
    let particlesArray = [];

    function initCanvas() {
      if (!elements.canvas) return;
      const ctx = elements.canvas.getContext('2d', { alpha: true });
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      elements.canvas.width = Math.round(window.innerWidth * dpr);
      elements.canvas.height = Math.round(window.innerHeight * dpr);
      elements.canvas.style.width = window.innerWidth + 'px';
      elements.canvas.style.height = window.innerHeight + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      class Particle {
        constructor() {
          this.x = Math.random() * window.innerWidth;
          this.y = Math.random() * window.innerHeight;
          this.size = Math.random() * 2;
          this.speedY = Math.random() * 0.3 - 0.15;
          this.speedX = Math.random() * 0.3 - 0.15;
        }
        update() {
          this.x += this.speedX;
          this.y += this.speedY;
          if (this.y > window.innerHeight) this.y = 0;
          if (this.y < 0) this.y = window.innerHeight;
          if (this.x > window.innerWidth) this.x = 0;
          if (this.x < 0) this.x = window.innerWidth;
        }
        draw() {
          ctx.fillStyle = 'rgba(212, 175, 55, 0.6)';
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      particlesArray = [];
      for (let i = 0; i < 150; i++) particlesArray.push(new Particle());

      function animate() {
        ctx.clearRect(0, 0, elements.canvas.width, elements.canvas.height);
        for (const p of particlesArray) {
          p.update();
          p.draw();
        }
        animationId = requestAnimationFrame(animate);
      }

      if (!reducedMotion) animate();
    }

    /* ===== APPLY LANGUAGE ===== */
    function applyLang(code) {
      const lang = i18n[code] || i18n.en;
      if (elements.timerTitle) elements.timerTitle.textContent = lang.timerTitle;
      if (elements.labelDays) elements.labelDays.textContent = lang.days;
      if (elements.labelHours) elements.labelHours.textContent = lang.hours;
      if (elements.labelMins) elements.labelMins.textContent = lang.minutes;
      if (elements.labelSecs) elements.labelSecs.textContent = lang.seconds;
      if (elements.clickHint) elements.clickHint.textContent = lang.clickHint;
      const subtitle = qs('#reveal-subtitle');
      if (subtitle) subtitle.textContent = lang.revealSubtitle;
    }

    /* ===== RENDER NAME ===== */
    function renderName(nameStr) {
      const container = elements.babyNameContainer;
      if (!container) return;
      container.innerHTML = '';
      const final = (nameStr && nameStr.trim().length > 0) ? nameStr.trim().toUpperCase() : 'ARYAN';
      for (const ch of Array.from(final)) {
        const el = document.createElement('div');
        el.className = 'letter';
        el.textContent = ch;
        el.setAttribute('aria-hidden', 'true');
        container.appendChild(el);
      }
    }

    /* ===== TIMER LOGIC ===== */
    let countdownInterval = null;
    let finalTimer = null;
    let eventDate = CONFIG.ceremonyEventDate || (function() {
      const d = new Date();
      d.setSeconds(d.getSeconds() + CONFIG.timerDemoSeconds);
      return d;
    })();

    function safeSetText(id, text) {
      const el = document.getElementById(id);
      if (el) el.textContent = text;
    }

    function startTimer() {
      if (countdownInterval) clearInterval(countdownInterval);
      function updateOnce() {
        const now = Date.now();
        const dist = eventDate.getTime() - now;
        if (dist <= 0) {
          clearInterval(countdownInterval);
          if (elements.timerScreen) {
            elements.timerScreen.style.transform = 'scale(1.1)';
            elements.timerScreen.style.opacity = '0';
          }
          setTimeout(() => {
            if (elements.timerScreen) elements.timerScreen.style.display = 'none';
            startFinalCountdown();
          }, 1500); // Wait for fade out
          return;
        }
        const days = Math.floor(dist / (1000 * 60 * 60 * 24));
        const hours = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((dist % (1000 * 60)) / 1000);
        safeSetText('days', days < 10 ? '0' + days : String(days));
        safeSetText('hours', hours < 10 ? '0' + hours : String(hours));
        safeSetText('mins', minutes < 10 ? '0' + minutes : String(minutes));
        safeSetText('secs', seconds < 10 ? '0' + seconds : String(seconds));
      }
      updateOnce();
      countdownInterval = setInterval(updateOnce, 1000);
    }

    function startFinalCountdown() {
      if (elements.countdownScreen) elements.countdownScreen.style.display = 'block';
      let count = 5;
      
      // Trigger first heartbeat immediately
      if (elements.countdownScreen) elements.countdownScreen.textContent = String(count);

      finalTimer = setInterval(() => {
        count--;
        if (count > 0) {
          if (elements.countdownScreen) {
             // Reset animation to trigger heartbeat pulse perfectly on the second
             elements.countdownScreen.style.animation = 'none';
             void elements.countdownScreen.offsetWidth; // Trigger reflow
             elements.countdownScreen.style.animation = 'heartbeatPulse 1s infinite cubic-bezier(0.215, 0.61, 0.355, 1)';
             elements.countdownScreen.textContent = String(count);
          }
        } else {
          clearInterval(finalTimer);
          if (elements.countdownScreen) elements.countdownScreen.style.display = 'none';
          triggerGrandReveal();
        }
      }, 1000);
    }

    /* ===== ENTRANCE & REVEAL ===== */
    function triggerEntrance() {
      if (!elements.letterN || elements.letterN.getAttribute('data-activated') === 'true') return;
      elements.letterN.setAttribute('data-activated', 'true');
      elements.letterN.setAttribute('aria-pressed', 'true');
      
      // Camera Push
      if (elements.sceneContainer) {
        elements.sceneContainer.style.transform = 'scale(1.2)';
      }

      // Medallion Sink
      if (!reducedMotion && elements.sealWrapper) {
        elements.sealWrapper.style.transform = 'translateZ(-100px) scale(0.8)';
        elements.sealWrapper.style.opacity = '0';
      }

      // Heavy Gates Swing (Delayed slightly for realism)
      setTimeout(() => {
        elements.gateLeft?.classList.add('open-left');
        elements.gateRight?.classList.add('open-right');
      }, 500);

      // Clean up and show Timer
      setTimeout(() => {
        elements.sceneContainer && (elements.sceneContainer.style.display = 'none');
        elements.timerScreen && (elements.timerScreen.style.display = 'block');
        void elements.timerScreen.offsetWidth; // Reflow
        elements.timerScreen && (elements.timerScreen.style.opacity = '1');
        elements.timerScreen && (elements.timerScreen.style.transform = 'scale(1)');
        startTimer();
      }, 3500); // Matches the 3.5s gate swing transition
    }

    function triggerGrandReveal() {
      elements.revealScreen && (elements.revealScreen.style.display = 'block');
      elements.revealScreen && elements.revealScreen.setAttribute('aria-hidden', 'false');
      elements.babyNameContainer && elements.babyNameContainer.setAttribute('aria-hidden', 'false');
      
      const letters = qsa('.letter', elements.babyNameContainer);
      letters.forEach((letter, idx) => {
        setTimeout(() => {
          letter.classList.add('show');
          letter.setAttribute('aria-hidden', 'false');
        }, idx * (reducedMotion ? 60 : 350)); // Physical snap-in timing
      });
      
      const delay = (letters.length * (reducedMotion ? 60 : 350)) + 200;
      setTimeout(() => { fireRealisticPhysicsShowers(); }, delay);
    }

    /* ===== ADVANCED PHYSICS CONFETTI ===== */
    function fireRealisticPhysicsShowers() {
      if (reducedMotion || typeof confetti !== 'function') return;
      
      const duration = 15 * 1000;
      const animationEnd = Date.now() + duration;

      function randomInRange(min, max) { return Math.random() * (max - min) + min; }

      const interval = setInterval(() => {
        const timeLeft = animationEnd - Date.now();
        if (timeLeft <= 0) return clearInterval(interval);

        const particleCount = Math.floor(60 * (timeLeft / duration));
        
        // 1. METALLIC FOIL (Heavy, drops fast, square cuts)
        confetti({
            particleCount: particleCount / 2,
            origin: { x: randomInRange(0.0, 0.3), y: Math.random() - 0.2 },
            colors: ['#d4af37', '#e6ca7b', '#b38728'],
            shapes: ['square'],
            gravity: 1.2,
            scalar: 1.2,
            drift: randomInRange(-0.4, 0.4),
            ticks: 300,
            zIndex: 100
        });
        confetti({
            particleCount: particleCount / 2,
            origin: { x: randomInRange(0.7, 1.0), y: Math.random() - 0.2 },
            colors: ['#d4af37', '#e6ca7b', '#b38728'],
            shapes: ['square'],
            gravity: 1.2,
            scalar: 1.2,
            drift: randomInRange(-0.4, 0.4),
            ticks: 300,
            zIndex: 100
        });

        // 2. ROSE PETALS (Soft, drifts wildly, slow float)
        confetti({
            particleCount: particleCount / 2,
            origin: { x: randomInRange(0.0, 0.3), y: Math.random() - 0.2 },
            colors: ['#ffc0cb', '#ffb6c1', '#ffffff'],
            shapes: ['circle'],
            gravity: 0.6,
            scalar: 1.5,
            drift: randomInRange(-1.5, 1.5),
            ticks: 400,
            zIndex: 99
        });
        confetti({
            particleCount: particleCount / 2,
            origin: { x: randomInRange(0.7, 1.0), y: Math.random() - 0.2 },
            colors: ['#ffc0cb', '#ffb6c1', '#ffffff'],
            shapes: ['circle'],
            gravity: 0.6,
            scalar: 1.5,
            drift: randomInRange(-1.5, 1.5),
            ticks: 400,
            zIndex: 99
        });
      }, 250);
    }

    /* ===== INITIALIZATION ===== */
    (function init() {
      initCanvas();
      const lang = detectLang();
      applyLang(lang);
      renderName(CONFIG.ceremonyName);

      // Wire events
      elements.letterN?.addEventListener('click', triggerEntrance, { passive: true });
      elements.letterN?.addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter' || ev.key === ' ') {
          ev.preventDefault();
          triggerEntrance();
        }
      }, { passive: false });

      // Cleanup on page hide
      window.addEventListener('pagehide', () => {
        if (animationId) cancelAnimationFrame(animationId);
        if (countdownInterval) clearInterval(countdownInterval);
        if (finalTimer) clearInterval(finalTimer);
      }, { passive: true });
    })();
  </script>
</body>
</html>
