<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grand Reveal | Hyper-Realistic</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Cormorant+Garamond:wght@300;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            /* Realistic dark marble/obsidian background */
            background: radial-gradient(circle at 50% 50%, #1a1c20 0%, #0a0b0d 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1500px; /* Deep 3D space */
        }

        /* --- BACKGROUND NOISE FOR REALISM --- */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            z-index: 0;
            pointer-events: none;
        }

        /* --- STAGE 1: THE PHYSICAL GATES --- */
        #scene-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transform-style: preserve-3d;
            transition: transform 3s cubic-bezier(0.25, 1, 0.5, 1); /* Camera push transition */
        }

        .gate {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            /* Brushed dark metal texture */
            background: linear-gradient(90deg, #111, #222, #181818);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.9), 0 0 100px rgba(0,0,0,1);
            transition: transform 4s cubic-bezier(0.5, 0, 0.1, 1); /* Heavy swing */
            z-index: 101;
            border-top: 10px solid #2a2a2a;
            border-bottom: 10px solid #2a2a2a;
        }

        .gate.left { 
            left: 0; 
            transform-origin: left;
            border-right: 15px solid #d4af37; /* Heavy gold trim */
        }
        .gate.right { 
            right: 0; 
            transform-origin: right;
            border-left: 15px solid #d4af37;
        }

        .gate.open-left { transform: rotateY(-110deg); }
        .gate.open-right { transform: rotateY(110deg); }

        /* --- THE MACHINED GOLD MEDALLION --- */
        .medallion-wrapper {
            position: relative;
            z-index: 102;
            transition: all 1s ease;
        }

        #letter-N {
            font-family: 'Cinzel', serif;
            font-size: 110px;
            font-weight: 800;
            color: #5a4010;
            text-shadow: 1px 1px 1px rgba(255,255,255,0.8), -1px -1px 1px rgba(0,0,0,0.5);
            /* Conic gradient simulates light reflecting off a circular machined metal surface */
            background: conic-gradient(from 0deg, #e6ca7b, #b38728, #fdf5c9, #b38728, #e6ca7b);
            width: 240px;
            height: 240px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 
                inset 0 0 20px rgba(0,0,0,0.6), 
                inset 0 0 5px rgba(255,255,255,0.8),
                0 30px 50px rgba(0,0,0,0.8), 
                0 0 0 10px #222, /* Outer dark ring */
                0 0 0 14px #d4af37; /* Outer gold rim */
            position: relative;
            overflow: hidden;
        }

        /* Light sweeping reflection across the gold */
        #letter-N::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(45deg) translateX(-100%);
            animation: lightSweep 4s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes lightSweep {
            0% { transform: rotate(45deg) translateX(-100%); }
            100% { transform: rotate(45deg) translateX(100%); }
        }

        /* --- STAGE 2: PHYSICAL FROSTED GLASS TIMER --- */
        #timer-screen {
            position: absolute;
            text-align: center;
            z-index: 50;
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 2s ease, transform 2s ease;
            display: none;
        }

        #timer-screen h2 {
            font-family: 'Cinzel', serif;
            font-size: 38px;
            margin-bottom: 60px;
            color: #e6ca7b;
            text-transform: uppercase;
            letter-spacing: 6px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }

        .timer-box {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        .time-unit {
            /* Realistic thick frosted glass */
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px) saturate(120%);
            -webkit-backdrop-filter: blur(25px) saturate(120%);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(0, 0, 0, 0.5);
            border-right: 1px solid rgba(0, 0, 0, 0.5);
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(0,0,0,0.2);
            min-width: 150px;
        }

        .time-unit div {
            font-family: 'Cormorant Garamond', serif;
            font-size: 75px;
            font-weight: 300;
            color: #fff;
            line-height: 1;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .time-unit span {
            display: block;
            font-size: 14px;
            color: #d4af37;
            margin-top: 20px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-family: 'Cinzel', serif;
        }

        /* --- STAGE 3: THE COUNTDOWN --- */
        #countdown-screen {
            position: absolute;
            font-family: 'Cinzel', serif;
            font-size: 300px;
            z-index: 60;
            display: none;
            color: transparent;
            -webkit-text-stroke: 4px #d4af37; /* Hollow physical text outline */
            text-shadow: 0 0 100px rgba(212, 175, 55, 0.4);
        }

        /* --- STAGE 4: EXTRUDED 3D REVEAL --- */
        #reveal-screen {
            position: absolute;
            text-align: center;
            z-index: 70;
            display: none;
        }

        #reveal-screen h3 {
            font-family: 'Cinzel', serif;
            font-weight: 400;
            font-size: 22px;
            letter-spacing: 12px;
            color: #e6ca7b;
            margin-bottom: 50px;
            opacity: 0;
            transform: translateY(-30px);
            animation: floatIn 2s forwards 0.5s;
            text-transform: uppercase;
        }

        .name-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            perspective: 1000px;
        }

        .letter {
            font-family: 'Cinzel', serif;
            font-size: 160px;
            font-weight: 800;
            color: #fdf5c9;
            opacity: 0;
            transform: translateZ(-200px) rotateX(-90deg);
            transition: all 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Springy physical snap */
            /* Advanced CSS 3D Extrusion - Makes the text look like a thick gold block */
            text-shadow: 
                0 1px 0 #b38728,
                0 2px 0 #9f7622,
                0 3px 0 #8c661c,
                0 4px 0 #795717,
                0 5px 0 #674a12,
                0 6px 0 #563e0e,
                0 15px 30px rgba(0,0,0,0.9);
        }

        .letter.show {
            opacity: 1;
            transform: translateZ(0) rotateX(0deg);
        }

        @keyframes floatIn {
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div id="scene-container">
        <div class="gate left" id="gate-left"></div>
        <div class="gate right" id="gate-right"></div>
        
        <div class="medallion-wrapper" id="medallion-wrapper">
            <div id="letter-N" onclick="initiateSequence()">N</div>
        </div>
    </div>

    <div id="timer-screen">
        <h2>The Grand Reveal Begins In</h2>
        <div class="timer-box">
            <div class="time-unit"><div id="days">00</div><span>Days</span></div>
            <div class="time-unit"><div id="hours">00</div><span>Hours</span></div>
            <div class="time-unit"><div id="mins">00</div><span>Minutes</span></div>
            <div class="time-unit"><div id="secs">00</div><span>Seconds</span></div>
        </div>
    </div>

    <div id="countdown-screen">5</div>

    <div id="reveal-screen">
        <h3>Welcome To The World</h3>
        <div class="name-container" id="baby-name">
            <div class="letter">A</div>
            <div class="letter">R</div>
            <div class="letter">Y</div>
            <div class="letter">A</div>
            <div class="letter">N</div>
        </div>
    </div>

    <script>
        // EVENT DATE: Set to 10 seconds for testing!
        let eventDate = new Date();
        eventDate.setSeconds(eventDate.getSeconds() + 10); 
        let countdownInterval;

        function initiateSequence() {
            let container = document.getElementById('scene-container');
            let medallion = document.getElementById('medallion-wrapper');
            let leftGate = document.getElementById('gate-left');
            let rightGate = document.getElementById('gate-right');

            // 1. Camera pushes forward (scale up)
            container.style.transform = 'scale(1.2)';
            
            // 2. Medallion sinks and fades
            medallion.style.transform = 'translateZ(-100px) scale(0.8)';
            medallion.style.opacity = '0';

            // 3. Heavy gates swing open after a tiny mechanical delay
            setTimeout(() => {
                leftGate.classList.add('open-left');
                rightGate.classList.add('open-right');
            }, 600);

            // 4. Clean up intro and show timer
            setTimeout(() => {
                container.style.display = 'none';
                let timerScreen = document.getElementById('timer-screen');
                timerScreen.style.display = 'block';
                // Trigger reflow
                void timerScreen.offsetWidth;
                timerScreen.style.opacity = '1';
                timerScreen.style.transform = 'scale(1)';
                startTimer();
            }, 3500); // Waits for the heavy gate swing to finish
        }

        function startTimer() {
            countdownInterval = setInterval(() => {
                let now = new Date().getTime();
                let distance = eventDate - now;

                if (distance <= 0) {
                    clearInterval(countdownInterval);
                    let timerScreen = document.getElementById('timer-screen');
                    
                    // Glass fades away
                    timerScreen.style.opacity = '0'; 
                    timerScreen.style.transform = 'scale(1.1)';
                    
                    setTimeout(() => {
                        timerScreen.style.display = 'none';
                        startFinalCountdown(); 
                    }, 2000); 
                    return;
                }

                let days = Math.floor(distance / (1000 * 60 * 60 * 24));
                let hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                let seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById('days').innerText = days < 10 ? '0' + days : days;
                document.getElementById('hours').innerText = hours < 10 ? '0' + hours : hours;
                document.getElementById('mins').innerText = minutes < 10 ? '0' + minutes : minutes;
                document.getElementById('secs').innerText = seconds < 10 ? '0' + seconds : seconds;

            }, 1000);
        }

        function startFinalCountdown() {
            let countScreen = document.getElementById('countdown-screen');
            countScreen.style.display = 'block';
            let count = 5;
            countScreen.innerText = count;

            let finalTimer = setInterval(() => {
                count--;
                if (count > 0) {
                    // Quick flash effect on change
                    countScreen.style.opacity = '0.5';
                    setTimeout(() => {
                        countScreen.innerText = count;
                        countScreen.style.opacity = '1';
                    }, 100);
                } else if (count === 0) {
                    countScreen.innerText = "0";
                } else {
                    clearInterval(finalTimer);
                    countScreen.style.display = 'none';
                    triggerGrandReveal();
                }
            }, 1000);
        }

        function triggerGrandReveal() {
            document.getElementById('reveal-screen').style.display = 'block';
            let letters = document.querySelectorAll('.letter');
            
            // 3D physical snap-in for letters
            letters.forEach((letter, index) => {
                setTimeout(() => {
                    letter.classList.add('show');
                }, index * 400); 
            });

            setTimeout(() => {
                fireRealisticPhysicsShowers();
            }, (letters.length * 400) + 100);
        }

        function fireRealisticPhysicsShowers() {
            var duration = 15 * 1000; 
            var animationEnd = Date.now() + duration;

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 60 * (timeLeft / duration);
                
                // --- METALLIC FOIL (Heavier, drops faster, reflects light) ---
                confetti({
                    particleCount: particleCount / 2,
                    origin: { x: randomInRange(0.0, 0.3), y: Math.random() - 0.2 },
                    colors: ['#d4af37', '#e6ca7b', '#b38728'],
                    shapes: ['square'], /* Squares mimic cut foil */
                    gravity: 1.2, /* Heavy realistic drop */
                    scalar: 1.2,
                    drift: randomInRange(-0.4, 0.4),
                    ticks: 300
                });

                confetti({
                    particleCount: particleCount / 2,
                    origin: { x: randomInRange(0.7, 1.0), y: Math.random() - 0.2 },
                    colors: ['#d4af37', '#e6ca7b', '#b38728'],
                    shapes: ['square'],
                    gravity: 1.2,
                    scalar: 1.2,
                    drift: randomInRange(-0.4, 0.4),
                    ticks: 300
                });

                // --- ROSE PETALS (Softer, drifts in the wind, slower gravity) ---
                confetti({
                    particleCount: particleCount / 2,
                    origin: { x: randomInRange(0.0, 0.3), y: Math.random() - 0.2 },
                    colors: ['#ffc0cb', '#ffb6c1', '#ffffff'],
                    shapes: ['circle'], /* Circles mimic soft petals */
                    gravity: 0.6, /* Slow, floaty drop */
                    scalar: 1.5,
                    drift: randomInRange(-1, 1), /* High wind drift */
                    ticks: 400
                });

                confetti({
                    particleCount: particleCount / 2,
                    origin: { x: randomInRange(0.7, 1.0), y: Math.random() - 0.2 },
                    colors: ['#ffc0cb', '#ffb6c1', '#ffffff'],
                    shapes: ['circle'],
                    gravity: 0.6,
                    scalar: 1.5,
                    drift: randomInRange(-1, 1),
                    ticks: 400
                });

            }, 250);
        }
    </script>
</body>
</html>
