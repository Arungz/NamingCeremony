<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  
  <meta property="og:title" content="✨ Naming Ceremony ✨" />
  <meta property="og:description" content="You are warmly invited to witness the grand reveal and naming of our little one. Join us for this magical celebration!" />
  <meta property="og:image" content="https://arungz.github.io/NamingCeremony/Images/preview.png" />
  <meta property="og:image:secure_url" content="https://arungz.github.io/NamingCeremony/Images/preview.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url" content="https://arungz.github.io/NamingCeremony/" />
  <meta property="og:type" content="website" />
  
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="✨ Naming Ceremony ✨">
  <meta name="twitter:description" content="You are warmly invited to witness the grand reveal and naming of our little one.">
  <meta name="twitter:image" content="https://arungz.github.io/NamingCeremony/Images/preview.png">
  
  <meta name="theme-color" content="#050505">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Naming Ceremony">
  
  <meta name="description" content="A grand naming ceremony invitation. Join our family to celebrate this magical milestone.">
  <meta name="keywords" content="naming ceremony, baby naming, invitation, grand reveal, celebration, family, premium event">
  <meta name="robots" content="index, follow">
  <meta name="format-detection" content="telephone=no, email=no">
  
  <title>Naming Ceremony ✨</title>
  <link rel="icon" type="image/png" href="Images/ak.png">

  <script defer src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Cinzel+Decorative:wght@700&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet" />

  <style>
    /* ===== VARIABLES & RESETS ===== */
    :root {
      --bg: #050505;
      --gold-1: #bf953f;
      --gold-2: #fdf5c9;
      --gold-3: #b38728;
      --muted: rgba(255, 255, 255, 0.5);
      --glass: rgba(20, 20, 20, 0.4);
      --glass-border: rgba(191, 149, 63, 0.3);
      --safe-area-top: env(safe-area-inset-top);
      --safe-area-bottom: env(safe-area-inset-bottom);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    
    body {
      font-family: 'Montserrat', sans-serif;
      background: radial-gradient(circle at 50% 50%, #1a1c20 0%, #050505 100%);
      color: #fff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding-top: var(--safe-area-top);
      padding-bottom: var(--safe-area-bottom);
      overflow: hidden;
      perspective: 1500px;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
      z-index: 0;
      pointer-events: none;
    }

    /* ===== CANVAS BACKGROUND ===== */
    #canvas-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      opacity: 0.5;
      pointer-events: none;
    }

    /* ===== GOLD SHIMMER ===== */
    .gold-shimmer {
      background: linear-gradient(90deg, var(--gold-1), var(--gold-2), var(--gold-3), var(--gold-2), var(--gold-1));
      background-size: 200% auto;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      animation: shine 4s linear infinite;
    }
    @keyframes shine { to { background-position: 200% center; } }

    /* ===== INTRO CONTAINER ===== */
    #scene-container {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transform-style: preserve-3d;
      transition: transform 3.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* ===== HEAVY 3D GATES ===== */
    .gate {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, #0a0a0a, #1a1a1a, #0a0a0a);
      box-shadow: inset 0 0 80px rgba(0,0,0,1), 0 0 50px rgba(0,0,0,0.8);
      transition: transform 3.5s cubic-bezier(0.5, 0, 0.1, 1);
      z-index: 101;
      border-top: 5px solid #222;
      border-bottom: 5px solid #222;
    }
    .gate.left { 
      left: 0; 
      transform-origin: left;
      border-right: 8px solid var(--gold-1); 
    }
    .gate.right { 
      right: 0; 
      transform-origin: right;
      border-left: 8px solid var(--gold-1); 
    }
    .gate.open-left { transform: rotateY(-105deg); }
    .gate.open-right { transform: rotateY(105deg); }

    /* ===== MACHINED GOLD SEAL ===== */
    .seal-wrapper {
      position: relative;
      z-index: 102;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
      transition: all 1.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    #letter-N {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(50px, 8vw, 110px);
      width: clamp(140px, 26vw, 240px);
      height: clamp(140px, 26vw, 240px);
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      background: conic-gradient(from 0deg, var(--gold-2), var(--gold-3), #fff, var(--gold-3), var(--gold-2));
      color: #3d2b07;
      text-shadow: 1px 1px 2px rgba(255,255,255,0.8), -1px -1px 2px rgba(0,0,0,0.4);
      cursor: pointer;
      box-shadow: 
        inset 0 0 20px rgba(0,0,0,0.5), 
        0 20px 40px rgba(0,0,0,0.9), 
        0 0 0 8px #111, 
        0 0 0 12px var(--gold-1);
      transition: transform 300ms ease, box-shadow 300ms ease;
      user-select: none;
      font-weight: 700;
      position: relative;
      overflow: hidden;
    }
    
    #letter-N:hover { transform: scale(1.05); }
    #letter-N:active { transform: scale(0.95); }

    #letter-N::after {
      content: '';
      position: absolute;
      top: -50%; left: -50%; width: 200%; height: 200%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.5) 50%, rgba(255,255,255,0) 100%);
      transform: rotate(45deg) translateX(-100%);
      animation: lightSweep 4s infinite cubic-bezier(0.4, 0, 0.2, 1);
    }

    .click-hint {
      font-size: 13px;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: var(--muted);
      animation: fadeInOut 2s infinite;
    }
    @keyframes fadeInOut { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

    /* ===== FROSTED GLASS TIMER SCREEN ===== */
    #timer-screen {
      position: absolute;
      z-index: 50;
      opacity: 0;
      transform: scale(0.9);
      display: none;
      transition: opacity 1.5s ease, transform 1.5s ease;
      text-align: center;
      width: 100%;
      padding: clamp(12px, 2.5vw, 32px);
    }
    #timer-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(22px, 4vw, 36px);
      margin-bottom: clamp(30px, 4vw, 50px);
      letter-spacing: 6px;
      text-transform: uppercase;
      text-shadow: 0 5px 15px rgba(0,0,0,0.8);
    }
    .timer-box { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; }
    .time-unit {
      background: var(--glass);
      backdrop-filter: blur(20px) saturate(120%);
      -webkit-backdrop-filter: blur(20px) saturate(120%);
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      border-left: 1px solid rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid rgba(0, 0, 0, 0.6);
      border-right: 1px solid rgba(0, 0, 0, 0.6);
      padding: 30px 20px;
      border-radius: 16px;
      min-width: 110px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
    }
    .time-unit div { 
      font-weight: 300; 
      font-size: clamp(40px, 8vw, 75px); 
      line-height: 1; 
      text-shadow: 0 4px 10px rgba(0,0,0,0.6);
    }
    .time-unit span { 
      display: block; 
      font-size: 12px; 
      color: var(--gold-1); 
      margin-top: 15px; 
      letter-spacing: 3px; 
      text-transform: uppercase; 
      font-family: 'Cinzel', serif;
    }

    /* ===== HEARTBEAT COUNTDOWN SCREEN ===== */
    #countdown-screen {
      position: absolute;
      z-index: 60;
      display: none;
      font-family: 'Cinzel', serif;
      color: transparent;
      -webkit-text-stroke: 3px var(--gold-1);
      text-shadow: 0 0 80px rgba(191, 149, 63, 0.5);
      font-size: clamp(120px, 30vw, 320px);
      pointer-events: none;
      animation: heartbeatPulse 1s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
    }
    @keyframes heartbeatPulse {
      0% { transform: scale(0.8); opacity: 0; filter: blur(10px); }
      20% { transform: scale(1.1); opacity: 1; filter: blur(0px); }
      100% { transform: scale(1.4); opacity: 0; filter: blur(5px); }
    }

    /* ===== PERFECTLY POSITIONED REVEAL SCREEN ===== */
    #reveal-screen { 
      position: absolute; 
      inset: 0;
      z-index: 70; 
      display: none; /* Changed to flex in JS */
      flex-direction: column;
      
      /* THIS FORCES IT TO THE TOP CONSISTENTLY ACROSS ALL DEVICES */
      justify-content: flex-start; 
      padding-top: 18vh; 
      
      align-items: center;
      perspective: 1000px; 
      width: 100%; 
    }
    
    #reveal-subtitle {
      font-family: 'Cinzel', serif;
      font-weight: 400;
      font-size: clamp(16px, 4vw, 32px);
      letter-spacing: 12px;
      color: var(--gold-2);
      margin-bottom: 40px;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(-20px) scale(0.9);
      text-shadow: 0 5px 20px rgba(0,0,0,0.9);
      text-align: center;
    }
    
    .subtitle-show {
      animation: cinematicFloatIn 2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }
    @keyframes cinematicFloatIn { 
        to { opacity: 1; transform: translateY(0) scale(1); } 
    }

    /* ===== THE SMART ANIMATION CONTAINER ===== */
    .name-container { 
      display: flex; 
      justify-content: center; 
      align-items: center;
      white-space: nowrap; 
    }
    
    /* The CSS Grid Engine that makes the initial slide smoothly to the left */
    .rest-part-wrapper {
        display: grid;
        grid-template-columns: 0fr; /* Starts completely hidden with zero width */
        transition: grid-template-columns 1.5s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .rest-part-wrapper.expand {
        grid-template-columns: 1fr; /* Expands smoothly, sliding the initial to the left naturally */
    }
    .rest-part-inner {
        overflow: hidden;
        display: flex;
        align-items: center;
    }

    .letter {
      font-family: 'Cinzel', serif;
      /* 10vw perfectly fits an 9-10 character name on a single line on mobile */
      font-size: clamp(30px, 10vw, 140px); 
      font-weight: 800;
      color: var(--gold-2);
      -webkit-font-smoothing: antialiased;
      /* Advanced 3D Extrusion */
      text-shadow: 
        0 1px 0 #b38728, 0 2px 0 #9f7622, 0 3px 0 #8c661c,
        0 4px 0 #795717, 0 5px 0 #674a12, 0 6px 0 #563e0e,
        0 20px 40px rgba(0,0,0,0.9);
    }

    /* The Initial (A.) drop animation */
    .initial-part {
      opacity: 0;
      transform: translateZ(-200px) rotateX(-90deg);
      transition: all 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .initial-part.show { 
      opacity: 1; 
      transform: translateZ(0) rotateX(0deg); 
    }

    /* Spacing between letters in the remaining part */
    .is-name {
      opacity: 0;
      margin-left: clamp(2px, 1.5vw, 15px);
    }

    /* The glowing sweep-in animation for the rest of the name */
    @keyframes popFlash {
        0% { opacity: 0; transform: translateZ(-100px) scale(0.5) rotateX(-45deg); filter: brightness(1); }
        50% { opacity: 1; transform: translateZ(40px) scale(1.1) rotateX(0deg); filter: brightness(2); text-shadow: 0 0 50px rgba(253, 245, 201, 1), 0 20px 40px rgba(0,0,0,0.9); color: #fff; }
        100% { opacity: 1; transform: translateZ(0) scale(1) rotateX(0deg); filter: brightness(1); color: var(--gold-2); }
    }

    /* ===== HEART BALLOON ANIMATIONS ===== */
    .balloon-anim {
        position: absolute;
        bottom: -200px;
        animation: floatUp 8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes floatUp {
        0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 1; }
        100% { transform: translateY(-120vh) translateX(var(--drift)) rotate(15deg); opacity: 0; }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 520px) {
      .timer-box { gap: 12px; }
      .time-unit { padding: 15px 12px; min-width: 80px; }
      .time-unit div { font-size: clamp(35px, 10vw, 50px); }
      .click-hint { letter-spacing: 5px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .gold-shimmer, #letter-N::after, .click-hint, #countdown-screen, .letter, .gate, #scene-container, .balloon-anim, .subtitle-show {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <canvas id="canvas-bg" aria-hidden="true"></canvas>

  <div id="scene-container" aria-hidden="false">
    <div class="gate left" id="gate-left" aria-hidden="true"></div>
    <div class="gate right" id="gate-right" aria-hidden="true"></div>

    <div class="seal-wrapper" id="seal-wrapper">
      <div id="letter-N" role="button" tabindex="0">N</div>
      <div class="click-hint gold-shimmer" id="click-hint">Click to Enter</div>
    </div>
  </div>

  <div id="timer-screen" aria-live="polite" aria-atomic="true">
    <h2 id="timer-title" class="gold-shimmer">The Journey Unfolds In</h2>
    <div class="timer-box" role="group">
      <div class="time-unit"><div id="days">00</div><span id="label-days">Days</span></div>
      <div class="time-unit"><div id="hours">00</div><span id="label-hours">Hours</span></div>
      <div class="time-unit"><div id="mins">00</div><span id="label-mins">Minutes</span></div>
      <div class="time-unit"><div id="secs">05</div><span id="label-secs">Seconds</span></div>
    </div>
  </div>

  <div id="countdown-screen" aria-live="assertive" aria-atomic="true">5</div>

  <div id="reveal-screen" aria-hidden="true">
    <h3 id="reveal-subtitle" class="gold-shimmer">Welcome To The World</h3>
    <div class="name-container" id="baby-name" aria-hidden="true"></div>
  </div>

  <noscript>
    <div style="position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; background: #050505; z-index: 9999; padding: 20px; text-align: center;">
      <div style="color: #d4af37;">
        <h2 style="font-family: Cinzel, serif; margin-bottom: 12px;">Welcome</h2>
        <p>Please enable JavaScript to view the ceremony animation.</p>
      </div>
    </div>
  </noscript>

  <script>
    'use strict';

    /* ===== CONFIGURATION ===== */
    const CONFIG = {
      ceremonyName: window.__ceremonyName || 'A.NURA',
      ceremonyEventDate: window.__ceremonyEventDate || null,
      timerDemoSeconds: 8
    };

    /* ===== ELEMENT CACHE ===== */
    const qs = (sel, root = document) => root ? root.querySelector(sel) : null;
    const qsa = (sel, root = document) => root ? Array.from(root.querySelectorAll(sel)) : [];
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const elements = {
      letterN: qs('#letter-N'),
      sealWrapper: qs('#seal-wrapper'),
      gateLeft: qs('#gate-left'),
      gateRight: qs('#gate-right'),
      sceneContainer: qs('#scene-container'),
      timerScreen: qs('#timer-screen'),
      countdownScreen: qs('#countdown-screen'),
      revealScreen: qs('#reveal-screen'),
      revealSubtitle: qs('#reveal-subtitle'),
      babyNameContainer: qs('#baby-name'),
      canvas: qs('#canvas-bg')
    };

    /* ===== CANVAS BACKGROUND PARTICLES ===== */
    let animationId = null;
    let particlesArray = [];

    function initCanvas() {
      if (!elements.canvas) return;
      const ctx = elements.canvas.getContext('2d', { alpha: true });
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      elements.canvas.width = Math.round(window.innerWidth * dpr);
      elements.canvas.height = Math.round(window.innerHeight * dpr);
      elements.canvas.style.width = window.innerWidth + 'px';
      elements.canvas.style.height = window.innerHeight + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      class Particle {
        constructor() {
          this.x = Math.random() * window.innerWidth;
          this.y = Math.random() * window.innerHeight;
          this.size = Math.random() * 2;
          this.speedY = Math.random() * 0.3 - 0.15;
          this.speedX = Math.random() * 0.3 - 0.15;
        }
        update() {
          this.x += this.speedX;
          this.y += this.speedY;
          if (this.y > window.innerHeight) this.y = 0;
          if (this.y < 0) this.y = window.innerHeight;
          if (this.x > window.innerWidth) this.x = 0;
          if (this.x < 0) this.x = window.innerWidth;
        }
        draw() {
          ctx.fillStyle = 'rgba(212, 175, 55, 0.6)';
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      for (let i = 0; i < 150; i++) particlesArray.push(new Particle());

      function animate() {
        ctx.clearRect(0, 0, elements.canvas.width, elements.canvas.height);
        for (const p of particlesArray) {
          p.update();
          p.draw();
        }
        animationId = requestAnimationFrame(animate);
      }
      if (!reducedMotion) animate();
    }

    /* ===== SMART NAME RENDERER (SPLITS INITIAL & NAME) ===== */
    function renderName(nameStr) {
      const container = elements.babyNameContainer;
      if (!container) return;
      container.innerHTML = '';
      const final = (nameStr && nameStr.trim().length > 0) ? nameStr.trim().toUpperCase() : 'A.NURA';

      // Smartly find the initial (e.g., stops at the dot or space)
      let initialEndIdx = final.indexOf('.');
      if (initialEndIdx === -1) initialEndIdx = final.indexOf(' ');
      if (initialEndIdx === -1) initialEndIdx = 0; // Fallback

      const initialStr = final.substring(0, initialEndIdx + 1);
      const restStr = final.substring(initialEndIdx + 1).trim();

      // Create Initial Element
      const initialDiv = document.createElement('div');
      initialDiv.className = 'initial-part letter';
      initialDiv.textContent = initialStr;
      container.appendChild(initialDiv);

      // Create Animated CSS Grid Wrapper for the rest of the name
      const restWrapper = document.createElement('div');
      restWrapper.className = 'rest-part-wrapper';
      
      const restInner = document.createElement('div');
      restInner.className = 'rest-part-inner';

      // Insert letters into inner wrapper
      Array.from(restStr).forEach(ch => {
        const el = document.createElement('div');
        el.className = 'letter is-name';
        el.innerHTML = ch === ' ' ? '&nbsp;' : ch;
        restInner.appendChild(el);
      });

      restWrapper.appendChild(restInner);
      container.appendChild(restWrapper);
    }

    /* ===== TIMER LOGIC ===== */
    let countdownInterval = null;
    let finalTimer = null;
    let eventDate = CONFIG.ceremonyEventDate || (function() {
      const d = new Date();
      d.setSeconds(d.getSeconds() + CONFIG.timerDemoSeconds);
      return d;
    })();

    function safeSetText(id, text) {
      const el = document.getElementById(id);
      if (el) el.textContent = text;
    }

    function startTimer() {
      if (countdownInterval) clearInterval(countdownInterval);
      function updateOnce() {
        const now = Date.now();
        const dist = eventDate.getTime() - now;
        
        if (dist <= 0) {
          clearInterval(countdownInterval);
          if (elements.timerScreen) {
              elements.timerScreen.style.transform = 'scale(1.1)';
              elements.timerScreen.style.opacity = '0';
          }
          setTimeout(() => {
              if (elements.timerScreen) elements.timerScreen.style.display = 'none';
              startFinalCountdown();
          }, 1500); 
          return;
        }
        
        const days = Math.floor(dist / (1000 * 60 * 60 * 24));
        const hours = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((dist % (1000 * 60)) / 1000);
        safeSetText('days', days < 10 ? '0' + days : String(days));
        safeSetText('hours', hours < 10 ? '0' + hours : String(hours));
        safeSetText('mins', minutes < 10 ? '0' + minutes : String(minutes));
        safeSetText('secs', seconds < 10 ? '0' + seconds : String(seconds));
      }
      updateOnce();
      countdownInterval = setInterval(updateOnce, 1000);
    }

    function startFinalCountdown() {
      if (elements.countdownScreen) elements.countdownScreen.style.display = 'block';
      let count = 5;
      
      if (elements.countdownScreen) elements.countdownScreen.textContent = String(count);

      finalTimer = setInterval(() => {
        count--;
        if (count > 0) {
          if (elements.countdownScreen) {
             elements.countdownScreen.style.animation = 'none';
             void elements.countdownScreen.offsetWidth; 
             elements.countdownScreen.style.animation = 'heartbeatPulse 1s infinite cubic-bezier(0.215, 0.61, 0.355, 1)';
             elements.countdownScreen.textContent = String(count);
          }
        } else {
          clearInterval(finalTimer);
          if (elements.countdownScreen) elements.countdownScreen.style.display = 'none';
          triggerGrandReveal();
        }
      }, 1000);
    }

    /* ===== ENTRANCE & REVEAL LOGIC ===== */
    function triggerEntrance() {
      if (!elements.letterN || elements.letterN.getAttribute('data-activated') === 'true') return;
      elements.letterN.setAttribute('data-activated', 'true');
      
      if (elements.sceneContainer) elements.sceneContainer.style.transform = 'scale(1.2)';

      if (!reducedMotion && elements.sealWrapper) {
        elements.sealWrapper.style.transform = 'translateZ(-100px) scale(0.8)';
        elements.sealWrapper.style.opacity = '0';
      }

      setTimeout(() => {
        elements.gateLeft?.classList.add('open-left');
        elements.gateRight?.classList.add('open-right');
      }, 500);

      setTimeout(() => {
        elements.sceneContainer && (elements.sceneContainer.style.display = 'none');
        const now = Date.now();
        const dist = eventDate.getTime() - now;

        if (dist <= 0) {
            startFinalCountdown();
        } else {
            elements.timerScreen && (elements.timerScreen.style.display = 'block');
            void elements.timerScreen.offsetWidth; 
            elements.timerScreen && (elements.timerScreen.style.opacity = '1');
            elements.timerScreen && (elements.timerScreen.style.transform = 'scale(1)');
            startTimer();
        }
      }, 3500); 
    }

    function triggerGrandReveal() {
      // Changed to flex layout for perfect centering
      elements.revealScreen && (elements.revealScreen.style.display = 'flex');
      
      if (elements.revealSubtitle) {
          elements.revealSubtitle.classList.add('subtitle-show');
      }

      // Step 1: Wait for subtitle, then reveal the Initial ("A.") exactly in the center
      setTimeout(() => {
          const initialPart = qs('.initial-part');
          if (initialPart) initialPart.classList.add('show');

          // Step 2: Hold for 1.5 seconds of suspense, then trigger the slide & full reveal
          setTimeout(() => {
              
              // This triggers the CSS Grid to expand, naturally sliding the "A." to the left
              const wrapper = qs('.rest-part-wrapper');
              if(wrapper) wrapper.classList.add('expand');

              const restLetters = qsa('.is-name', elements.babyNameContainer);
              restLetters.forEach((letter, idx) => {
                  setTimeout(() => {
                      letter.classList.add('show');
                      if (!reducedMotion) {
                          letter.style.animation = 'popFlash 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';
                      }
                  }, idx * 100); // Snappy, staggered reveal for the rest of the name
              });

              // Step 3: Trigger cannons precisely when the last letter flashes
              const totalDelay = (restLetters.length * 100) + 400;
              setTimeout(() => { 
                  fireFourCornerBlast(); 
                  fireHeartBalloons();
              }, totalDelay);

          }, 1500); // Suspense hold
          
      }, 1500);
    }

    /* ===== 4-CORNER ADVANCED CANNON BLAST ===== */
    function fireFourCornerBlast() {
      if (reducedMotion || typeof confetti !== 'function') return;
      
      const duration = 4 * 1000;
      const animationEnd = Date.now() + duration;

      const interval = setInterval(() => {
        const timeLeft = animationEnd - Date.now();
        if (timeLeft <= 0) return clearInterval(interval);

        const pCount = 8;
        const cColors = ['#d4af37', '#e6ca7b', '#ffffff'];
        const settings = { particleCount: pCount, spread: 45, colors: cColors, zIndex: 80, gravity: 1.1, shapes: ['square', 'circle'] };

        confetti({ ...settings, origin: { x: 0, y: 0 }, angle: 315, startVelocity: 35 });
        confetti({ ...settings, origin: { x: 1, y: 0 }, angle: 225, startVelocity: 35 });
        confetti({ ...settings, origin: { x: 0, y: 1 }, angle: 45, startVelocity: 60 });
        confetti({ ...settings, origin: { x: 1, y: 1 }, angle: 135, startVelocity: 60 });
        
      }, 300); 
    }

    /* ===== BIG RED HEART BALLOONS ===== */
    function fireHeartBalloons() {
        const container = document.createElement('div');
        container.style.position = 'fixed';
        container.style.inset = '0';
        container.style.pointerEvents = 'none';
        container.style.zIndex = '90';
        container.style.overflow = 'hidden';
        document.body.appendChild(container);

        for (let i = 0; i < 30; i++) {
            setTimeout(() => {
                const balloonWrapper = document.createElement('div');
                balloonWrapper.className = 'balloon-anim';
                balloonWrapper.style.left = (Math.random() * 100) + 'vw';
                
                const scale = 0.6 + Math.random() * 0.8;
                const drift = (Math.random() - 0.5) * 300;
                balloonWrapper.style.setProperty('--drift', drift + 'px');
                
                balloonWrapper.innerHTML = `
                    <div style="transform: scale(${scale}); transform-origin: bottom center;">
                        <svg width="80" height="80" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="filter: drop-shadow(0px 10px 10px rgba(0,0,0,0.6));">
                            <defs>
                                <radialGradient id="balloonGrad${i}" cx="30%" cy="30%" r="70%">
                                    <stop offset="0%" stop-color="#ff8080" />
                                    <stop offset="50%" stop-color="#e60000" />
                                    <stop offset="100%" stop-color="#990000" />
                                </radialGradient>
                            </defs>
                            <path fill="url(#balloonGrad${i})" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                        </svg>
                        <div style="width: 2px; height: 60px; background: rgba(255,255,255,0.3); margin: 0 auto; margin-top: -8px;"></div>
                    </div>
                `;
                container.appendChild(balloonWrapper);
                
                setTimeout(() => balloonWrapper.remove(), 8500); 
            }, Math.random() * 4000);
        }
    }

    /* ===== INITIALIZATION ===== */
    (function init() {
      initCanvas();
      renderName(CONFIG.ceremonyName);

      elements.letterN?.addEventListener('click', triggerEntrance, { passive: true });
    })();
  </script>
</body>
</html>
