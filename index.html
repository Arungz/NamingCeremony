<head>
  <meta charset="UTF-8">

  <title>Naming Ceremony ✨</title>
  <link rel="icon" type="image/png" href="Images/ak.png">

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Cinzel+Decorative:wght@700&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet" />

  <style>
    /* ===== VARIABLES & CORE RESETS ===== */
    :root {
      --bg: #050505;
      --gold-1: #bf953f;
      --gold-2: #fdf5c9;
      --gold-3: #b38728;
      --muted: rgba(255, 255, 255, 0.5);
      --glass: rgba(20, 20, 20, 0.4);
      --glass-border: rgba(191, 149, 63, 0.3);
      --safe-area-top: env(safe-area-inset-top);
      --safe-area-bottom: env(safe-area-inset-bottom);
      
      /* Cinematic Easing */
      --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
      --ease-in-out-circ: cubic-bezier(0.85, 0, 0.15, 1);
      --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      -webkit-tap-highlight-color: transparent !important;
      outline: none !important;
    }
    
    html, body { 
      height: 100%; 
      height: 100dvh; 
      overflow: hidden; 
      background-color: var(--bg);
      touch-action: pan-y;
      font-family: 'Montserrat', sans-serif;
      color: #fff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Native App Scrollbar Hiding */
    ::-webkit-scrollbar { display: none; }
    
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
      z-index: 0;
      pointer-events: none;
    }

    /* ===== OPTIMIZED AMBIENT MAGIC GLOW ===== */
    .ambient-light {
        position: fixed;
        top: 50%; left: 50%;
        width: 100vw; height: 100vh;
        background: radial-gradient(circle, rgba(191, 149, 63, 0.05) 0%, transparent 60%);
        transform: translate3d(-50%, -50%, 0);
        z-index: 2; 
        pointer-events: none;
        will-change: transform, opacity;
        animation: breatheLight 6s infinite alternate ease-in-out;
    }
    @keyframes breatheLight {
        0% { transform: translate3d(-50%, -50%, 0) scale(0.9); opacity: 0.5; }
        100% { transform: translate3d(-50%, -50%, 0) scale(1.1); opacity: 1; }
    }

    #canvas-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      opacity: 0.6;
      pointer-events: none;
    }

    .gold-shimmer {
      background: linear-gradient(90deg, var(--gold-1), var(--gold-2), var(--gold-3), var(--gold-2), var(--gold-1));
      background-size: 200% auto;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      animation: shine 4s linear infinite;
    }
    @keyframes shine { to { background-position: 200% center; } }

    /* ===== PULL TO REFRESH UI ===== */
    #ptr-wrapper {
        position: fixed;
        top: -70px;
        left: 50%;
        transform: translate3d(-50%, 0, 0);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 50px;
        height: 50px;
        background: rgba(20, 20, 20, 0.8);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid var(--gold-1);
        border-radius: 50%;
        box-shadow: 0 5px 15px rgba(0,0,0,0.8), 0 0 0px rgba(212, 175, 55, 0);
        transition: box-shadow 0.3s ease, background 0.3s ease;
        pointer-events: none;
        will-change: transform;
    }
    #ptr-wrapper.ready {
        box-shadow: 0 5px 25px rgba(0,0,0,0.9), 0 0 20px rgba(212, 175, 55, 0.4);
        background: rgba(40, 30, 10, 0.95);
        border-color: var(--gold-2);
    }
    #ptr-icon {
        width: 24px;
        height: 24px;
        fill: var(--gold-2);
        transform-origin: center;
        will-change: transform;
    }
    .ptr-spin { animation: fastSpin 0.5s linear infinite !important; }
    @keyframes fastSpin { 100% { transform: rotate(360deg); } }

    /* ===== FLAWLESS SCROLLABLE SCREEN ARCHITECTURE ===== */
    .scroll-screen {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 50;
        display: none; 
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        padding: clamp(40px, 8vh, 100px) 15px 80px 15px; 
        perspective: 1200px;
    }

    /* ===== CINEMATIC 3D INTRO CONTAINER ===== */
    #scene-container {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transform-style: preserve-3d;
      will-change: transform, opacity;
      transition: opacity 1.5s ease;
      perspective: 2000px;
    }

    .gate {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      background: linear-gradient(135deg, #0a0a0a, #000);
      box-shadow: inset 0 0 50px rgba(0,0,0,1);
      transition: transform 2.5s var(--ease-in-out-circ), opacity 2.5s ease, filter 2.5s ease;
      z-index: 101;
      overflow: hidden;
      will-change: transform, opacity;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .gate::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.03) 50%, rgba(255,255,255,0) 100%);
        transform: skewX(-20deg) translateX(-150%);
        animation: modernSweep 5s infinite;
    }
    @keyframes modernSweep {
        0% { transform: skewX(-20deg) translateX(-150%); }
        100% { transform: skewX(-20deg) translateX(250%); }
    }

    .gate.left { left: 0; border-right: 2px solid var(--gold-1); transform-origin: left center; }
    .gate.right { right: 0; border-left: 2px solid var(--gold-1); transform-origin: right center; }
    
    .gate.open-left { transform: rotateY(-95deg) scale(1.1); opacity: 0; }
    .gate.open-right { transform: rotateY(95deg) scale(1.1); opacity: 0; }

    /* ===== MACHINED GOLD SEAL ===== */
    .seal-wrapper {
      position: relative;
      z-index: 102;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
      transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #letter-N {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(50px, 8vw, 110px);
      width: clamp(140px, 26vw, 240px);
      height: clamp(140px, 26vw, 240px);
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(191, 149, 63, 0.15) 0%, rgba(5, 5, 5, 0.8) 70%);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(191, 149, 63, 0.3);
      color: var(--gold-2);
      text-shadow: 0 0 20px rgba(253, 245, 201, 0.6), 0 0 40px rgba(191, 149, 63, 0.4);
      cursor: pointer;
      animation: invitePulse 2.5s infinite alternate ease-in-out;
      transition: transform 0.4s var(--ease-spring), box-shadow 0.4s ease, background 0.4s ease;
      font-weight: 700;
      position: relative;
      z-index: 103;
      outline: none;
      will-change: transform, box-shadow;
    }
    
    #letter-N::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid var(--gold-1);
        opacity: 0;
        animation: rippleRing 2s infinite var(--ease-out-expo);
    }
    @keyframes rippleRing {
        0% { transform: scale(1); opacity: 0.5; }
        100% { transform: scale(1.5); opacity: 0; }
    }

    #letter-N::after {
        content: '';
        position: absolute;
        inset: -4px;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top: 2px solid var(--gold-2);
        border-bottom: 2px solid var(--gold-1);
        opacity: 0.8;
        animation: spinEdge 4s linear infinite;
        pointer-events: none;
        box-shadow: inset 0 2px 10px rgba(191, 149, 63, 0.5);
    }
    @keyframes spinEdge {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    @keyframes invitePulse {
        from { box-shadow: 0 10px 30px rgba(0,0,0,0.9), 0 0 0 0 rgba(191, 149, 63, 0.1); }
        to { box-shadow: 0 10px 30px rgba(0,0,0,0.9), 0 0 25px 5px rgba(191, 149, 63, 0.4); }
    }
    
    #letter-N:not(.shatter):hover, #letter-N:not(.shatter):active { 
        animation: none; 
        transform: scale(1.05); 
        box-shadow: 0 20px 40px rgba(0,0,0,0.9), 0 0 30px 10px rgba(253, 245, 201, 0.3);
        background: radial-gradient(circle, rgba(191, 149, 63, 0.25) 0%, rgba(5, 5, 5, 0.9) 70%);
    }
    
    #letter-N:not(.shatter):hover::before, #letter-N:not(.shatter):active::before,
    #letter-N:not(.shatter):hover::after, #letter-N:not(.shatter):active::after { display: none; }

    #letter-N.shatter {
        animation: epicShatter 1.2s var(--ease-in-out-circ) forwards;
        pointer-events: none;
    }
    @keyframes epicShatter {
        0% { transform: scale(1); opacity: 1; }
        30% { transform: scale(0.85) rotate(-5deg); opacity: 1; box-shadow: 0 0 50px var(--gold-1); }
        100% { transform: scale(2.5) rotate(45deg); opacity: 0; box-shadow: 0 0 0 transparent; }
    }

    .seal-aura {
        position: absolute;
        top: 50%; left: 50%;
        width: 10px; height: 10px;
        background: var(--gold-2);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        filter: blur(20px);
        opacity: 0;
        z-index: 101;
        transition: all 1.5s ease;
    }
    .seal-aura.explode {
        transform: translate(-50%, -50%) scale(100);
        opacity: 0;
        filter: blur(50px);
    }

    .click-hint {
      font-size: 13px;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: var(--muted);
      animation: hintFade 2s infinite alternate;
      transition: opacity 0.3s ease;
    }
    @keyframes hintFade { 0% { opacity: 0.3; } 100% { opacity: 1; } }

    /* ===== TIMER SCREEN (SCROLLABLE PAGE 1) ===== */
    #timer-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(16px, 4vw, 36px);
      margin-bottom: clamp(20px, 4vw, 50px);
      letter-spacing: clamp(3px, 1vw, 6px);
      text-transform: uppercase;
      text-shadow: 0 5px 15px rgba(0,0,0,0.8);
      white-space: nowrap;
    }
    
    .timer-box { 
      display: grid; 
      grid-template-columns: repeat(4, 1fr);
      gap: clamp(5px, 2vw, 20px); 
      justify-content: center; 
      width: 100%;
      max-width: 650px;
      padding: 0 10px;
      box-sizing: border-box;
      margin-bottom: clamp(30px, 6vw, 50px);
    }
    
    .time-unit {
      background: var(--glass);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      border-left: 1px solid rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid rgba(0, 0, 0, 0.6);
      border-right: 1px solid rgba(0, 0, 0, 0.6);
      padding: clamp(10px, 3vw, 20px) 2px; 
      border-radius: 12px;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
      text-align: center;
      opacity: 0;
      transform: translate3d(0, -30px, -50px) rotateX(45deg);
      transition: opacity 0.6s ease, transform 1s var(--ease-spring);
      position: relative;
      overflow: hidden; 
      will-change: transform, opacity;
      transform-style: preserve-3d;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    
    .time-unit::after {
        content: '';
        position: absolute;
        top: -50%; left: -50%; width: 200%; height: 200%;
        background: linear-gradient(45deg, transparent, rgba(255,255,255,0.05), transparent);
        transform: rotate(45deg) translate3d(-100%, 0, 0);
        animation: glassCardShimmer 4s infinite linear;
        pointer-events: none;
    }
    @keyframes glassCardShimmer {
        0%, 30% { transform: rotate(45deg) translate3d(-100%, 0, 0); }
        70%, 100% { transform: rotate(45deg) translate3d(100%, 0, 0); }
    }
    
    .time-unit.show-unit {
        opacity: 1;
        transform: translate3d(0, 0, 0) rotateX(0deg);
    }
    
    .time-unit div { 
      font-weight: 300; 
      font-size: clamp(18px, 6vw, 65px); 
      line-height: 1; 
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      transform: translateZ(0);
    }
    .time-unit span { 
      display: block; 
      font-size: clamp(7px, 1.8vw, 12px); 
      color: var(--gold-1); 
      margin-top: 10px; 
      letter-spacing: clamp(1px, 0.5vw, 3px); 
      text-transform: uppercase; 
      font-family: 'Cinzel', serif;
    }

    /* TOP 3 NAMES SHOWCASE (ON TIMER SCREEN) */
    .fade-in-delayed {
        opacity: 0;
        transform: translate3d(0, 30px, 0);
        transition: opacity 0.8s ease, transform 1s var(--ease-spring);
    }
    .fade-in-delayed.show {
        opacity: 1;
        transform: translate3d(0, 0, 0);
    }

    #top-names-container {
        display: none; /* Managed by JS based on rule */
        flex-direction: column;
        align-items: center;
        width: 100%;
        margin-bottom: clamp(30px, 6vw, 50px);
        transition: opacity 0.4s ease;
    }
    #top-names-title {
        font-family: 'Cinzel', serif;
        font-size: clamp(14px, 3vw, 24px);
        margin-bottom: 20px;
        letter-spacing: 2px;
        text-transform: uppercase;
        text-shadow: 0 5px 15px rgba(0,0,0,0.8);
        color: var(--muted);
        transition: opacity 0.4s ease;
    }
    .top-names-flex {
        display: flex;
        gap: clamp(10px, 3vw, 20px);
        justify-content: center;
        flex-wrap: wrap;
        transition: opacity 0.4s ease;
    }
    .top-name-card {
        background: var(--glass);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(191, 149, 63, 0.4);
        border-radius: 20px;
        padding: clamp(10px, 2vw, 15px) clamp(20px, 4vw, 30px);
        font-family: 'Cinzel', serif;
        font-weight: 800;
        font-size: clamp(14px, 3vw, 22px);
        color: var(--gold-2);
        box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        animation: floatCard 3s ease-in-out infinite alternate;
        transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }
    
    /* Interactive Voting State */
    .top-name-card.voting-enabled {
        cursor: pointer;
    }
    .top-name-card.voting-enabled:hover {
        transform: scale(1.05) translateY(-5px) !important;
        border-color: var(--gold-1);
        box-shadow: 0 15px 35px rgba(191, 149, 63, 0.3);
        background: rgba(40, 30, 10, 0.8);
    }
    .top-name-card.voting-enabled:active {
        transform: scale(0.95) !important;
    }

    .top-name-card:nth-child(2) { animation-delay: 0.5s; border-color: var(--gold-1); }
    .top-name-card:nth-child(3) { animation-delay: 1s; }
    
    @keyframes floatCard {
        0% { transform: translate3d(0, 0, 0); }
        100% { transform: translate3d(0, -8px, 0); }
    }

    /* SUGGESTION BOX (ON TIMER SCREEN) */
    #suggestion-container {
        display: none; /* Toggled to flex in JS based on 2-day rule */
        flex-direction: column;
        align-items: center;
        gap: 15px;
        margin-bottom: 20px;
    }
    .suggestion-text {
        font-family: 'Cinzel', serif;
        font-size: clamp(12px, 2.5vw, 15px);
        letter-spacing: 2px;
        text-transform: uppercase;
        text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        transition: opacity 0.4s var(--ease-out-expo);
        background: linear-gradient(90deg, var(--gold-1), var(--gold-2), var(--gold-3), var(--gold-2), var(--gold-1));
        background-size: 200% auto;
        color: transparent;
        -webkit-background-clip: text;
        background-clip: text;
        animation: shine 4s linear infinite;
    }
    .suggestion-input-wrapper {
        display: flex;
        gap: 8px;
        background: var(--glass);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        padding: 5px;
        border-radius: 30px;
        border: 1px solid rgba(191, 149, 63, 0.3);
        box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        transition: border-color 0.3s ease, box-shadow 0.3s ease, opacity 0.4s var(--ease-out-expo);
    }
    .suggestion-input-wrapper:focus-within {
        border-color: var(--gold-1);
        box-shadow: 0 10px 30px rgba(191, 149, 63, 0.4);
    }
    #name-suggestion {
        background: transparent;
        border: none;
        outline: none;
        color: #fff;
        font-family: 'Montserrat', sans-serif;
        padding: 10px 20px;
        /* Increased to 16px to prevent iOS Safari auto-zoom bug */
        font-size: 16px; 
        width: clamp(150px, 40vw, 250px);
        transition: background 0.3s ease;
        border-radius: 30px;
    }
    #name-suggestion:focus {
        background: rgba(255, 255, 255, 0.05);
    }
    #name-suggestion::placeholder {
        color: rgba(255, 255, 255, 0.4);
    }
    #submit-suggestion {
        background: linear-gradient(90deg, var(--gold-1), var(--gold-2), var(--gold-1));
        background-size: 200% auto;
        border: none;
        border-radius: 25px;
        color: #050505;
        font-family: 'Cinzel', serif;
        font-weight: 800;
        padding: 10px 25px;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease, background-position 0.4s ease;
    }
    #submit-suggestion:hover {
        background-position: right center;
        box-shadow: 0 0 15px rgba(253, 245, 201, 0.5);
        transform: scale(1.05);
    }
    #submit-suggestion:active {
        transform: scale(0.95);
    }
    #suggestion-thank-you {
        font-family: 'Cinzel', serif;
        color: var(--gold-2);
        font-size: clamp(14px, 3vw, 18px);
        letter-spacing: 2px;
        display: none;
        opacity: 0;
        text-align: center;
    }

    @keyframes thankYouPop {
        0% { opacity: 0; transform: scale(0.8) translateY(20px); filter: blur(5px); }
        15% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0px); text-shadow: 0 0 20px rgba(253, 245, 201, 0.8); }
        85% { opacity: 1; transform: scale(1); filter: blur(0px); text-shadow: 0 0 10px rgba(191, 149, 63, 0.5); }
        100% { opacity: 0; transform: scale(1.05) translateY(-10px); filter: blur(5px); }
    }

    /* ===== FLAWLESS CINEMATIC COUNTDOWN SCREEN ===== */
    #countdown-screen {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 60;
      display: none;
      justify-content: center;
      align-items: center;
      pointer-events: none;
      overflow: hidden;
    }
    
    .countdown-num {
      position: absolute;
      font-family: 'Cinzel', serif;
      font-size: clamp(150px, 45vw, 400px);
      font-weight: 800;
      background: linear-gradient(180deg, var(--gold-2) 0%, var(--gold-1) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      will-change: transform, opacity;
      animation: epicCount 0.95s var(--ease-out-expo) forwards; 
    }

    @keyframes epicCount {
      0% { transform: scale(0.2) translate3d(0,0,-200px); opacity: 0; }
      30% { transform: scale(1) translate3d(0,0,0); opacity: 1; text-shadow: 0 0 50px rgba(191, 149, 63, 0.7); }
      100% { transform: scale(2.5) translate3d(0,0,200px); opacity: 0; }
    }

    /* Cinematic White Flash Transition */
    #flash-overlay {
        position: fixed;
        inset: 0;
        background: #fff;
        z-index: 65;
        opacity: 0;
        pointer-events: none;
        transition: opacity 1.5s var(--ease-out-expo);
    }
    #flash-overlay.flash {
        opacity: 1;
        transition: opacity 0.2s ease;
    }

    /* ===== REVEAL SCREEN (SCROLLABLE PAGE 2) ===== */
    #reveal-screen { 
      position: absolute; 
      inset: 0;
      z-index: 70; 
      display: none; 
      flex-direction: column;
      justify-content: flex-start; 
      padding-top: 15vh; 
      align-items: center;
      perspective: 1200px; 
      width: 100%; 
    }
    
    @media (min-width: 768px) {
      #reveal-screen { justify-content: center; padding-top: 0; }
    }
    
    #reveal-subtitle {
      font-family: 'Cinzel', serif;
      font-weight: 400;
      font-size: clamp(16px, 4vw, 32px);
      letter-spacing: clamp(4px, 2vw, 12px); 
      color: var(--gold-2);
      margin-bottom: 40px;
      text-transform: uppercase;
      opacity: 0;
      transform: translate3d(0, -20px, 0);
      text-shadow: 0 5px 20px rgba(0,0,0,0.9);
      text-align: center;
      will-change: transform, opacity;
      
      background: linear-gradient(90deg, var(--gold-3) 0%, var(--gold-2) 40%, #fff 50%, var(--gold-2) 60%, var(--gold-3) 100%);
      background-size: 200% auto;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
    }
    
    .subtitle-show { 
        animation: 
            cinematicSettle 2.5s var(--ease-out-expo) forwards,
            shimmerSweep 4s linear infinite 2.5s; 
    }
    @keyframes cinematicSettle {
        0% { opacity: 0; transform: translate3d(0, -40px, 0) scale(1.1); filter: blur(8px); }
        100% { opacity: 1; transform: translate3d(0, 0, 0) scale(1); filter: blur(0px); text-shadow: 0 5px 20px rgba(0,0,0,0.9); }
    }
    @keyframes shimmerSweep {
        to { background-position: 200% center; }
    }

    /* BILINGUAL NAME SWAP CONTAINER */
    .lang-swap-container {
      position: relative;
      width: 100%;
      height: clamp(60px, 15vw, 160px);
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
    }

    .name-container { 
      position: absolute;
      display: flex; 
      justify-content: center; 
      align-items: center;
      white-space: nowrap; 
      max-width: 95vw;
      transition: opacity 1.5s ease, transform 1.5s var(--ease-spring);
    }
    
    .name-hidden {
        opacity: 0 !important;
        transform: scale(0.9) rotateX(20deg) !important;
        pointer-events: none;
    }
    .name-visible {
        opacity: 1 !important;
        transform: scale(1) rotateX(0deg) !important;
    }
    
    .rest-part-wrapper {
        display: grid;
        grid-template-columns: 0fr; 
        transition: grid-template-columns 1.2s var(--ease-in-out-circ);
        will-change: grid-template-columns;
    }
    .rest-part-wrapper.expand { grid-template-columns: 1fr; }
    
    .rest-part-inner {
        overflow: hidden;
        display: flex;
        align-items: center;
        padding: 20px 0;
        margin: -20px 0;
    }

    .letter {
      font-family: 'Cinzel', serif;
      font-size: clamp(30px, 9vw, 130px); 
      font-weight: 800;
      color: var(--gold-2);
      -webkit-font-smoothing: antialiased;
      will-change: transform, opacity, color, text-shadow;
      text-shadow: 
        0 1px 0 #b38728, 0 2px 0 #9f7622, 0 3px 0 #8c661c,
        0 15px 25px rgba(0,0,0,0.8);
    }

    .initial-part {
      opacity: 0;
      transform: translate3d(0, 50px, -200px) rotateX(-70deg) scale(0.8);
      transition: transform 1.2s var(--ease-spring), opacity 1s ease;
    }
    .initial-part.show { 
      opacity: 1; 
      transform: translate3d(0, 0, 0) rotateX(0deg) scale(1); 
    }

    .is-name { opacity: 0; margin-left: clamp(2px, 1vw, 12px); }

    @keyframes popFlash {
        0% { opacity: 0; transform: translate3d(0, 50px, -150px) rotateX(-70deg) scale(0.8); color: transparent; text-shadow: 0 0 40px rgba(253, 245, 201, 0); }
        50% { opacity: 1; transform: translate3d(0, -10px, 30px) rotateX(10deg) scale(1.1); color: #fff; text-shadow: 0 0 50px rgba(253, 245, 201, 1), 0 10px 20px rgba(0,0,0,0.8); }
        100% { opacity: 1; transform: translate3d(0, 0, 0) scale(1) rotateX(0deg); color: var(--gold-2); text-shadow: 0 1px 0 #b38728, 0 2px 0 #9f7622, 0 3px 0 #8c661c, 0 15px 25px rgba(0,0,0,0.8); }
    }

    /* ===== ADVANCED KAWAII BABY GIRL SVG & SPARKLES ===== */
    #baby-girl-container {
        position: relative;
        margin-top: 15px;
        transform: translate3d(0, 50px, -50px) rotateX(-90deg) scale(0.8); 
        width: 180px;
        height: 180px;
        opacity: 0;
        filter: drop-shadow(0 20px 20px rgba(0,0,0,0.6));
        transition: transform 1.5s var(--ease-spring), opacity 1.2s ease, filter 1.2s ease;
        display: flex;
        justify-content: center;
        align-items: center;
        will-change: transform, opacity, filter;
        transform-style: preserve-3d;
        backface-visibility: hidden;
    }
    
    #baby-girl-container.slide-in {
        transform: translate3d(0, 0, 0) rotateX(0deg) scale(1); 
        opacity: 1;
        animation: floatBaby 4s ease-in-out infinite forwards;
        animation-delay: 1.5s;
    }
    
    @keyframes floatBaby {
        0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
        50% { transform: translate3d(0, -12px, 0) scale(1.02); }
    }
    
    .waving-arm {
        transform-origin: 140px 140px; 
        animation: wave-hand 0.8s infinite alternate ease-in-out;
        will-change: transform;
    }
    @keyframes wave-hand {
        0% { transform: rotate(-5deg); }
        100% { transform: rotate(35deg); }
    }

    .eyes {
        transform-origin: 100px 98px;
        animation: blink 4s infinite;
    }
    @keyframes blink {
        0%, 96%, 98%, 100% { transform: scaleY(1); }
        97% { transform: scaleY(0.1); }
    }
    
    .head-group {
        transform-origin: 100px 140px;
        animation: headBob 3s infinite alternate ease-in-out;
    }
    @keyframes headBob {
        0% { transform: rotate(-1.5deg); }
        100% { transform: rotate(2.5deg); }
    }

    .sparkle {
        position: absolute;
        font-size: clamp(14px, 3vw, 20px);
        opacity: 0;
        animation: twinkle 2s infinite ease-in-out;
        pointer-events: none;
        will-change: transform, opacity;
    }
    @keyframes twinkle {
        0%, 100% { opacity: 0; transform: scale(0.5) rotate(0deg); }
        50% { opacity: 1; transform: scale(1.2) rotate(20deg); text-shadow: 0 0 15px #fdf5c9; }
    }

    /* ===== POST-REVEAL JOURNEY TIMER ===== */
    #journey-timer-container {
        margin-top: clamp(30px, 6vw, 50px);
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
    }
    #journey-title {
        font-family: 'Cinzel', serif;
        font-size: clamp(14px, 3vw, 24px);
        margin-bottom: 15px;
        letter-spacing: 2px;
        text-transform: uppercase;
        text-shadow: 0 5px 15px rgba(0,0,0,0.8);
    }
    .compact-timer {
        max-width: 500px;
        gap: clamp(4px, 1.5vw, 15px);
        margin-bottom: 0;
    }
    .compact-timer .time-unit {
        padding: clamp(8px, 2vw, 15px) 2px;
        border-radius: 8px;
        transform: none; /* Disable 3D flip for the bottom timer */
        opacity: 1;
    }
    .compact-timer .time-unit div {
        font-size: clamp(16px, 4vw, 45px);
    }

    /* ===== HARDWARE ACCELERATED BALLOONS ===== */
    .balloon-anim {
        position: absolute;
        bottom: -200px;
        will-change: transform, opacity;
        animation: floatUp 7s linear forwards;
    }
    
    .balloon-sway {
        transform-origin: bottom center;
        will-change: transform;
        animation: swayBalloon 3s ease-in-out infinite alternate;
    }
    
    @keyframes floatUp {
        0% { transform: translate3d(0, 0, 0); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translate3d(var(--drift), -120dvh, 0); opacity: 0; }
    }
    @keyframes swayBalloon {
        0% { transform: rotate(-8deg); }
        100% { transform: rotate(8deg); }
    }

    /* ===== REDUCED MOTION ===== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>

  <script>
    'use strict';

    /* ===== CONFIGURATION ===== */
    const CONFIG = {
      ceremonyNameEn: window.__ceremonyNameEn || 'A.NIVISHA',
      ceremonyNameTa: window.__ceremonyNameTa || 'அ. நிவிஷா',
      topNames: ['NIVISHA-நிவிஷா', 'NITHISHA-நித்திஷா', 'NALINA-நளினா'],
      // Pass a valid Date string here, or set null to use demo timer.
      ceremonyEventDate: '2026-06-29T09:30:00', 
      timerDemoSeconds: 8
    };

    /* ===== ELEMENT CACHE ===== */
    const qs = (sel, root = document) => root ? root.querySelector(sel) : null;
    const qsa = (sel, root = document) => root ? Array.from(root.querySelectorAll(sel)) : [];
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const elements = {
      letterN: qs('#letter-N'),
      sealWrapper: qs('#seal-wrapper'),
      sealAura: qs('#seal-aura'),
      clickHint: qs('#click-hint'),
      gateLeft: qs('#gate-left'),
      gateRight: qs('#gate-right'),
      sceneContainer: qs('#scene-container'),
      timerScreen: qs('#timer-screen'),
      countdownScreen: qs('#countdown-screen'),
      revealScreen: qs('#reveal-screen'),
      revealSubtitle: qs('#reveal-subtitle'),
      
      babyNameEn: qs('#baby-name-en'),
      babyNameTa: qs('#baby-name-ta'),
      
      canvas: qs('#canvas-bg'),
      flashOverlay: qs('#flash-overlay'),
      
      journeyContainer: qs('#journey-timer-container'),
      
      // Top Names & Suggestion Elements
      topNamesContainer: qs('#top-names-container'),
      topNamesTitle: qs('#top-names-title'),
      topNamesFlex: qs('#top-names-flex'),
      suggestionContainer: qs('#suggestion-container'),
      suggestionText: qs('#suggestion-text'),
      suggestionInputWrapper: qs('.suggestion-input-wrapper'),
      nameSuggestion: qs('#name-suggestion'),
      submitSuggestion: qs('#submit-suggestion'),
      suggestionThankYou: qs('#suggestion-thank-you')
    };

    /* ===== PULL TO REFRESH LOGIC ===== */
    let startY = 0;
    let currentPull = 0;
    const ptrWrapper = qs('#ptr-wrapper');
    const ptrIcon = qs('#ptr-icon');
    const ptrThreshold = 100; 

    function handleDragStart(y) {
        startY = y;
        ptrWrapper.style.transition = 'none';
        ptrIcon.style.transition = 'none';
    }

    function handleDragMove(y) {
        if (startY === 0) return;
        const diff = y - startY;
        if (diff > 0) {
            currentPull = Math.pow(diff, 0.8) * 1.5; 
            ptrWrapper.style.transform = `translate3d(-50%, calc(-50px + ${currentPull}px), 0)`;
            ptrIcon.style.transform = `rotate(${currentPull * 2.5}deg)`;
            if (currentPull > ptrThreshold) {
                ptrWrapper.classList.add('ready');
            } else {
                ptrWrapper.classList.remove('ready');
            }
        }
    }

    function handleDragEnd() {
        if (startY === 0) return;
        startY = 0;
        ptrWrapper.style.transition = 'transform 0.4s var(--ease-out-expo), box-shadow 0.3s ease, background 0.3s ease';
        ptrIcon.style.transition = 'transform 0.4s ease';

        if (currentPull > ptrThreshold) {
            ptrWrapper.style.transform = `translate3d(-50%, 30px, 0)`;
            ptrIcon.classList.add('ptr-spin');
            setTimeout(() => window.location.reload(), 500); 
        } else {
            ptrWrapper.style.transform = `translate3d(-50%, 0, 0)`;
        }
        currentPull = 0;
    }

    document.addEventListener('touchstart', e => {
        if (e.touches.length > 1) return;
        handleDragStart(e.touches[0].clientY);
    }, { passive: true });
    document.addEventListener('touchmove', e => {
        handleDragMove(e.touches[0].clientY);
    }, { passive: true });
    document.addEventListener('touchend', handleDragEnd);

    let isMouseDown = false;
    document.addEventListener('mousedown', e => {
        if (e.target.tagName.toLowerCase() === 'input' || e.target.tagName.toLowerCase() === 'button' || e.target.classList.contains('top-name-card')) return;
        isMouseDown = true;
        handleDragStart(e.clientY);
    });
    document.addEventListener('mousemove', e => {
        if (!isMouseDown) return;
        handleDragMove(e.clientY);
    });
    document.addEventListener('mouseup', () => {
        if (!isMouseDown) return;
        isMouseDown = false;
        handleDragEnd();
    });
    
    // Interactive Magnetic Seal Hover (Desktop Only)
    elements.sealWrapper?.addEventListener('mousemove', (e) => {
        if(window.innerWidth < 768) return;
        const rect = elements.sealWrapper.getBoundingClientRect();
        const x = e.clientX - rect.left - rect.width/2;
        const y = e.clientY - rect.top - rect.height/2;
        elements.sealWrapper.style.transform = `perspective(1000px) rotateY(${x/10}deg) rotateX(${-y/10}deg) scale3d(1.05, 1.05, 1.05)`;
    });
    elements.sealWrapper?.addEventListener('mouseleave', () => {
        elements.sealWrapper.style.transform = `perspective(1000px) rotateY(0deg) rotateX(0deg) scale3d(1, 1, 1)`;
    });

    /* ===== OPTIMIZED FIREFLY CANVAS ===== */
    let animationId = null;
    let particlesArray = [];
    let canvasCtx = null;
    let canvasWidth, canvasHeight;
    let particlesFading = false;
    let particlesAlpha = 1.0;

    function initCanvas() {
      if (!elements.canvas) return;
      canvasCtx = elements.canvas.getContext('2d', { alpha: true });
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas, { passive: true });

      class Particle {
        constructor() {
          this.x = Math.random() * canvasWidth;
          this.y = Math.random() * canvasHeight;
          this.size = Math.random() * 1.5 + 0.5;
          this.speedY = Math.random() * 0.15 - 0.075;
          this.speedX = Math.random() * 0.15 - 0.075;
          
          this.alpha = Math.random() * 0.5 + 0.1;
          this.alphaChange = (Math.random() * 0.01) + 0.005;
          if (Math.random() > 0.5) this.alphaChange *= -1;

          this.angle = Math.random() * Math.PI * 2;
          this.angleSpeed = Math.random() * 0.02 + 0.01;
        }
        update() {
          this.angle += this.angleSpeed;
          this.x += this.speedX + Math.sin(this.angle) * 0.4;
          this.y += this.speedY - Math.cos(this.angle) * 0.2;
          
          if (this.y > canvasHeight) this.y = 0;
          if (this.y < 0) this.y = canvasHeight;
          if (this.x > canvasWidth) this.x = 0;
          if (this.x < 0) this.x = canvasWidth;
          
          this.alpha += this.alphaChange;
          if (this.alpha <= 0.05) {
              this.alpha = 0.05;
              this.alphaChange *= -1;
          } else if (this.alpha >= 0.6) {
              this.alpha = 0.6;
              this.alphaChange *= -1;
          }
        }
        draw() {
          canvasCtx.fillStyle = `rgba(212, 175, 55, ${this.alpha})`;
          canvasCtx.beginPath();
          canvasCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          canvasCtx.fill();
        }
      }

      const particleCount = window.innerWidth < 600 ? 50 : 120;
      particlesArray = [];
      for (let i = 0; i < particleCount; i++) particlesArray.push(new Particle());

      if (!reducedMotion) animateCanvas();
    }

    function resizeCanvas() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvasWidth = window.innerWidth;
      canvasHeight = window.innerHeight;
      elements.canvas.width = Math.round(canvasWidth * dpr);
      elements.canvas.height = Math.round(canvasHeight * dpr);
      elements.canvas.style.width = canvasWidth + 'px';
      elements.canvas.style.height = canvasHeight + 'px';
      canvasCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function animateCanvas() {
      if (particlesFading) {
          particlesAlpha -= 0.015; 
          if (particlesAlpha <= 0) {
              canvasCtx.clearRect(0, 0, canvasWidth, canvasHeight);
              return; 
          }
          canvasCtx.globalAlpha = particlesAlpha;
      } else {
          canvasCtx.globalAlpha = 1.0;
      }

      canvasCtx.clearRect(0, 0, canvasWidth, canvasHeight);
      for (const p of particlesArray) {
        p.update();
        p.draw();
      }
      animationId = requestAnimationFrame(animateCanvas);
    }

    /* ===== SMART NAME RENDERER ===== */
    function renderName(nameStr, container) {
      if (!container) return;
      container.innerHTML = '';
      const final = (nameStr && nameStr.trim().length > 0) ? nameStr.trim().toUpperCase() : 'A.NURA';

      let initialEndIdx = final.indexOf('.');
      if (initialEndIdx === -1) initialEndIdx = final.indexOf(' ');
      if (initialEndIdx === -1) initialEndIdx = 0; 

      const initialStr = final.substring(0, initialEndIdx + 1);
      const restStr = final.substring(initialEndIdx + 1).trim();

      const initialDiv = document.createElement('div');
      initialDiv.className = 'initial-part letter';
      initialDiv.textContent = initialStr;
      container.appendChild(initialDiv);

      const restWrapper = document.createElement('div');
      restWrapper.className = 'rest-part-wrapper';
      
      const restInner = document.createElement('div');
      restInner.className = 'rest-part-inner';

      Array.from(restStr).forEach(ch => {
        const el = document.createElement('div');
        el.className = 'letter is-name';
        el.innerHTML = ch === ' ' ? '&nbsp;' : ch;
        restInner.appendChild(el);
      });

      restWrapper.appendChild(restInner);
      container.appendChild(restWrapper);
    }

    /* ===== SECURE VOTING & SUBMISSION LOGIC ===== */
    function isVotingAllowed() {
        if (!eventDate) return false;
        const dist = eventDate.getTime() - Date.now();
        const twoDaysMs = 2 * 24 * 60 * 60 * 1000;
        return dist > twoDaysMs;
    }

    function renderTopNames(isVotingEnabled) {
        if(!elements.topNamesFlex) return;
        elements.topNamesFlex.innerHTML = '';
        
        if (elements.topNamesTitle) {
            elements.topNamesTitle.textContent = isVotingEnabled ? "Vote for your favorite name" : "Top Shortlisted Names";
        }

        CONFIG.topNames.forEach(name => {
            const el = document.createElement('div');
            el.className = 'top-name-card';
            if (isVotingEnabled) {
                el.classList.add('voting-enabled');
                el.addEventListener('click', () => submitDatabaseName(name));
            }
            el.textContent = name;
            elements.topNamesFlex.appendChild(el);
        });
    }

    function submitDatabaseName(suggestionString) {
        if (!suggestionString || suggestionString.trim() === '') return;
        
        // Security check: Reject submission if the 2-day threshold has passed
        if (!isVotingAllowed()) return; 
        
        // Google Apps Script Web App URL
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw_7UawCbLHx9bdcPnwqMaBUFyvUxWrRgiYYJuuec7wvgMreoiOilbtVOLRRbSsEpn2/exec';
        
        const formData = new FormData();
        formData.append('Suggestion', suggestionString.trim());
        
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: formData
        }).catch(error => console.error('Error!', error.message));

        // Beautiful localized confetti burst for positive feedback
        if (typeof confetti === 'function') {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.8 },
                colors: ['#d4af37', '#e6ca7b', '#ffffff'],
                zIndex: 9999,
                disableForReducedMotion: true
            });
        }

        // Fade out all suggestion/voting UI securely
        if(elements.suggestionText) elements.suggestionText.style.opacity = '0';
        if(elements.suggestionInputWrapper) elements.suggestionInputWrapper.style.opacity = '0';
        if(elements.topNamesFlex) elements.topNamesFlex.style.opacity = '0';
        if(elements.topNamesTitle) elements.topNamesTitle.style.opacity = '0';
        
        setTimeout(() => {
            if(elements.suggestionContainer) elements.suggestionContainer.style.display = 'none';
            if(elements.topNamesContainer) elements.topNamesContainer.style.display = 'none';
            
            // Show cinematic thank you
            if(elements.suggestionThankYou) {
                elements.timerScreen.appendChild(elements.suggestionThankYou);
                elements.suggestionThankYou.style.display = 'block';
                elements.suggestionThankYou.style.marginTop = '20px';
                elements.suggestionThankYou.style.animation = 'thankYouPop 4s forwards';
            }
        }, 400);
    }

    /* ===== TIMER LOGIC ===== */
    let countdownInterval = null;
    let finalTimer = null;
    let eventDate = null; 

    function safeSetText(id, text) {
      const el = document.getElementById(id);
      if (el) el.textContent = text;
    }

    function startTimer() {
      if (countdownInterval) clearInterval(countdownInterval);
      function updateOnce() {
        const now = Date.now();
        const dist = eventDate.getTime() - now;
        
        if (dist <= 0) {
          clearInterval(countdownInterval);
          if (elements.timerScreen) {
              elements.timerScreen.style.opacity = '0';
          }
          setTimeout(() => {
              if (elements.timerScreen) elements.timerScreen.style.display = 'none';
              startFinalCountdown();
          }, 1000); 
          return;
        }
        
        const days = Math.floor(dist / (1000 * 60 * 60 * 24));
        const hours = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((dist % (1000 * 60)) / 1000);
        safeSetText('days', days < 10 ? '0' + days : String(days));
        safeSetText('hours', hours < 10 ? '0' + hours : String(hours));
        safeSetText('mins', minutes < 10 ? '0' + minutes : String(minutes));
        safeSetText('secs', seconds < 10 ? '0' + seconds : String(seconds));
      }
      updateOnce();
      countdownInterval = setInterval(updateOnce, 1000);
    }
    
    let journeyInterval = null;
    function startJourneyTimer() {
        if (journeyInterval) clearInterval(journeyInterval);
        function updateJourney() {
            const now = Date.now();
            let diff = eventDate.getTime() - now;
            const titleEl = qs('#journey-title');
            
            if (diff < 0) {
                diff = Math.abs(diff); // Count UP
                if(titleEl) titleEl.textContent = "The Journey Unfolded For";
            } else {
                if(titleEl) titleEl.textContent = "Untold Journey Begins In";
            }
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            safeSetText('j-days', days < 10 ? '0' + days : String(days));
            safeSetText('j-hours', hours < 10 ? '0' + hours : String(hours));
            safeSetText('j-mins', minutes < 10 ? '0' + minutes : String(minutes));
            safeSetText('j-secs', seconds < 10 ? '0' + seconds : String(seconds));
        }
        updateJourney();
        journeyInterval = setInterval(updateJourney, 1000);
    }

    /* ===== BUG-FREE CINEMATIC COUNTDOWN ===== */
    function startFinalCountdown() {
      if (elements.countdownScreen) elements.countdownScreen.style.display = 'flex';
      let count = 5;
      
      function popNumber(num) {
          if (!elements.countdownScreen) return;
          elements.countdownScreen.innerHTML = '';
          const span = document.createElement('span');
          span.className = 'countdown-num';
          span.textContent = String(num);
          elements.countdownScreen.appendChild(span);
      }

      popNumber(count);

      finalTimer = setInterval(() => {
        count--;
        if (count > 0) {
            popNumber(count);
        } else {
            clearInterval(finalTimer);
            if (elements.countdownScreen) elements.countdownScreen.style.display = 'none';
            
            if (elements.flashOverlay) {
                elements.flashOverlay.classList.add('flash');
                setTimeout(() => elements.flashOverlay.classList.remove('flash'), 100);
            }
            
            triggerGrandReveal();
        }
      }, 1000);
    }

    /* ===== ENTRANCE & REVEAL LOGIC ===== */
    function triggerEntrance() {
      if (!elements.letterN || elements.letterN.getAttribute('data-activated') === 'true') return;
      elements.letterN.setAttribute('data-activated', 'true');
      
      if (CONFIG.ceremonyEventDate) {
          const parsed = new Date(CONFIG.ceremonyEventDate);
          if (!isNaN(parsed.getTime())) {
              eventDate = parsed;
          }
      }
      if (!eventDate) {
          eventDate = new Date(Date.now() + (CONFIG.timerDemoSeconds * 1000));
      }

      if (elements.clickHint) {
          elements.clickHint.style.animation = 'none';
          elements.clickHint.style.opacity = '0';
      }

      if (!reducedMotion) {
        elements.letterN.classList.add('shatter');
        elements.sealAura.classList.add('explode');
      }

      setTimeout(() => {
        elements.gateLeft?.classList.add('open-left');
        elements.gateRight?.classList.add('open-right');
      }, 400); 

      setTimeout(() => {
        if(elements.sceneContainer) {
            elements.sceneContainer.style.opacity = '0';
            setTimeout(() => elements.sceneContainer.style.display = 'none', 1500);
        }
        
        const now = Date.now();
        const dist = eventDate.getTime() - now;

        if (dist <= 0) {
            startFinalCountdown();
        } else {
            elements.timerScreen && (elements.timerScreen.style.display = 'flex');
            void elements.timerScreen.offsetWidth; 
            elements.timerScreen && (elements.timerScreen.style.opacity = '1');
            
            const units = qsa('.time-unit', elements.timerScreen);
            units.forEach((u, i) => {
                setTimeout(() => u.classList.add('show-unit'), 100 + (i * 120));
            });

            // ===== EXACT 2-DAY RULE LOGIC =====
            const votingActive = isVotingAllowed();
            
            // 1. Render Top Names (Always visible, but interactivity is controlled securely)
            renderTopNames(votingActive);
            if (elements.topNamesContainer) {
                elements.topNamesContainer.style.display = 'flex';
                setTimeout(() => {
                    elements.topNamesContainer.classList.add('show');
                }, 100 + (units.length * 120) + 300);
            }
            
            // 2. Safely Render Suggestion Box with Disabled States
            if (elements.suggestionContainer) {
                elements.suggestionContainer.style.display = 'flex';
                
                if (!votingActive) {
                    if (elements.suggestionText) elements.suggestionText.textContent = "Suggestions & Voting Closed";
                    if (elements.nameSuggestion) {
                        elements.nameSuggestion.disabled = true;
                        elements.nameSuggestion.placeholder = "Ceremony approaching...";
                    }
                    if (elements.submitSuggestion) {
                        elements.submitSuggestion.disabled = true;
                    }
                } else {
                    if (elements.suggestionText) elements.suggestionText.textContent = "Or suggest a beautiful name...";
                    if (elements.nameSuggestion) {
                        elements.nameSuggestion.disabled = false;
                        elements.nameSuggestion.placeholder = "Enter name suggestion...";
                    }
                    if (elements.submitSuggestion) {
                        elements.submitSuggestion.disabled = false;
                    }
                }

                setTimeout(() => {
                    elements.suggestionContainer.classList.add('show');
                }, 100 + (units.length * 120) + 600);
            }
            
            startTimer();
        }
      }, 2000); 
    }

    function triggerGrandReveal() {
      elements.revealScreen && (elements.revealScreen.style.display = 'flex');
      
      if (elements.revealSubtitle) {
          elements.revealSubtitle.classList.add('subtitle-show');
      }

      // Start revealing the English Name
      setTimeout(() => {
          const initialPart = qs('.initial-part', elements.babyNameEn);
          if (initialPart) initialPart.classList.add('show');

          setTimeout(() => {
              const wrapper = qs('.rest-part-wrapper', elements.babyNameEn);
              if(wrapper) wrapper.classList.add('expand');

              const restLetters = qsa('.is-name', elements.babyNameEn);
              restLetters.forEach((letter, idx) => {
                  setTimeout(() => {
                      letter.classList.add('show');
                      if (!reducedMotion) {
                          letter.style.animation = 'popFlash 1.2s var(--ease-out-expo) forwards';
                      }
                  }, idx * 100);
              });

              const totalDelay = (restLetters.length * 100) + 500;
              setTimeout(() => { 
                  
                  fireFourCornerBlast();
                  fireHeartBalloons();
                  
                  // Setup Bilingual Swap Loop
                  setInterval(() => {
                      const en = elements.babyNameEn;
                      const ta = elements.babyNameTa;
                      if(en.classList.contains('name-visible')){
                          en.classList.remove('name-visible');
                          en.classList.add('name-hidden');
                          ta.classList.remove('name-hidden');
                          ta.classList.add('name-visible');
                      } else {
                          ta.classList.remove('name-visible');
                          ta.classList.add('name-hidden');
                          en.classList.remove('name-hidden');
                          en.classList.add('name-visible');
                      }
                  }, 4000);
                  
                  setTimeout(() => {
                      const babyGirl = qs('#baby-girl-container');
                      if(babyGirl) babyGirl.classList.add('slide-in');
                  }, 500);
                  
                  setTimeout(() => {
                      if(elements.journeyContainer) elements.journeyContainer.classList.add('show');
                      startJourneyTimer();
                  }, 1500);

              }, totalDelay);

          }, 1200); 
          
      }, 1500);
    }

    /* ===== OPTIMIZED CANNON BLAST ===== */
    function fireFourCornerBlast() {
      if (reducedMotion || typeof confetti !== 'function') return;
      
      const duration = 4000;
      const animationEnd = Date.now() + duration;

      const interval = setInterval(() => {
        const timeLeft = animationEnd - Date.now();
        if (timeLeft <= 0) {
            return clearInterval(interval);
        }

        const pCount = window.innerWidth < 600 ? 5 : 10; 
        const cColors = ['#d4af37', '#e6ca7b', '#ffffff', '#f48fb1']; 
        const settings = { particleCount: pCount, spread: 45, colors: cColors, zIndex: 80, gravity: 1.1, shapes: ['square', 'circle'] };

        confetti({ ...settings, origin: { x: 0, y: 0 }, angle: 315, startVelocity: 35 });
        confetti({ ...settings, origin: { x: 1, y: 0 }, angle: 225, startVelocity: 35 });
        confetti({ ...settings, origin: { x: 0, y: 1 }, angle: 45, startVelocity: 60 });
        confetti({ ...settings, origin: { x: 1, y: 1 }, angle: 135, startVelocity: 60 });
      }, 300); 
    }

    /* ===== OPTIMIZED HARDWARE-ACCELERATED BALLOONS ===== */
    function fireHeartBalloons() {
        const container = document.createElement('div');
        container.style.position = 'fixed';
        container.style.inset = '0';
        container.style.pointerEvents = 'none';
        container.style.zIndex = '90';
        container.style.overflow = 'hidden';
        document.body.appendChild(container);

        const maxBalloons = window.innerWidth < 600 ? 12 : 25;
        
        if (window.innerWidth <= 767) {
            particlesFading = true;
        }

        let htmlStr = '';
        const delays = [];
        
        for (let i = 0; i < maxBalloons; i++) {
            const startX = Math.random() * 100; 
            const endX = (Math.random() - 0.5) * 150; 
            const scale = 0.5 + Math.random() * 0.7;
            const animDelay = Math.random() * 2.5; 
            const swayDelay = -(Math.random() * 3);
            delays.push(animDelay * 1000);
            
            htmlStr += `
                <div class="balloon-anim" style="left: ${startX}vw; --drift: ${endX}px; animation-delay: ${animDelay}s;">
                    <div class="balloon-sway" style="transform: scale(${scale}); animation-delay: ${swayDelay}s;">
                        <svg width="80" height="80" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <radialGradient id="balloonGrad${i}" cx="30%" cy="30%" r="70%">
                                    <stop offset="0%" stop-color="#ff8080" />
                                    <stop offset="50%" stop-color="#e60000" />
                                    <stop offset="100%" stop-color="#990000" />
                                </radialGradient>
                            </defs>
                            <path fill="url(#balloonGrad${i})" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                        </svg>
                        <div style="width: 2px; height: 60px; background: rgba(255,255,255,0.4); margin: 0 auto; margin-top: -8px;"></div>
                    </div>
                </div>
            `;
        }
        
        container.innerHTML = htmlStr;
        const maxWait = Math.max(...delays) + 8000;
        setTimeout(() => container.remove(), maxWait); 
    }

    /* ===== INITIALIZATION ===== */
    (function init() {
      initCanvas();
      
      // Render English Name
      renderName(CONFIG.ceremonyNameEn, elements.babyNameEn);
      
      // Render Tamil Name
      if (elements.babyNameTa) {
          elements.babyNameTa.innerHTML = `<div class="letter" style="opacity:1; transform:scale(1); filter:blur(0); text-shadow: 0 1px 0 #b38728, 0 2px 0 #9f7622, 0 3px 0 #8c661c, 0 15px 25px rgba(0,0,0,0.8);">${CONFIG.ceremonyNameTa}</div>`;
      }

      elements.letterN?.addEventListener('click', triggerEntrance, { passive: true });
      elements.letterN?.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              triggerEntrance();
          }
      });
      
      // ===== CUSTOM SUGGESTION SUBMIT LOGIC =====
      elements.submitSuggestion?.addEventListener('click', () => {
          if (elements.nameSuggestion && elements.nameSuggestion.value.trim() !== '') {
              submitDatabaseName(elements.nameSuggestion.value);
          }
      });
      
      elements.nameSuggestion?.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && elements.nameSuggestion.value.trim() !== '') {
              e.preventDefault();
              submitDatabaseName(elements.nameSuggestion.value);
          }
      });
      
    })();
  </script>
</body>
