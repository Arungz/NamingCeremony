  <title>Naming Ceremony ✨</title>
  <link rel="icon" type="image/png" href="Images/ak.png">

  <script defer src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Cinzel+Decorative:wght@700&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet" />

  <style>
    /* ===== VARIABLES & CORE RESETS ===== */
    :root {
      --bg: #050505;
      --gold-1: #bf953f;
      --gold-2: #fdf5c9;
      --gold-3: #b38728;
      --muted: rgba(255, 255, 255, 0.5);
      --glass: rgba(20, 20, 20, 0.4);
      --glass-border: rgba(191, 149, 63, 0.3);
      --safe-area-top: env(safe-area-inset-top);
      --safe-area-bottom: env(safe-area-inset-bottom);
      
      /* Cinematic Easing */
      --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
      --ease-in-out-circ: cubic-bezier(0.85, 0, 0.15, 1);
      --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      -webkit-tap-highlight-color: transparent !important;
      outline: none !important;
    }
    
    html, body { 
      height: 100%; 
      height: 100dvh; 
      overflow: hidden; 
      background-color: var(--bg);
      touch-action: pan-y;
    }
    
    body {
      font-family: 'Montserrat', sans-serif;
      background: radial-gradient(circle at 50% 50%, #1a1c20 0%, #050505 100%);
      color: #fff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      display: flex;
      justify-content: center;
      align-items: center;
      padding-top: var(--safe-area-top);
      padding-bottom: var(--safe-area-bottom);
      perspective: 1500px; 
      user-select: none; 
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' result='noise'/%3E%3CfeDisplacementMap in='SourceGraphic' in2='noise' scale='20'/%3E%3C/filter%3E%3Crect width='200' height='200' fill='%23050505' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      z-index: 0;
      pointer-events: none;
    }

    /* ===== OPTIMIZED AMBIENT MAGIC GLOW ===== */
    .ambient-light {
        position: fixed;
        top: 50%; left: 50%;
        width: 100vw; height: 100vh;
        background: radial-gradient(circle, rgba(191, 149, 63, 0.05) 0%, transparent 60%);
        transform: translate3d(-50%, -50%, 0);
        z-index: 2; 
        pointer-events: none;
        will-change: transform, opacity;
        animation: breatheLight 6s infinite alternate ease-in-out;
    }
    @keyframes breatheLight {
        0% { transform: translate3d(-50%, -50%, 0) scale(0.9); opacity: 0.5; }
        100% { transform: translate3d(-50%, -50%, 0) scale(1.1); opacity: 1; }
    }

    #canvas-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      opacity: 0.6;
      pointer-events: none;
    }

    .gold-shimmer {
      background: linear-gradient(90deg, var(--gold-1), var(--gold-2), var(--gold-3), var(--gold-2), var(--gold-1));
      background-size: 200% auto;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
    }

    /* ===== PULL TO REFRESH UI ===== */
    #ptr-wrapper {
        position: fixed;
        top: -70px;
        left: 50%;
        transform: translate3d(-50%, 0, 0);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 50px;
        height: 50px;
        background: rgba(20, 20, 20, 0.8);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid var(--gold-1);
        border-radius: 50%;
        box-shadow: 0 5px 15px rgba(0,0,0,0.8), 0 0 0px rgba(212, 175, 55, 0);
        transition: box-shadow 0.3s ease, background 0.3s ease;
        pointer-events: none;
        will-change: transform;
    }
    #ptr-wrapper.ready {
        box-shadow: 0 5px 25px rgba(0,0,0,0.9), 0 0 20px rgba(212, 175, 55, 0.4);
        background: rgba(40, 30, 10, 0.95);
        border-color: var(--gold-2);
    }
    #ptr-icon {
        width: 24px;
        height: 24px;
        fill: var(--gold-2);
        transform-origin: center;
        will-change: transform;
    }
    .ptr-spin { animation: fastSpin 0.5s linear infinite !important; }
    @keyframes fastSpin { 100% { transform: rotate(360deg); } }

    /* ===== CINEMATIC 3D INTRO CONTAINER ===== */
    #scene-container {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transform-style: preserve-3d;
      will-change: transform, opacity;
      transition: opacity 1.5s ease;
      perspective: 2000px;
    }

    .gate {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      background: linear-gradient(135deg, #0a0a0a, #000);
      box-shadow: inset 0 0 50px rgba(0,0,0,1);
      transition: transform 2.5s var(--ease-in-out-circ), opacity 2.5s ease, filter 2.5s ease;
      z-index: 101;
      overflow: hidden;
      will-change: transform, opacity, filter;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .gate::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.03) 50%, rgba(255,255,255,0) 100%);
        transform: skewX(-20deg) translateX(-150%);
        animation: modernSweep 5s infinite;
    }
    @keyframes modernSweep {
        0% { transform: skewX(-20deg) translateX(-150%); }
        100% { transform: skewX(-20deg) translateX(250%); }
    }

    .gate.left { left: 0; border-right: 2px solid var(--gold-1); transform-origin: left center; }
    .gate.right { right: 0; border-left: 2px solid var(--gold-1); transform-origin: right center; }
    
    .gate.open-left { transform: rotateY(-95deg) scale(1.1); opacity: 0; filter: blur(15px); }
    .gate.open-right { transform: rotateY(95deg) scale(1.1); opacity: 0; filter: blur(15px); }

    /* ===== MACHINED GOLD SEAL ===== */
    .seal-wrapper {
      position: relative;
      z-index: 102;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
      transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #letter-N {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(50px, 8vw, 110px);
      width: clamp(140px, 26vw, 240px);
      height: clamp(140px, 26vw, 240px);
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(191, 149, 63, 0.15) 0%, rgba(5, 5, 5, 0.8) 70%);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(191, 149, 63, 0.3);
      color: var(--gold-2);
      text-shadow: 0 0 20px rgba(253, 245, 201, 0.6), 0 0 40px rgba(191, 149, 63, 0.4);
      cursor: pointer;
      animation: invitePulse 2.5s infinite alternate ease-in-out;
      transition: transform 0.4s var(--ease-spring), box-shadow 0.4s ease, background 0.4s ease;
      font-weight: 700;
      position: relative;
      z-index: 103;
      outline: none;
      will-change: transform, box-shadow;
    }
    
    #letter-N::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid var(--gold-1);
        opacity: 0;
        animation: rippleRing 2s infinite var(--ease-out-expo);
    }
    @keyframes rippleRing {
        0% { transform: scale(1); opacity: 0.5; }
        100% { transform: scale(1.5); opacity: 0; }
    }

    #letter-N::after {
        content: '';
        position: absolute;
        inset: -4px;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top: 2px solid var(--gold-2);
        border-bottom: 2px solid var(--gold-1);
        opacity: 0.8;
        animation: spinEdge 4s linear infinite;
        pointer-events: none;
        box-shadow: inset 0 2px 10px rgba(191, 149, 63, 0.5);
    }
    @keyframes spinEdge {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    @keyframes invitePulse {
        from { box-shadow: 0 10px 30px rgba(0,0,0,0.9), 0 0 0 0 rgba(191, 149, 63, 0.1); }
        to { box-shadow: 0 10px 30px rgba(0,0,0,0.9), 0 0 25px 5px rgba(191, 149, 63, 0.4); }
    }
    
    #letter-N:hover, #letter-N:active { 
        animation: none; 
        transform: scale(1.05); 
        box-shadow: 0 20px 40px rgba(0,0,0,0.9), 0 0 30px 10px rgba(253, 245, 201, 0.3);
        background: radial-gradient(circle, rgba(191, 149, 63, 0.25) 0%, rgba(5, 5, 5, 0.9) 70%);
    }
    
    #letter-N:hover::before, #letter-N:active::before,
    #letter-N:hover::after, #letter-N:active::after { display: none; }

    #letter-N.shatter {
        animation: epicShatter 1.2s var(--ease-in-out-circ) forwards;
        pointer-events: none;
    }
    @keyframes epicShatter {
        0% { transform: scale(1); opacity: 1; filter: blur(0px); }
        30% { transform: scale(0.85) rotate(-5deg); opacity: 1; filter: blur(0px); box-shadow: 0 0 50px var(--gold-1); }
        100% { transform: scale(2.5) rotate(45deg); opacity: 0; filter: blur(15px); box-shadow: 0 0 0 transparent; }
    }

    .seal-aura {
        position: absolute;
        top: 50%; left: 50%;
        width: 10px; height: 10px;
        background: var(--gold-2);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        filter: blur(20px);
        opacity: 0;
        z-index: 101;
        transition: all 1.5s ease;
    }
    .seal-aura.explode {
        transform: translate(-50%, -50%) scale(100);
        opacity: 0;
        filter: blur(50px);
    }

    .click-hint {
      font-size: 13px;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: var(--muted);
      animation: hintFade 2s infinite alternate;
      transition: opacity 0.3s ease;
    }
    @keyframes hintFade { 0% { opacity: 0.3; } 100% { opacity: 1; } }

    /* ===== BULLETPROOF GRID TIMER SCREEN ===== */
    #timer-screen {
      position: absolute;
      z-index: 50;
      opacity: 0;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 1s ease;
      text-align: center;
      width: 100%;
      padding: clamp(10px, 2vw, 20px);
      box-sizing: border-box;
      perspective: 1200px;
    }
    
    #timer-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(16px, 4vw, 36px);
      margin-bottom: clamp(20px, 4vw, 50px);
      letter-spacing: clamp(3px, 1vw, 6px);
      text-transform: uppercase;
      text-shadow: 0 5px 15px rgba(0,0,0,0.8);
      white-space: nowrap;
    }
    
    .timer-box { 
      display: grid; 
      grid-template-columns: repeat(4, 1fr);
      gap: clamp(5px, 2vw, 20px); 
      justify-content: center; 
      width: 100%;
      max-width: 650px;
      padding: 0 10px;
      box-sizing: border-box;
    }
    
    .time-unit {
      background: var(--glass);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      border-left: 1px solid rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid rgba(0, 0, 0, 0.6);
      border-right: 1px solid rgba(0, 0, 0, 0.6);
      padding: clamp(10px, 3vw, 20px) 2px; 
      border-radius: 12px;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
      text-align: center;
      
      opacity: 0;
      transform: translate3d(0, -30px, -50px) rotateX(45deg);
      transition: opacity 0.6s ease, transform 1s var(--ease-spring);
      position: relative;
      overflow: hidden; 
      will-change: transform, opacity;
      transform-style: preserve-3d;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    
    .time-unit::after {
        content: '';
        position: absolute;
        top: -50%; left: -50%; width: 200%; height: 200%;
        background: linear-gradient(45deg, transparent, rgba(255,255,255,0.05), transparent);
        transform: rotate(45deg) translate3d(-100%, 0, 0);
        animation: glassCardShimmer 4s infinite linear;
        pointer-events: none;
    }
    @keyframes glassCardShimmer {
        0%, 30% { transform: rotate(45deg) translate3d(-100%, 0, 0); }
        70%, 100% { transform: rotate(45deg) translate3d(100%, 0, 0); }
    }
    
    .time-unit.show-unit {
        opacity: 1;
        transform: translate3d(0, 0, 0) rotateX(0deg);
    }
    
    .time-unit div { 
      font-weight: 300; 
      font-size: clamp(18px, 6vw, 65px); 
      line-height: 1; 
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      transform: translateZ(0);
    }
    .time-unit span { 
      display: block; 
      font-size: clamp(7px, 1.8vw, 12px); 
      color: var(--gold-1); 
      margin-top: 10px; 
      letter-spacing: clamp(1px, 0.5vw, 3px); 
      text-transform: uppercase; 
      font-family: 'Cinzel', serif;
    }

    /* ===== NEW: SUGGESTION BOX UI ===== */
    #suggestion-container {
        margin-top: clamp(25px, 5vw, 40px);
        display: none; /* Managed by JS based on 2 Days logic */
        flex-direction: column;
        align-items: center;
        gap: 15px;
        opacity: 0;
        transform: translate3d(0, 20px, 0);
        transition: opacity 0.8s ease, transform 1s var(--ease-spring);
    }
    #suggestion-container.show-suggestion {
        opacity: 1;
        transform: translate3d(0, 0, 0);
    }
    .suggestion-text {
        font-family: 'Cinzel', serif;
        color: var(--gold-1);
        font-size: clamp(12px, 2.5vw, 15px);
        letter-spacing: 2px;
        text-transform: uppercase;
        text-shadow: 0 2px 5px rgba(0,0,0,0.8);
    }
    .suggestion-input-wrapper {
        display: flex;
        gap: 8px;
        background: var(--glass);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        padding: 5px;
        border-radius: 30px;
        border: 1px solid rgba(191, 149, 63, 0.3);
        box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }
    #name-suggestion {
        background: transparent;
        border: none;
        outline: none;
        color: #fff;
        font-family: 'Montserrat', sans-serif;
        padding: 10px 20px;
        font-size: 14px;
        width: clamp(150px, 40vw, 250px);
    }
    #name-suggestion::placeholder {
        color: rgba(255, 255, 255, 0.4);
    }
    #submit-suggestion {
        background: linear-gradient(90deg, var(--gold-1), var(--gold-3));
        border: none;
        border-radius: 25px;
        color: #050505;
        font-family: 'Cinzel', serif;
        font-weight: 800;
        padding: 10px 25px;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    #submit-suggestion:active {
        transform: scale(0.95);
    }
    #suggestion-thank-you {
        font-family: 'Cinzel', serif;
        color: var(--gold-2);
        font-size: clamp(14px, 3vw, 18px);
        letter-spacing: 2px;
        text-shadow: 0 0 10px rgba(191, 149, 63, 0.8);
        display: none;
    }

    /* ===== FLAWLESS CINEMATIC COUNTDOWN SCREEN ===== */
    #countdown-screen {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 60;
      display: none;
      justify-content: center;
      align-items: center;
      pointer-events: none;
      overflow: hidden;
    }
    
    .countdown-num {
      position: absolute;
      font-family: 'Cinzel', serif;
      font-size: clamp(150px, 45vw, 400px);
      font-weight: 800;
      background: linear-gradient(180deg, var(--gold-2) 0%, var(--gold-1) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      will-change: transform, opacity, filter;
      animation: epicCount 1s var(--ease-out-expo) forwards;
    }

    @keyframes epicCount {
      0% { transform: scale(0.2) translate3d(0,0,-200px); opacity: 0; filter: blur(20px); }
      30% { transform: scale(1) translate3d(0,0,0); opacity: 1; filter: blur(0px); text-shadow: 0 0 50px rgba(191, 149, 63, 0.7); }
      100% { transform: scale(2.5) translate3d(0,0,200px); opacity: 0; filter: blur(30px); }
    }

    /* Cinematic White Flash Transition */
    #flash-overlay {
        position: fixed;
        inset: 0;
        background: #fff;
        z-index: 65;
        opacity: 0;
        pointer-events: none;
        transition: opacity 1.5s var(--ease-out-expo);
    }
    #flash-overlay.flash {
        opacity: 1;
        transition: opacity 0.2s ease;
    }

    /* ===== PERFECTLY POSITIONED REVEAL SCREEN ===== */
    #reveal-screen { 
      position: absolute; 
      inset: 0;
      z-index: 70; 
      display: none; 
      flex-direction: column;
      justify-content: flex-start; 
      padding-top: 15vh; 
      align-items: center;
      perspective: 1200px; 
      width: 100%; 
    }
    
    @media (min-width: 768px) {
      #reveal-screen { justify-content: center; padding-top: 0; }
    }
    
    #reveal-subtitle {
      font-family: 'Cinzel', serif;
      font-weight: 400;
      font-size: clamp(16px, 4vw, 32px);
      letter-spacing: clamp(4px, 2vw, 12px); 
      color: var(--gold-2);
      margin-bottom: 40px;
      text-transform: uppercase;
      opacity: 0;
      transform: translate3d(0, -20px, 0);
      text-shadow: 0 5px 20px rgba(0,0,0,0.9);
      text-align: center;
      will-change: transform, opacity;
      
      background: linear-gradient(90deg, var(--gold-3) 0%, var(--gold-2) 40%, #fff 50%, var(--gold-2) 60%, var(--gold-3) 100%);
      background-size: 200% auto;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
    }
    
    .subtitle-show { 
        animation: 
            cinematicSettle 2.5s var(--ease-out-expo) forwards,
            shimmerSweep 4s linear infinite 2.5s; 
    }
    @keyframes cinematicSettle {
        0% { opacity: 0; transform: translate3d(0, -40px, 0) scale(1.1); filter: blur(8px); }
        100% { opacity: 1; transform: translate3d(0, 0, 0) scale(1); filter: blur(0px); text-shadow: 0 5px 20px rgba(0,0,0,0.9); }
    }
    @keyframes shimmerSweep {
        to { background-position: 200% center; }
    }

    /* ===== SMART ANIMATION NAME CONTAINER ===== */
    .name-container { 
      display: flex; 
      justify-content: center; 
      align-items: center;
      white-space: nowrap; 
      max-width: 95vw;
    }
    
    .rest-part-wrapper {
        display: grid;
        grid-template-columns: 0fr; 
        transition: grid-template-columns 1.2s var(--ease-in-out-circ);
        will-change: grid-template-columns;
    }
    .rest-part-wrapper.expand { grid-template-columns: 1fr; }
    
    .rest-part-inner {
        overflow: hidden;
        display: flex;
        align-items: center;
        padding: 20px 0;
        margin: -20px 0;
    }

    .letter {
      font-family: 'Cinzel', serif;
      font-size: clamp(30px, 10vw, 140px); 
      font-weight: 800;
      color: var(--gold-2);
      -webkit-font-smoothing: antialiased;
      will-change: transform, opacity, color, text-shadow, filter;
      text-shadow: 
        0 1px 0 #b38728, 0 2px 0 #9f7622, 0 3px 0 #8c661c,
        0 15px 25px rgba(0,0,0,0.8);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .initial-part {
      opacity: 0;
      transform: translate3d(0, 50px, -200px) rotateX(-70deg) scale(0.8);
      transition: transform 1.2s var(--ease-spring), opacity 1s ease, filter 1s ease;
      filter: blur(10px);
    }
    .initial-part.show { 
      opacity: 1; 
      transform: translate3d(0, 0, 0) rotateX(0deg) scale(1); 
      filter: blur(0px);
    }

    .is-name { opacity: 0; margin-left: clamp(2px, 1.5vw, 15px); }

    @keyframes popFlash {
        0% { opacity: 0; transform: translate3d(0, 50px, -150px) rotateX(-70deg) scale(0.8); color: transparent; text-shadow: 0 0 40px rgba(253, 245, 201, 0); filter: blur(12px); }
        50% { opacity: 1; transform: translate3d(0, -10px, 30px) rotateX(10deg) scale(1.1); color: #fff; text-shadow: 0 0 50px rgba(253, 245, 201, 1), 0 10px 20px rgba(0,0,0,0.8); filter: blur(0px); }
        100% { opacity: 1; transform: translate3d(0, 0, 0) scale(1) rotateX(0deg); color: var(--gold-2); text-shadow: 0 1px 0 #b38728, 0 2px 0 #9f7622, 0 3px 0 #8c661c, 0 15px 25px rgba(0,0,0,0.8); }
    }

    /* ===== ADVANCED KAWAII BABY GIRL SVG & SPARKLES ===== */
    #baby-girl-container {
        position: relative;
        margin-top: 30px;
        transform: translate3d(0, 50px, -50px) rotateX(-90deg) scale(0.8); 
        width: 180px;
        height: 180px;
        opacity: 0;
        filter: drop-shadow(0 20px 20px rgba(0,0,0,0.6)) blur(8px);
        transition: transform 1.5s var(--ease-spring), opacity 1.2s ease, filter 1.2s ease;
        display: flex;
        justify-content: center;
        align-items: center;
        will-change: transform, opacity, filter;
        transform-style: preserve-3d;
        backface-visibility: hidden;
    }
    
    #baby-girl-container.slide-in {
        transform: translate3d(0, 0, 0) rotateX(0deg) scale(1); 
        opacity: 1;
        filter: drop-shadow(0 20px 20px rgba(0,0,0,0.6)) blur(0px);
        animation: floatBaby 4s ease-in-out infinite forwards;
        animation-delay: 1.5s;
    }
    
    @keyframes floatBaby {
        0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
        50% { transform: translate3d(0, -12px, 0) scale(1.02); }
    }
    
    .waving-arm {
        transform-origin: 135px 125px; 
        animation: wave-hand 0.8s infinite alternate ease-in-out;
        will-change: transform;
    }
    @keyframes wave-hand {
        0% { transform: rotate(-5deg); }
        100% { transform: rotate(35deg); }
    }

    .eyes {
        transform-origin: 100px 98px;
        animation: blink 4s infinite;
    }
    @keyframes blink {
        0%, 96%, 98%, 100% { transform: scaleY(1); }
        97% { transform: scaleY(0.1); }
    }
    
    .head-group {
        transform-origin: 100px 140px;
        animation: headBob 3s infinite alternate ease-in-out;
    }
    @keyframes headBob {
        0% { transform: rotate(-1.5deg); }
        100% { transform: rotate(2.5deg); }
    }

    .sparkle {
        position: absolute;
        font-size: clamp(14px, 3vw, 20px);
        opacity: 0;
        animation: twinkle 2s infinite ease-in-out;
        pointer-events: none;
        will-change: transform, opacity;
    }
    @keyframes twinkle {
        0%, 100% { opacity: 0; transform: scale(0.5) rotate(0deg); }
        50% { opacity: 1; transform: scale(1.2) rotate(20deg); text-shadow: 0 0 10px #fdf5c9; }
    }

    /* ===== HARDWARE ACCELERATED BALLOONS ===== */
    .balloon-anim {
        position: absolute;
        bottom: -200px;
        will-change: transform, opacity;
        animation: floatUp 7s linear forwards;
    }
    
    .balloon-sway {
        transform-origin: bottom center;
        will-change: transform;
        animation: swayBalloon 3s ease-in-out infinite alternate;
    }
    
    @keyframes floatUp {
        0% { transform: translate3d(0, 0, 0); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translate3d(var(--drift), -120dvh, 0); opacity: 0; }
    }
    @keyframes swayBalloon {
        0% { transform: rotate(-8deg); }
        100% { transform: rotate(8deg); }
    }

    /* ===== REDUCED MOTION ===== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  
  <div class="ambient-light"></div>
  <div id="flash-overlay"></div>

  <div id="ptr-wrapper">
      <svg id="ptr-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2.75a9.25 9.25 0 1 0 4.737 17.197l-1.373-1.637A7.25 7.25 0 1 1 19.25 12h-2.5l3.625 4.5L24 12h-2.75a9.25 9.25 0 0 0-9.25-9.25z"/>
      </svg>
  </div>

  <canvas id="canvas-bg" aria-hidden="true"></canvas>

  <div id="scene-container" aria-hidden="false">
    <div class="gate left" id="gate-left" aria-hidden="true"></div>
    <div class="gate right" id="gate-right" aria-hidden="true"></div>

    <div class="seal-wrapper" id="seal-wrapper">
      <div class="seal-aura" id="seal-aura"></div>
      <div id="letter-N" role="button" tabindex="0" aria-label="Enter Ceremony">N</div>
      <div class="click-hint gold-shimmer" id="click-hint">Click to Enter</div>
    </div>
  </div>

  <div id="timer-screen" aria-live="polite" aria-atomic="true">
    <h2 id="timer-title" class="gold-shimmer">The Journey Unfolds In</h2>
    <div class="timer-box" role="group">
      <div class="time-unit"><div id="days">00</div><span id="label-days">Days</span></div>
      <div class="time-unit"><div id="hours">00</div><span id="label-hours">Hours</span></div>
      <div class="time-unit"><div id="mins">00</div><span id="label-mins">Minutes</span></div>
      <div class="time-unit"><div id="secs">00</div><span id="label-secs">Seconds</span></div>
    </div>
    
    <div id="suggestion-container">
        <p class="suggestion-text">Have a beautiful name in mind?</p>
        <div class="suggestion-input-wrapper">
            <input type="text" id="name-suggestion" placeholder="Enter name suggestion..." maxlength="25" autocomplete="off" />
            <button id="submit-suggestion" aria-label="Submit Name">Send</button>
        </div>
        <div id="suggestion-thank-you">Thank you for your suggestion! ✨</div>
    </div>
  </div>

  <div id="countdown-screen" aria-live="assertive" aria-atomic="true"></div>

  <div id="reveal-screen" aria-hidden="true">
    <h3 id="reveal-subtitle">Welcome To The World</h3>
    <div class="name-container" id="baby-name" aria-hidden="true"></div>
    
    <div id="baby-girl-container">
        <div class="sparkle" style="top: 10px; left: 10px; animation-delay: 0s;">✨</div>
        <div class="sparkle" style="top: 40px; right: 0px; animation-delay: 0.5s;">✨</div>
        <div class="sparkle" style="top: 110px; left: 5px; animation-delay: 1.2s;">✨</div>
        <div class="sparkle" style="top: -5px; right: 30px; animation-delay: 0.8s;">✨</div>

        <svg width="100%" height="100%" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <radialGradient id="skinGrad" cx="50%" cy="50%" r="50%">
                    <stop offset="40%" stop-color="#ffe4c4"/>
                    <stop offset="100%" stop-color="#f5c29b"/>
                </radialGradient>
                <linearGradient id="swaddleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#fff0f5"/>
                    <stop offset="100%" stop-color="#f48fb1"/>
                </linearGradient>
            </defs>
            
            <path d="M 50,190 C 40,130 160,130 150,190 Z" fill="url(#swaddleGrad)" stroke="#d81b60" stroke-width="2"/>
            <path d="M 60,150 Q 100,170 140,150" fill="none" stroke="#f8bbd0" stroke-width="3" stroke-linecap="round"/>
            <path d="M 75,170 Q 100,185 125,170" fill="none" stroke="#f8bbd0" stroke-width="2" stroke-linecap="round"/>
            
            <path d="M 70,135 Q 50,155 75,175" fill="none" stroke="url(#skinGrad)" stroke-width="14" stroke-linecap="round"/>
            
            <g class="waving-arm">
                <path d="M 130,135 Q 165,110 160,75" fill="none" stroke="url(#skinGrad)" stroke-width="14" stroke-linecap="round"/>
                <circle cx="160" cy="75" r="7" fill="url(#skinGrad)"/>
                <path d="M 155,70 L 150,62 M 160,68 L 157,59 M 165,70 L 164,62" fill="none" stroke="url(#skinGrad)" stroke-width="3.5" stroke-linecap="round"/>
            </g>
            
            <g class="head-group">
                <circle cx="100" cy="85" r="48" fill="#3e2723"/>
                
                <circle cx="100" cy="90" r="45" fill="url(#skinGrad)"/>
                
                <circle cx="68" cy="105" r="8" fill="#ff80ab" opacity="0.6"/>
                <circle cx="132" cy="105" r="8" fill="#ff80ab" opacity="0.6"/>
                
                <path d="M 97,105 Q 100,108 103,105" fill="none" stroke="#dca782" stroke-width="2.5" stroke-linecap="round"/>
                
                <g class="eyes">
                    <circle cx="75" cy="95" r="7" fill="#3e2723"/>
                    <circle cx="73" cy="92" r="2.5" fill="#ffffff"/>
                    <circle cx="77" cy="96" r="1" fill="#ffffff"/>
                    <path d="M 68,90 Q 75,85 82,88" fill="none" stroke="#3e2723" stroke-width="2" stroke-linecap="round"/>

                    <circle cx="125" cy="95" r="7" fill="#3e2723"/>
                    <circle cx="123" cy="92" r="2.5" fill="#ffffff"/>
                    <circle cx="127" cy="96" r="1" fill="#ffffff"/>
                    <path d="M 118,88 Q 125,85 132,90" fill="none" stroke="#3e2723" stroke-width="2" stroke-linecap="round"/>
                </g>
                
                <path d="M 93,112 Q 100,122 107,112 Z" fill="#d81b60"/>
                <path d="M 96,116 Q 100,119 104,116 Z" fill="#f48fb1"/>
                
                <path d="M 52,90 C 52,30 148,30 148,90 C 148,65 125,45 100,45 C 75,45 52,65 52,90 Z" fill="#4e342e"/>
                
                <path d="M 85,45 Q 100,25 115,45 Q 105,35 85,45 Z" fill="#5d4037"/>
                
                <path d="M 53,70 Q 100,45 147,70" fill="none" stroke="#f8bbd0" stroke-width="4"/>
                <g transform="translate(115, 55)">
                    <circle cx="0" cy="-6" r="5" fill="#ff4081"/>
                    <circle cx="0" cy="6" r="5" fill="#ff4081"/>
                    <circle cx="-6" cy="0" r="5" fill="#ff4081"/>
                    <circle cx="6" cy="0" r="5" fill="#ff4081"/>
                    <circle cx="0" cy="0" r="4" fill="#fdf5c9"/>
                </g>
            </g>
        </svg>
    </div>
  </div>

  <noscript>
    <div style="position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; background: #050505; z-index: 9999; padding: 20px; text-align: center;">
      <div style="color: #d4af37;">
        <h2 style="font-family: Cinzel, serif; margin-bottom: 12px;">Welcome</h2>
        <p>Please enable JavaScript to view the ceremony animation.</p>
      </div>
    </div>
  </noscript>

  <script>
    'use strict';

    /* ===== CONFIGURATION ===== */
    const CONFIG = {
      ceremonyName: window.__ceremonyName || 'A.NURA',
      // Set to null to use demo timer. To bypass timer entirely, use a past date e.g. new Date('2023-01-01')
      ceremonyEventDate: '2026-06-23T09:30:00',
      timerDemoSeconds: 8
    };

    /* ===== ELEMENT CACHE ===== */
    const qs = (sel, root = document) => root ? root.querySelector(sel) : null;
    const qsa = (sel, root = document) => root ? Array.from(root.querySelectorAll(sel)) : [];
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const elements = {
      letterN: qs('#letter-N'),
      sealWrapper: qs('#seal-wrapper'),
      sealAura: qs('#seal-aura'),
      clickHint: qs('#click-hint'),
      gateLeft: qs('#gate-left'),
      gateRight: qs('#gate-right'),
      sceneContainer: qs('#scene-container'),
      timerScreen: qs('#timer-screen'),
      countdownScreen: qs('#countdown-screen'),
      revealScreen: qs('#reveal-screen'),
      revealSubtitle: qs('#reveal-subtitle'),
      babyNameContainer: qs('#baby-name'),
      canvas: qs('#canvas-bg'),
      flashOverlay: qs('#flash-overlay'),
      
      // Suggestion Elements
      suggestionContainer: qs('#suggestion-container'),
      suggestionInputWrapper: qs('.suggestion-input-wrapper'),
      nameSuggestion: qs('#name-suggestion'),
      submitSuggestion: qs('#submit-suggestion'),
      suggestionThankYou: qs('#suggestion-thank-you')
    };

    /* ===== PULL TO REFRESH LOGIC ===== */
    let startY = 0;
    let currentPull = 0;
    const ptrWrapper = qs('#ptr-wrapper');
    const ptrIcon = qs('#ptr-icon');
    const ptrThreshold = 100; 

    function handleDragStart(y) {
        startY = y;
        ptrWrapper.style.transition = 'none';
        ptrIcon.style.transition = 'none';
    }

    function handleDragMove(y) {
        if (startY === 0) return;
        const diff = y - startY;
        if (diff > 0) {
            currentPull = Math.pow(diff, 0.8) * 1.5; 
            ptrWrapper.style.transform = `translate3d(-50%, calc(-50px + ${currentPull}px), 0)`;
            ptrIcon.style.transform = `rotate(${currentPull * 2.5}deg)`;
            if (currentPull > ptrThreshold) {
                ptrWrapper.classList.add('ready');
            } else {
                ptrWrapper.classList.remove('ready');
            }
        }
    }

    function handleDragEnd() {
        if (startY === 0) return;
        startY = 0;
        ptrWrapper.style.transition = 'transform 0.4s var(--ease-out-expo), box-shadow 0.3s ease, background 0.3s ease';
        ptrIcon.style.transition = 'transform 0.4s ease';

        if (currentPull > ptrThreshold) {
            ptrWrapper.style.transform = `translate3d(-50%, 30px, 0)`;
            ptrIcon.classList.add('ptr-spin');
            setTimeout(() => window.location.reload(), 500); 
        } else {
            ptrWrapper.style.transform = `translate3d(-50%, 0, 0)`;
        }
        currentPull = 0;
    }

    document.addEventListener('touchstart', e => {
        if (e.touches.length > 1) return;
        handleDragStart(e.touches[0].clientY);
    }, { passive: true });
    document.addEventListener('touchmove', e => {
        handleDragMove(e.touches[0].clientY);
    }, { passive: true });
    document.addEventListener('touchend', handleDragEnd);

    let isMouseDown = false;
    document.addEventListener('mousedown', e => {
        isMouseDown = true;
        handleDragStart(e.clientY);
    });
    document.addEventListener('mousemove', e => {
        if (!isMouseDown) return;
        handleDragMove(e.clientY);
    });
    document.addEventListener('mouseup', () => {
        if (!isMouseDown) return;
        isMouseDown = false;
        handleDragEnd();
    });

    /* ===== TIMER & COUNTDOWN LOGIC ===== */
    function updateTimer() {
        const eventDate = new Date(CONFIG.ceremonyEventDate).getTime();
        const now = new Date().getTime();
        const diff = eventDate - now;

        if (diff <= 0) {
            triggerReveal();
            return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const secs = Math.floor((diff % (1000 * 60)) / 1000);

        // Update timer display
        qs('#days').textContent = String(days).padStart(2, '0');
        qs('#hours').textContent = String(hours).padStart(2, '0');
        qs('#mins').textContent = String(mins).padStart(2, '0');
        qs('#secs').textContent = String(secs).padStart(2, '0');

        // SHOW NAMING SUGGESTIONS ONLY IF 2 OR MORE DAYS REMAINING
        if (days >= 2) {
            if (elements.suggestionContainer.style.display !== 'flex') {
                elements.suggestionContainer.style.display = 'flex';
                setTimeout(() => {
                    elements.suggestionContainer.classList.add('show-suggestion');
                }, 100);
            }
        } else {
            // Hide suggestions if less than 2 days
            elements.suggestionContainer.classList.remove('show-suggestion');
            setTimeout(() => {
                elements.suggestionContainer.style.display = 'none';
            }, 800);
        }
    }

    function showTimerScreen() {
        elements.sceneContainer.style.opacity = '0';
        setTimeout(() => {
            elements.sceneContainer.style.display = 'none';
            elements.timerScreen.style.display = 'flex';
            setTimeout(() => {
                elements.timerScreen.style.opacity = '1';
                const timeUnits = qsa('.time-unit');
                timeUnits.forEach((unit, idx) => {
                    setTimeout(() => {
                        unit.classList.add('show-unit');
                    }, idx * 100);
                });
            }, 50);
        }, 1500);

        updateTimer();
        setInterval(updateTimer, 1000);
    }

    function triggerReveal() {
        elements.timerScreen.style.opacity = '0';
        elements.countdownScreen.style.display = 'flex';

        let countdown = 3;
        function showCountdown() {
            if (countdown > 0) {
                const num = document.createElement('div');
                num.className = 'countdown-num';
                num.textContent = countdown;
                elements.countdownScreen.appendChild(num);
                countdown--;
                setTimeout(showCountdown, 1000);
            } else {
                elements.countdownScreen.innerHTML = '';
                elements.countdownScreen.style.display = 'none';
                elements.flashOverlay.classList.add('flash');
                setTimeout(() => {
                    elements.flashOverlay.classList.remove('flash');
                    elements.flashOverlay.style.opacity = '0';
                    elements.revealScreen.style.display = 'flex';
                    elements.revealSubtitle.classList.add('subtitle-show');
                    displayBabyName();
                }, 600);
            }
        }
        showCountdown();
    }

    function displayBabyName() {
        const name = CONFIG.ceremonyName;
        const container = elements.babyNameContainer;
        container.innerHTML = '';

        const firstLetter = name.charAt(0);
        const restName = name.slice(1);

        const initialSpan = document.createElement('span');
        initialSpan.className = 'letter initial-part';
        initialSpan.textContent = firstLetter;
        container.appendChild(initialSpan);

        const restWrapper = document.createElement('div');
        restWrapper.className = 'rest-part-wrapper';
        const restInner = document.createElement('div');
        restInner.className = 'rest-part-inner';
        restName.split('').forEach(char => {
            const span = document.createElement('span');
            span.className = 'letter';
            span.textContent = char;
            restInner.appendChild(span);
        });
        restWrapper.appendChild(restInner);
        container.appendChild(restWrapper);

        setTimeout(() => {
            initialSpan.classList.add('show');
            restWrapper.classList.add('expand');
        }, 500);

        setTimeout(() => {
            elements.babyNameContainer.style.opacity = '1';
            elements.babyNameContainer.style.transform = 'translate3d(0, 0, 0)';
            const babyContainer = qs('#baby-girl-container');
            if (babyContainer) {
                babyContainer.classList.add('slide-in');
            }
        }, 1500);

        if (window.confetti) {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 }
            });
        }
    }

    /* ===== SEAL INTERACTION LOGIC ===== */
    function enterCeremony() {
        elements.letterN.classList.add('shatter');
        elements.sealAura.classList.add('explode');
        
        if (reducedMotion) {
            showTimerScreen();
        } else {
            setTimeout(showTimerScreen, 1200);
        }
    }

    elements.letterN.addEventListener('click', enterCeremony);
    elements.letterN.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            enterCeremony();
        }
    });

    /* ===== NAME SUGGESTION SUBMISSION ===== */
    elements.submitSuggestion.addEventListener('click', () => {
        const nameValue = elements.nameSuggestion.value.trim();
        if (nameValue) {
            // Log suggestion (in real app, would send to server)
            console.log('Name suggestion:', nameValue);
            
            // Show thank you message
            elements.suggestionInputWrapper.style.display = 'none';
            elements.suggestionThankYou.style.display = 'block';
            
            // Reset after 3 seconds
            setTimeout(() => {
                elements.nameSuggestion.value = '';
                elements.suggestionInputWrapper.style.display = 'flex';
                elements.suggestionThankYou.style.display = 'none';
            }, 3000);
        }
    });

    elements.nameSuggestion.addEventListener('keypress', e => {
        if (e.key === 'Enter') {
            elements.submitSuggestion.click();
        }
    });

    /* ===== CANVAS ANIMATION SETUP ===== */
    const canvas = elements.canvas;
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * 2;
            this.vy = (Math.random() - 0.5) * 2;
            this.alpha = Math.random() * 0.5 + 0.2;
            this.size = Math.random() * 2 + 1;
            this.life = 1;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.life -= 0.002;
            this.alpha = this.life * 0.5;
        }

        draw() {
            ctx.fillStyle = `rgba(191, 149, 63, ${this.alpha})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function generateParticles() {
        if (particles.length < 50 && Math.random() > 0.9) {
            particles.push(new Particle());
        }
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => {
            p.update();
            p.draw();
        });
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        generateParticles();
        requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
