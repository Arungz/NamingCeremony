<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="✨ Naming Ceremony ✨" />
  <meta name="twitter:description" content="You are warmly invited to witness the grand reveal and naming of our little one." />

  <title>Naming Ceremony ✨</title>
  <link rel="icon" type="image/png" href="Images/ak.png" />

  <!-- Fonts: preload for better performance -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Cinzel+Decorative:wght@700&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet" />

  <!-- Keep canvas-confetti as fallback; we'll also add our own canvas effects -->
  <script defer src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    /* ===== VARIABLES & RESETS ===== */
    :root {
      --bg: #050505;
      --gold-1: #bf953f;
      --gold-2: #fdf5c9;
      --gold-3: #b38728;
      --muted: rgba(255, 255, 255, 0.55);
      --glass: rgba(20, 20, 20, 0.42);
      --glass-border: rgba(191, 149, 63, 0.28);
      --safe-area-top: env(safe-area-inset-top);
      --safe-area-bottom: env(safe-area-inset-bottom);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: radial-gradient(circle at 50% 30%, #232427 0%, var(--bg) 100%);
      color: #fff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding-top: var(--safe-area-top);
      padding-bottom: var(--safe-area-bottom);
      overflow: hidden;
      perspective: 1500px;
      touch-action: manipulation;
    }

    /* subtle noise overlay */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
      z-index: 0;
      pointer-events: none;
    }

    /* Canvas layers (particles, confetti, balloons) */
    .canvas-layer {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      display: block;
    }

    /* ===== GOLD SHIMMER ===== */
    .gold-shimmer {
      background: linear-gradient(90deg, var(--gold-1), var(--gold-2), var(--gold-3), var(--gold-2), var(--gold-1));
      background-size: 240% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shine 4s linear infinite;
    }
    @keyframes shine { to { background-position: 200% center; } }

    /* ===== SCENE & GATES ===== */
    #scene-container {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transform-style: preserve-3d;
      transition: transform 3.2s cubic-bezier(0.25, 1, 0.5, 1);
      will-change: transform;
    }

    .gate {
      position: absolute;
      top: 0;
      width: 48%;
      height: 100%;
      background: linear-gradient(90deg, #080808, #1a1a1a 50%, #080808);
      transition: transform 2.2s cubic-bezier(0.25, 1, 0.5, 1);
      z-index: 101;
      border-top: 5px solid #1b1b1b;
      border-bottom: 5px solid #1b1b1b;
      box-shadow: inset 0 0 60px rgba(0,0,0,0.9), 0 50px 120px rgba(0,0,0,0.85);
    }
    .gate.left { left: 0; transform-origin: left; border-right: 10px solid var(--gold-1); }
    .gate.right { right: 0; transform-origin: right; border-left: 10px solid var(--gold-1); }
    .gate.open-left { transform: rotateY(-108deg) translateZ(-20px); opacity: 0.98; }
    .gate.open-right { transform: rotateY(108deg) translateZ(-20px); opacity: 0.98; }

    /* ===== SEAL / BUTTON ===== */
    .seal-wrapper {
      position: relative;
      z-index: 102;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      transition: transform 600ms cubic-bezier(0.22, 1, 0.36, 1), opacity 600ms;
      transform-origin: center;
      will-change: transform, opacity;
    }

    #letter-N {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(48px, 8vw, 110px);
      width: clamp(140px, 26vw, 240px);
      height: clamp(140px, 26vw, 240px);
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      background: conic-gradient(from 0deg, var(--gold-2), var(--gold-3), #fff, var(--gold-3), var(--gold-2));
      color: #3d2b07;
      text-shadow: 1px 1px 2px rgba(255,255,255,0.85), -1px -1px 2px rgba(0,0,0,0.4);
      cursor: pointer;
      box-shadow:
        inset 0 0 18px rgba(0,0,0,0.55),
        0 24px 48px rgba(0,0,0,0.9),
        0 0 0 10px #111,
        0 0 0 14px var(--gold-1);
      transition: transform 220ms ease, box-shadow 220ms ease;
      user-select: none;
      font-weight: 700;
      position: relative;
      overflow: hidden;
      outline: none;
      border: none;
    }
    #letter-N:focus { box-shadow: 0 0 0 4px rgba(212,175,55,0.15), 0 24px 48px rgba(0,0,0,0.9); }
    #letter-N:hover { transform: translateY(-3px) scale(1.04); }
    #letter-N:active { transform: scale(0.96); }

    #letter-N::after {
      content: '';
      position: absolute;
      top: -50%; left: -50%; width: 200%; height: 200%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.45) 50%, rgba(255,255,255,0) 100%);
      transform: rotate(45deg) translateX(-100%);
      animation: lightSweep 3.8s infinite cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }
    @keyframes lightSweep { to { transform: rotate(45deg) translateX(100%); } }

    .click-hint {
      font-size: 12px;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: var(--muted);
      animation: fadeInOut 2s infinite;
      user-select: none;
    }
    @keyframes fadeInOut { 0%, 100% { opacity: 0.28; } 50% { opacity: 1; } }

    /* ===== TIMER (frosted glass) ===== */
    #timer-screen {
      position: absolute;
      z-index: 50;
      opacity: 0;
      transform: scale(0.9);
      display: none;
      transition: opacity 600ms ease, transform 600ms ease;
      text-align: center;
      width: 100%;
      padding: clamp(12px, 2.5vw, 32px);
      pointer-events: none;
    }
    #timer-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(20px, 3.5vw, 36px);
      margin-bottom: clamp(20px, 3vw, 40px);
      letter-spacing: 6px;
      text-transform: uppercase;
      text-shadow: 0 5px 15px rgba(0,0,0,0.8);
    }
    .timer-box { display: flex; gap: 18px; justify-content: center; flex-wrap: wrap; }
    .time-unit {
      background: var(--glass);
      backdrop-filter: blur(18px) saturate(110%);
      -webkit-backdrop-filter: blur(18px) saturate(110%);
      padding: 24px 18px;
      border-radius: 14px;
      min-width: 100px;
      border-top: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 20px 40px rgba(0,0,0,0.7);
    }
    .time-unit div { font-weight: 300; font-size: clamp(36px, 8vw, 72px); line-height: 1; text-shadow: 0 4px 10px rgba(0,0,0,0.6); }
    .time-unit span { display: block; font-size: 11px; color: var(--gold-1); margin-top: 10px; letter-spacing: 3px; text-transform: uppercase; font-family: 'Cinzel', serif; }

    /* ===== COUNTDOWN (big) ===== */
    #countdown-screen {
      position: absolute;
      z-index: 60;
      display: none;
      font-family: 'Cinzel', serif;
      color: transparent;
      -webkit-text-stroke: 3px var(--gold-1);
      text-shadow: 0 0 80px rgba(191,149,63,0.45);
      font-size: clamp(100px, 24vw, 300px);
      pointer-events: none;
      animation: heartbeatPulse 1s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
      will-change: transform, opacity;
    }
    @keyframes heartbeatPulse {
      0% { transform: scale(0.85); opacity: 0; filter: blur(10px); }
      20% { transform: scale(1.08); opacity: 1; filter: blur(0px); }
      100% { transform: scale(1.38); opacity: 0; filter: blur(6px); }
    }

    /* ===== REVEAL SCREEN ===== */
    #reveal-screen {
      position: absolute;
      inset: 0;
      z-index: 70;
      display: none;
      flex-direction: column;
      justify-content: flex-start;
      padding-top: 18vh;
      align-items: center;
      perspective: 1000px;
      width: 100%;
    }
    #reveal-subtitle {
      font-family: 'Cinzel', serif;
      font-weight: 400;
      font-size: clamp(16px, 3.5vw, 32px);
      letter-spacing: 12px;
      color: var(--gold-2);
      margin-bottom: 40px;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(-20px) scale(0.96);
      text-shadow: 0 5px 20px rgba(0,0,0,0.9);
      text-align: center;
    }
    .subtitle-show { animation: cinematicFloatIn 1.6s cubic-bezier(0.25,1,0.5,1) forwards; }
    @keyframes cinematicFloatIn { to { opacity: 1; transform: translateY(0) scale(1); } }

    .name-container { display: flex; justify-content: center; align-items: center; white-space: nowrap; gap: 6px; }
    .letter { font-family: 'Cinzel', serif; font-size: clamp(28px, 9vw, 120px); font-weight: 800; color: var(--gold-2); text-shadow: 0 1px 0 #b38728, 0 2px 0 #9f7622, 0 20px 40px rgba(0,0,0,0.9); transform-origin: center; }
    .initial-part { opacity: 0; transform: translateZ(-200px) rotateX(-90deg); transition: transform 1.1s cubic-bezier(0.18,1,0.32,1.2), opacity 600ms; }
    .initial-part.show { opacity: 1; transform: translateZ(0) rotateX(0deg); }
    .is-name { opacity: 0; margin-left: 6px; }

    @keyframes popFlash {
      0% { opacity: 0; transform: translateZ(-80px) scale(0.6) rotateX(-35deg); }
      50% { opacity: 1; transform: translateZ(28px) scale(1.08) rotateX(0); text-shadow: 0 0 50px rgba(253,245,201,1); color: #fff; }
      100% { opacity: 1; transform: translateZ(0) scale(1) rotateX(0); color: var(--gold-2); }
    }

    /* Balloons fallback style (if needed) */
    .balloon-graphic { filter: drop-shadow(0 10px 12px rgba(0,0,0,0.6)); }

    /* ===== RESPONSIVE & REDUCED MOTION ===== */
    @media (max-width: 520px) {
      .time-unit { padding: 12px 10px; min-width: 78px; }
      .time-unit div { font-size: clamp(30px, 9vw, 50px); }
      .click-hint { letter-spacing: 5px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .gold-shimmer, #letter-N::after, .click-hint, #countdown-screen, .letter, .gate, #scene-container, .subtitle-show {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <!-- Canvas layers: particles (stars + dust), confetti, balloons -->
  <canvas id="canvas-particles" class="canvas-layer" aria-hidden="true"></canvas>
  <canvas id="canvas-confetti" class="canvas-layer" aria-hidden="true"></canvas>
  <canvas id="canvas-balloons" class="canvas-layer" aria-hidden="true"></canvas>

  <div id="scene-container" aria-hidden="false">
    <div class="gate left" id="gate-left" aria-hidden="true"></div>
    <div class="gate right" id="gate-right" aria-hidden="true"></div>

    <div class="seal-wrapper" id="seal-wrapper">
      <button id="letter-N" role="button" aria-pressed="false" aria-label="Open the ceremony" tabindex="0">N</button>
      <div class="click-hint gold-shimmer" id="click-hint">Click to Enter</div>
    </div>
  </div>

  <div id="timer-screen" aria-live="polite" aria-atomic="true">
    <h2 id="timer-title" class="gold-shimmer">The Journey Unfolds In</h2>
    <div class="timer-box" role="group" aria-label="Countdown timer">
      <div class="time-unit"><div id="days">00</div><span id="label-days">Days</span></div>
      <div class="time-unit"><div id="hours">00</div><span id="label-hours">Hours</span></div>
      <div class="time-unit"><div id="mins">00</div><span id="label-mins">Minutes</span></div>
      <div class="time-unit"><div id="secs">05</div><span id="label-secs">Seconds</span></div>
    </div>
  </div>

  <div id="countdown-screen" aria-live="assertive" aria-atomic="true">5</div>

  <div id="reveal-screen" aria-hidden="true">
    <h3 id="reveal-subtitle" class="gold-shimmer">Welcome To The World</h3>
    <div class="name-container" id="baby-name" aria-hidden="true" aria-live="polite"></div>
  </div>

  <noscript>
    <div style="position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; background: #050505; z-index: 9999; padding: 20px; text-align: center;">
      <div style="color: #d4af37;">
        <h2 style="font-family: Cinzel, serif; margin-bottom: 12px;">Welcome</h2>
        <p>Please enable JavaScript to view the ceremony animation.</p>
      </div>
    </div>
  </noscript>

  <script>
    'use strict';

    /* ===== CONFIG (can be overridden by embedding page via window.__ceremonyName / __ceremonyEventDate) ===== */
    const CONFIG = {
      ceremonyName: window.__ceremonyName || decodeURIComponent((new URL(location)).searchParams.get('name') || 'A. Nura'),
      ceremonyEventDate: window.__ceremonyEventDate || (function(){
        // if user passes ?event=2026-08-01T12:00:00Z we'll parse; otherwise demo a few seconds ahead
        const param = (new URL(location)).searchParams.get('event');
        if (param) {
          const d = new Date(param);
          if (!isNaN(d)) return d;
        }
        const demo = new Date();
        demo.setSeconds(demo.getSeconds() + 8);
        return demo;
      })(),
      timerDemoSeconds: 8,
      confetti: { colors: ['#d4af37', '#f6e6b8', '#ffffff', '#ffd8d8', '#e6ca7b'] },
      balloons: { count: 30 },
      reducedMotion: window.matchMedia('(prefers-reduced-motion: reduce)').matches,
    };

    /* ===== ELEMENTS ===== */
    const qs = (sel, root=document) => root.querySelector(sel);
    const qsa = (sel, root=document) => Array.from(root.querySelectorAll(sel));
    const elements = {
      letterN: qs('#letter-N'),
      sealWrapper: qs('#seal-wrapper'),
      gateLeft: qs('#gate-left'),
      gateRight: qs('#gate-right'),
      sceneContainer: qs('#scene-container'),
      timerScreen: qs('#timer-screen'),
      countdownScreen: qs('#countdown-screen'),
      revealScreen: qs('#reveal-screen'),
      revealSubtitle: qs('#reveal-subtitle'),
      babyNameContainer: qs('#baby-name'),
      canvasParticles: qs('#canvas-particles'),
      canvasConfetti: qs('#canvas-confetti'),
      canvasBalloons: qs('#canvas-balloons'),
    };

    /* ===== UTILS ===== */
    function safeSetText(id, text) { const el = document.getElementById(id); if (el) el.textContent = text; }
    function clamp(n, a, b) { return Math.max(a, Math.min(b, n)); }
    function now() { return performance.now(); }

    /* ===== RESIZE HANDLING (throttled) ===== */
    let resizeTimer = null;
    function onResize() {
      if (resizeTimer) cancelAnimationFrame(resizeTimer);
      resizeTimer = requestAnimationFrame(() => {
        setupCanvases();
      });
    }
    window.addEventListener('resize', onResize, { passive: true });

    /* ===== CANVAS SETUP ===== */
    function setupCanvases() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      [elements.canvasParticles, elements.canvasConfetti, elements.canvasBalloons].forEach((canvas) => {
        if (!canvas) return;
        canvas.width = Math.round(window.innerWidth * dpr);
        canvas.height = Math.round(window.innerHeight * dpr);
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        const ctx = canvas.getContext('2d');
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      });
    }

    /* ===== PARALLAX PARTICLES (stars/dust) ===== */
    let particles = [];
    let particleAnimId = null;
    function initParticles() {
      const canvas = elements.canvasParticles;
      if (!canvas) return;
      const ctx = canvas.getContext('2d', { alpha: true });
      const mobile = window.innerWidth < 700;
      const count = clamp(Math.floor((window.innerWidth * window.innerHeight) / (mobile ? 20000 : 38000)), 60, 240);
      particles = [];
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          radius: Math.random() * 1.6 + 0.2,
          speed: (Math.random() * 0.25) * (mobile ? 0.6 : 1),
          alpha: 0.05 + Math.random() * 0.46,
          drift: (Math.random() - 0.5) * 0.2,
          hueShift: Math.random() * 30
        });
      }

      let pointerX = 0.5, pointerY = 0.5;
      window.addEventListener('pointermove', e => {
        pointerX = e.clientX / window.innerWidth;
        pointerY = e.clientY / window.innerHeight;
      }, { passive: true });

      function drawParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (const p of particles) {
          p.x += p.drift + (pointerX - 0.5) * 0.6;
          p.y += (p.speed * 0.6) + (pointerY - 0.5) * 0.6;
          if (p.x > window.innerWidth + 10) p.x = -10;
          if (p.x < -10) p.x = window.innerWidth + 10;
          if (p.y > window.innerHeight + 10) p.y = -10;
          if (p.y < -10) p.y = window.innerHeight + 10;

          ctx.beginPath();
          const color = `rgba(${220 - p.hueShift}, ${200 - p.hueShift}, ${120 - p.hueShift/2}, ${p.alpha})`;
          ctx.fillStyle = color;
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fill();
        }
        if (!CONFIG.reducedMotion) particleAnimId = requestAnimationFrame(drawParticles);
      }
      if (!CONFIG.reducedMotion) {
        if (particleAnimId) cancelAnimationFrame(particleAnimId);
        drawParticles();
      } else {
        // static render once for reduced-motion
        drawParticles();
      }
    }

    /* ===== CONFETTI (improved physics using canvas-confetti as fallback + custom bursts) ===== */
    const confettiCtx = { running: false, animId: null };

    function fireConfettiBurst(x = 0.5, y = 0.5, options = {}) {
      // Use canvas-confetti if available for rich bursts, else do a simplified custom burst
      const confettiLib = window.confetti;
      const colors = CONFIG.confetti.colors;
      if (typeof confettiLib === 'function') {
        confettiLib({
          particleCount: options.particleCount || 40,
          startVelocity: options.startVelocity || 40,
          spread: options.spread || 70,
          origin: { x, y },
          colors,
          gravity: options.gravity || 0.9,
          ticks: options.ticks || 180,
          shapes: options.shapes || ['square', 'circle'],
        });
      } else {
        // minimal fallback: draw small colored circles on confetti canvas briefly
        const canvas = elements.canvasConfetti;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const colorsLocal = colors;
        const count = options.particleCount || 30;
        const particlesLocal = [];
        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = (Math.random() * 40) + 8;
          particlesLocal.push({
            x: x * window.innerWidth,
            y: y * window.innerHeight,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: Math.random() * 6 + 3,
            color: colorsLocal[Math.floor(Math.random() * colorsLocal.length)],
            rot: Math.random() * Math.PI * 2,
            spin: (Math.random() - 0.5) * 0.2,
            life: 0
          });
        }
        let start = null;
        function step(ts) {
          if (!start) start = ts;
          const t = (ts - start) / 1000;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          for (const p of particlesLocal) {
            p.vy += 140 * (1/60) * 0.016; // crude gravity
            p.x += p.vx * (1/60) * 0.016 * 60;
            p.y += p.vy * (1/60) * 0.016 * 60;
            p.rot += p.spin;
            p.life += 1;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
            ctx.restore();
          }
          if (t < 2.8) requestAnimationFrame(step);
          else ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        requestAnimationFrame(step);
      }
    }

    function fireFourCornerBlast() {
      if (CONFIG.reducedMotion) return;
      // staggered corner blasts for realism
      const corners = [
        { x: 0.05, y: 0.05 },
        { x: 0.95, y: 0.05 },
        { x: 0.05, y: 0.95 },
        { x: 0.95, y: 0.95 },
      ];
      corners.forEach((c, i) => {
        setTimeout(() => {
          fireConfettiBurst(c.x, c.y, { particleCount: 40 + (i * 10), spread: 45 + (i * 10), startVelocity: 40 + (i * 10) });
        }, i * 180);
      });
      // Central finale burst
      setTimeout(() => {
        fireConfettiBurst(0.5, 0.35, { particleCount: 120, spread: 120, startVelocity: 80, gravity: 0.9 });
      }, 900);
    }

    /* ===== BALLOONS (canvas physics hearts) ===== */
    let balloonAnimId = null;
    let balloons = [];

    function makeHeartPath(ctx, x, y, size) {
      // draws a heart centered at (x,y) with approximate size
      ctx.beginPath();
      const topCurveHeight = size * 0.3;
      ctx.moveTo(x, y + topCurveHeight);
      ctx.bezierCurveTo(x, y, x - size/2, y, x - size/2, y + topCurveHeight);
      ctx.bezierCurveTo(x - size/2, y + (size/2), x, y + (size*0.9), x, y + size);
      ctx.bezierCurveTo(x, y + (size*0.9), x + size/2, y + (size/2), x + size/2, y + topCurveHeight);
      ctx.bezierCurveTo(x + size/2, y, x, y, x, y + topCurveHeight);
      ctx.closePath();
    }

    function spawnBalloons(count = CONFIG.balloons.count) {
      const canvas = elements.canvasBalloons;
      if (!canvas || CONFIG.reducedMotion) return;
      const ctx = canvas.getContext('2d', { alpha: true });
      balloons = [];
      for (let i = 0; i < count; i++) {
        const startX = Math.random() * window.innerWidth;
        const startY = window.innerHeight + (Math.random() * 200) + 40;
        const size = 22 + Math.random() * 40;
        balloons.push({
          x: startX,
          y: startY,
          size,
          vy: -((0.6 + Math.random() * 1.2) * (1 + size/60)),
          vx: (Math.random() - 0.5) * 0.6,
          swayAmp: 12 + Math.random() * 28,
          swayFreq: 0.8 + Math.random() * 1.8,
          rot: (Math.random() - 0.5) * 0.2,
          color: ['#ff8080', '#ffb2b2', '#e6ca7b', '#ffd8d8'][Math.floor(Math.random() * 4)],
          life: 0,
          stringLen: 40 + (Math.random() * 48),
        });
      }

      let lastTime = null;
      function step(t) {
        if (!lastTime) lastTime = t;
        const dt = Math.min(50, t - lastTime) / 1000;
        lastTime = t;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let i = balloons.length - 1; i >= 0; i--) {
          const b = balloons[i];
          b.life += dt;
          // Sway motion
          b.x += Math.sin(b.life * b.swayFreq) * b.swayAmp * dt + b.vx;
          // Lift based on size -> bigger goes slower sometimes, add slight randomness
          b.y += b.vy * dt - (0.02 * (1 + Math.random()*0.02));
          b.rot += (Math.random() - 0.5) * 0.01;

          // draw heart
          ctx.save();
          ctx.translate(b.x, b.y);
          ctx.rotate(b.rot);
          ctx.scale(1, 1);
          // gradient
          const grad = ctx.createRadialGradient(-b.size * 0.2, -b.size * 0.35, 2, 0, 0, b.size * 1.1);
          grad.addColorStop(0, '#fff9e6');
          grad.addColorStop(0.15, b.color);
          grad.addColorStop(1, '#99000000');
          ctx.fillStyle = grad;
          makeHeartPath(ctx, 0, 0, b.size);
          ctx.fill();
          ctx.restore();

          // draw string
          ctx.beginPath();
          ctx.strokeStyle = 'rgba(255,255,255,0.12)';
          ctx.lineWidth = 1;
          ctx.moveTo(b.x, b.y + b.size * 0.9);
          ctx.quadraticCurveTo(b.x + (Math.sin(b.life * 0.7) * 12), b.y + b.stringLen * 0.5, b.x, b.y + b.stringLen);
          ctx.stroke();

          // remove when offscreen
          if (b.y < -200) {
            balloons.splice(i, 1);
          }
        }

        if (balloons.length > 0) balloonAnimId = requestAnimationFrame(step);
        else cancelAnimationFrame(balloonAnimId);
      }
      if (balloonAnimId) cancelAnimationFrame(balloonAnimId);
      balloonAnimId = requestAnimationFrame(step);

      // remove the canvas container after animation finishes naturally (safety)
      setTimeout(() => {
        // allow some time for balloons to leave; we don't remove the canvas element itself
      }, 9000);
    }

    function fireHeartBalloons() {
      if (CONFIG.reducedMotion) return;
      // spawn a larger burst for the reveal
      spawnBalloons(Math.min(40, CONFIG.balloons.count + 20));
      // keep spawning gentle drift balloons for a few more seconds for ambience
      for (let i = 0; i < 6; i++) {
        setTimeout(() => spawnBalloons(6 + Math.round(Math.random() * 6)), i * 800);
      }
    }

    /* ===== NAME RENDERER: smart splitting & animation ===== */
    function smartSplitName(name) {
      // Trim & normalize spaces; keep diacritics
      if (!name) return { initial: 'A.', rest: 'NURA' };
      const trimmed = name.trim().replace(/\s+/g, ' ');
      // Heuristics: if contains a dot early (A. or A.B.) treat that as initial; else first word initial.
      let initialStr = '';
      let restStr = '';
      const dotIdx = trimmed.indexOf('.');
      if (dotIdx !== -1 && dotIdx < 4) {
        initialStr = trimmed.substring(0, dotIdx + 1);
        restStr = trimmed.substring(dotIdx + 1).trim();
      } else {
        // use first letter as initial plus dot if there are multiple words
        const parts = trimmed.split(' ');
        if (parts.length > 1) {
          initialStr = parts[0].slice(0,1) + '.';
          restStr = parts.slice(1).join(' ');
        } else {
          // single name: show first char + dot + remainder (e.g., 'NURA' => 'N.' 'URA')
          initialStr = trimmed.slice(0,1) + '.';
          restStr = trimmed.slice(1);
        }
      }
      return { initial: initialStr.toUpperCase(), rest: restStr.toUpperCase() || '' };
    }

    function renderName(nameStr) {
      const container = elements.babyNameContainer;
      if (!container) return;
      container.innerHTML = '';
      const finalName = nameStr && nameStr.trim().length > 0 ? nameStr.trim() : 'A. Nura';
      const { initial, rest } = smartSplitName(finalName);

      const initialDiv = document.createElement('div');
      initialDiv.className = 'initial-part letter';
      initialDiv.textContent = initial;
      container.appendChild(initialDiv);

      const restWrapper = document.createElement('div');
      restWrapper.className = 'rest-part-wrapper';
      const restInner = document.createElement('div');
      restInner.className = 'rest-part-inner';

      Array.from(rest).forEach(ch => {
        const el = document.createElement('div');
        el.className = 'letter is-name';
        el.innerHTML = ch === ' ' ? '&nbsp;' : ch;
        restInner.appendChild(el);
      });

      restWrapper.appendChild(restInner);
      container.appendChild(restWrapper);
    }

    /* ===== TIMERS & COUNTDOWNS ===== */
    let countdownInterval = null;
    let finalTimer = null;

    function formatTwo(n) { return n < 10 ? '0' + n : String(n); }

    function startTimer() {
      if (countdownInterval) clearInterval(countdownInterval);
      function updateOnce() {
        const nowMs = Date.now();
        const dist = CONFIG.ceremonyEventDate.getTime() - nowMs;
        if (dist <= 0) {
          clearInterval(countdownInterval);
          if (elements.timerScreen) {
            elements.timerScreen.style.transform = 'scale(1.1)';
            elements.timerScreen.style.opacity = '0';
          }
          setTimeout(() => {
            if (elements.timerScreen) elements.timerScreen.style.display = 'none';
            startFinalCountdown();
          }, 1200);
          return;
        }
        const days = Math.floor(dist / (1000 * 60 * 60 * 24));
        const hours = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((dist % (1000 * 60)) / 1000);
        safeSetText('days', formatTwo(days));
        safeSetText('hours', formatTwo(hours));
        safeSetText('mins', formatTwo(minutes));
        safeSetText('secs', formatTwo(seconds));
      }
      updateOnce();
      countdownInterval = setInterval(updateOnce, 1000);
    }

    function startFinalCountdown() {
      if (elements.countdownScreen) elements.countdownScreen.style.display = 'block';
      let count = 5;
      if (elements.countdownScreen) elements.countdownScreen.textContent = String(count);
      finalTimer = setInterval(() => {
        count--;
        if (count > 0) {
          if (elements.countdownScreen) {
            elements.countdownScreen.style.animation = 'none';
            void elements.countdownScreen.offsetWidth;
            elements.countdownScreen.style.animation = 'heartbeatPulse 1s infinite cubic-bezier(0.215, 0.61, 0.355, 1)';
            elements.countdownScreen.textContent = String(count);
          }
        } else {
          clearInterval(finalTimer);
          if (elements.countdownScreen) elements.countdownScreen.style.display = 'none';
          triggerGrandReveal();
        }
      }, 1000);
    }

    /* ===== GRAND REVEAL (animations + audio + effects) ===== */
    let audioCtx = null;
    let chimeGain = null;
    function initAudio() {
      if (CONFIG.reducedMotion) return;
      // WebAudio context must be created after user gesture per browser policy
      if (!audioCtx) {
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          chimeGain = audioCtx.createGain();
          chimeGain.gain.value = 0.12;
          chimeGain.connect(audioCtx.destination);
        } catch (e) {
          audioCtx = null;
        }
      }
    }

    function playChime() {
      if (!audioCtx) return;
      // create a small harmonic chime
      const nowT = audioCtx.currentTime;
      const freqs = [880, 1320, 1760]; // partials: A5 and partials
      freqs.forEach((f, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sine';
        o.frequency.value = f;
        g.gain.value = 0.001 + 0.05 / (i+1);
        o.connect(g); g.connect(chimeGain);
        o.start(nowT + (i * 0.04));
        g.gain.exponentialRampToValueAtTime(0.0001, nowT + 2.6 + (i * 0.06));
        o.stop(nowT + 2.7 + (i * 0.06));
      });
    }

    function triggerEntrance() {
      if (!elements.letterN || elements.letterN.getAttribute('data-activated') === 'true') return;
      elements.letterN.setAttribute('data-activated', 'true');
      elements.letterN.setAttribute('aria-pressed', 'true');

      // Initialize audio context on first user interaction
      initAudio();

      if (elements.sceneContainer) elements.sceneContainer.style.transform = 'scale(1.16)';

      if (!CONFIG.reducedMotion && elements.sealWrapper) {
        elements.sealWrapper.style.transform = 'translateZ(-100px) scale(0.82)';
        elements.sealWrapper.style.opacity = '0';
      }

      setTimeout(() => {
        elements.gateLeft?.classList.add('open-left');
        elements.gateRight?.classList.add('open-right');
        // small entrance chime
        playChime();
      }, 420);

      setTimeout(() => {
        elements.sceneContainer && (elements.sceneContainer.style.display = 'none');
        const dist = CONFIG.ceremonyEventDate.getTime() - Date.now();
        if (dist <= 0) {
          startFinalCountdown();
        } else {
          elements.timerScreen && (elements.timerScreen.style.display = 'block');
          void elements.timerScreen.offsetWidth;
          elements.timerScreen && (elements.timerScreen.style.opacity = '1');
          elements.timerScreen && (elements.timerScreen.style.transform = 'scale(1)');
          startTimer();
        }
      }, 2000);
    }

    function triggerGrandReveal() {
      // show reveal screen and subtitle
      elements.revealScreen && (elements.revealScreen.style.display = 'flex');
      if (elements.revealSubtitle) elements.revealSubtitle.classList.add('subtitle-show');

      // small extra chime before initial appears
      setTimeout(() => {
        playChime();
      }, 400);

      // reveal initial center
      setTimeout(() => {
        const initialPart = qs('.initial-part');
        if (initialPart) initialPart.classList.add('show');

        // suspense then expand rest
        setTimeout(() => {
          const wrapper = qs('.rest-part-wrapper');
          if (wrapper) wrapper.classList.add('expand'); // CSS still supports this class

          const restLetters = qsa('.is-name', elements.babyNameContainer);
          restLetters.forEach((letter, idx) => {
            setTimeout(() => {
              letter.classList.add('show');
              if (!CONFIG.reducedMotion) {
                letter.style.animation = 'popFlash 0.78s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';
              }
            }, idx * 90);
          });

          // final audio flourish + confetti + balloons timed to last letter
          const totalDelay = (restLetters.length * 90) + 380;
          setTimeout(() => {
            // richer chime
            playChime();
            fireFourCornerBlast();
            fireHeartBalloons();
            // announce the name for screen readers
            if (elements.babyNameContainer) {
              elements.babyNameContainer.setAttribute('aria-hidden', 'false');
              elements.babyNameContainer.setAttribute('aria-live', 'assertive');
            }
          }, totalDelay);

        }, 1200);
      }, 900);
    }

    /* ===== EVENT BINDINGS & INITIALIZATION ===== */
    function handleKeyActivation(e) {
      if (!elements.letterN) return;
      if (e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar') {
        e.preventDefault();
        elements.letterN.click();
      }
    }

    function init() {
      setupCanvases();
      initParticles();
      renderName(CONFIG.ceremonyName);

      // click / keyboard activation
      elements.letterN?.addEventListener('click', triggerEntrance, { passive: true });
      elements.letterN?.addEventListener('keydown', handleKeyActivation);

      // Start with subtle particle motion only
      // Pre-warm confetti canvas
      const confCanvas = elements.canvasConfetti;
      if (confCanvas) {
        const ctx = confCanvas.getContext('2d');
        ctx.clearRect(0, 0, confCanvas.width, confCanvas.height);
      }

      // Accessibility: make the button focusable on load for keyboard users
      setTimeout(() => {
        elements.letterN?.focus();
      }, 700);

      // If event date already passed, show final countdown directly
      if (CONFIG.ceremonyEventDate.getTime() <= Date.now()) {
        // show direct reveal pipeline when clicked; user still needs to click to start audio (browser policy)
      }

      // Cleanup on unload
      window.addEventListener('beforeunload', () => {
        if (particleAnimId) cancelAnimationFrame(particleAnimId);
        if (balloonAnimId) cancelAnimationFrame(balloonAnimId);
        if (confettiCtx.animId) cancelAnimationFrame(confettiCtx.animId);
        if (countdownInterval) clearInterval(countdownInterval);
        if (finalTimer) clearInterval(finalTimer);
      });

      // Setup pointer to respect reduced-motion (do not auto-trigger heavy effects)
      if (CONFIG.reducedMotion) {
        // soften visuals, stop animations where appropriate
      }
    }

    // Run init after DOM ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

    // Expose some helpers for debugging in console
    window._ceremony = {
      config: CONFIG,
      triggerEntrance,
      triggerGrandReveal,
      fireFourCornerBlast,
      fireHeartBalloons,
      playChime,
      renderName,
    };
  </script>
</body>
